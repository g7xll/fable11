  <g fill="#ffd400">
    <rect x="6"  y="6"  width="3" height="3" />
    <rect x="13" y="9"  width="3" height="3" />
    <rect x="6"  y="13" width="3" height="3" />
    <rect x="9"  y="16" width="3" height="3" />
    <rect x="16" y="6"  width="3" height="3" />
    <rect x="20" y="9"  width="3" height="3" />
    <rect x="16" y="13" width="3" height="3" />
    <rect x="20" y="16" width="3" height="3" />
    <rect x="23" y="6"  width="3" height="3" />
    <rect x="23" y="13" width="3" height="3" />
    <rect x="23" y="20" width="3" height="3" />
    <rect x="20" y="23" width="3" height="3" />
    <rect x="16" y="20" width="3" height="3" />
    <rect x="13" y="23" width="3" height="3" />
  </g>
</svg>
