<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SUPERDESIGN® — KINETIC ORANGE</title>
<link rel="stylesheet" href="./assets/fonts/fonts.local.css" />
<style>
  :root{
    --orange:#FF4D00;
    --black:#000000;
    --white:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scrollbar-width:none}
  html::-webkit-scrollbar{display:none}
  body::-webkit-scrollbar{display:none}
  body{
    background:var(--orange);
    color:var(--black);
    font-family:"Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection{background:var(--black);color:var(--orange)}
  a{color:inherit;text-decoration:none}
  .display{
    font-family:"Archivo Black","Inter",sans-serif;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:-0.04em;
    line-height:0.85;
  }
  .mono{
    font-family:"Space Mono",monospace;
    letter-spacing:-0.02em;
  }

  /* NAV */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;
    padding:1.5rem 2rem;
  }
  .brand{
    font-family:"Archivo Black",sans-serif;
    font-weight:900;letter-spacing:-0.03em;
    font-size:1.15rem;text-transform:uppercase;color:var(--black);
  }
  .pill{
    display:flex;gap:.25rem;align-items:center;
    background:var(--black);border-radius:9999px;
    padding:.45rem .6rem;
    box-shadow:0 8px 24px rgba(0,0,0,.25);
  }
  .pill a{
    font-family:"Space Mono",monospace;font-weight:700;
    font-size:.7rem;letter-spacing:0.02em;text-transform:uppercase;
    color:var(--white);padding:.45rem .9rem;border-radius:9999px;
    transition:background .25s ease,color .25s ease;
  }
  .pill a:hover{background:var(--white);color:var(--black)}
  .nav-right{display:flex;gap:.5rem}
  .icon-btn{
    width:42px;height:42px;display:flex;align-items:center;justify-content:center;
    background:var(--black);color:var(--orange);border-radius:9px;
    transition:transform .25s ease;
  }
  .icon-btn:hover{transform:translateY(-3px)}
  .icon-btn svg{width:18px;height:18px}

  /* HERO */
  .hero{
    min-height:100vh;display:flex;flex-direction:column;
    justify-content:flex-end;background:var(--orange);
    padding-top:6rem;
  }
  .hero-headline{
    text-align:center;font-size:16vw;color:var(--black);
    padding:0 1rem;flex:1;display:flex;flex-direction:column;justify-content:center;
  }
  .hero-meta{
    border-top:2px solid var(--black);
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    padding:1.4rem 2rem;gap:1rem;
  }
  .meta-left{
    display:flex;align-items:center;gap:.5rem;
    font-size:.72rem;font-weight:700;text-transform:uppercase;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--black);display:inline-block}
  .meta-right{
    text-align:right;font-size:.72rem;font-weight:700;
    text-transform:uppercase;line-height:1.5;
  }

  /* SCROLL INDICATOR */
  .scroll-indicator{position:relative;width:144px;height:144px;justify-self:center}
  .scroll-ring{
    width:100%;height:100%;
    animation:spin 12s linear infinite;
  }
  .scroll-ring text{
    font-family:"Space Mono",monospace;font-weight:700;
    font-size:9px;letter-spacing:2.2px;text-transform:uppercase;fill:var(--black);
  }
  .scroll-center{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  }
  .scroll-center svg{width:22px;height:22px;stroke:var(--black)}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

  /* MARQUEE BAND */
  .band{
    background:var(--black);overflow:hidden;
    transform:skewY(-2deg);
    padding:3.2rem 0;margin:-1px 0;
    border-top:2px solid var(--black);border-bottom:2px solid var(--black);
  }
  .marquee{display:flex;width:max-content;white-space:nowrap}
  .marquee .track{
    display:flex;font-size:10vw;
    will-change:transform;
  }
  .marquee.left .track{animation:scroll-left 30s linear infinite}
  .marquee.right .track{animation:scroll-right 30s linear infinite}
  .row1{color:var(--orange)}
  .row2{color:var(--white);opacity:.8;margin-top:.4rem}
  .track span{padding-right:.4em}
  @keyframes scroll-left{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes scroll-right{from{transform:translateX(-50%)}to{transform:translateX(0)}}

  /* SERVICES */
  .services{background:var(--black);color:var(--white);padding:7rem 2rem 6rem}
  .services-header{
    display:flex;align-items:center;gap:1.2rem;margin-bottom:3rem;
  }
  .services-header h2{font-size:8vw;color:var(--white)}
  .services-header .star{width:clamp(40px,6vw,84px);height:clamp(40px,6vw,84px);color:var(--orange)}
  .service{
    display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:1.5rem;
    border-top:1px solid rgba(255,255,255,.2);
    padding:1.8rem 1rem;cursor:pointer;
    transition:background .3s ease;
  }
  .service:last-child{border-bottom:1px solid rgba(255,255,255,.2)}
  .service:hover{background:rgba(255,255,255,.05)}
  .service .idx{
    font-family:"Space Mono",monospace;font-weight:700;color:var(--orange);
    font-size:.85rem;align-self:flex-start;padding-top:.4rem;
  }
  .service-body{transition:transform .3s ease}
  .service:hover .service-body{transform:translateX(16px)}
  .service h3{font-size:7vw;color:var(--white);line-height:.9}
  .tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1rem}
  .tag{
    font-family:"Space Mono",monospace;font-size:.66rem;font-weight:400;
    text-transform:uppercase;letter-spacing:.02em;
    border:1px solid rgba(255,255,255,.25);border-radius:9999px;
    padding:.35rem .8rem;color:rgba(255,255,255,.85);
  }
  .service .arrow{
    color:var(--orange);opacity:0;transition:opacity .3s ease,transform .3s ease;
  }
  .service .arrow svg{width:clamp(28px,3vw,46px);height:clamp(28px,3vw,46px)}
  .service:hover .arrow{opacity:1;transform:rotate(45deg)}

  /* CTA */
  .cta{
    background:var(--orange);text-align:center;
    padding:7rem 1rem 5rem;
    display:flex;flex-direction:column;align-items:center;gap:2.5rem;
  }
  .cta h2{font-size:14vw;color:var(--black)}
  .cta-btn{
    background:var(--black);color:var(--white);border-radius:9999px;
    font-family:"Space Mono",monospace;font-weight:700;text-transform:uppercase;
    font-size:clamp(.8rem,1.4vw,1.1rem);letter-spacing:.02em;
    padding:1.2rem 2.8rem;display:inline-block;
    transition:transform .3s ease;
  }
  .cta-btn:hover{transform:scale(1.1)}

  /* FOOTER */
  footer{
    background:var(--orange);border-top:2px solid var(--black);
    display:flex;align-items:center;justify-content:space-between;
    padding:1.5rem 2rem;flex-wrap:wrap;gap:1rem;
  }
  footer .copy{font-family:"Space Mono",monospace;font-size:.72rem;font-weight:700;text-transform:uppercase}
  footer .links{display:flex;gap:1.5rem;flex-wrap:wrap}
  footer .links a{
    font-family:"Space Mono",monospace;font-size:.72rem;font-weight:700;
    text-transform:uppercase;transition:opacity .2s ease;
  }
  footer .links a:hover{opacity:.6}

  @media(max-width:760px){
    nav{padding:1rem}
    .pill{display:none}
    .hero-meta{grid-template-columns:1fr;text-align:center;gap:1.6rem;justify-items:center}
    .meta-right{text-align:center}
    .services-header h2{font-size:13vw}
    .service h3{font-size:11vw}
  }
</style>
</head>
<body>

<nav>
  <div class="brand">SUPERDESIGN®</div>
  <div class="pill">
    <a href="#work">Work</a>
    <a href="#services">Services</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
  <div class="nav-right">
    <a class="icon-btn" href="#" aria-label="Twitter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733 -16z"/><path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"/></svg>
    </a>
    <a class="icon-btn" href="#" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><line x1="17.5" y1="6.5" x2="17.5" y2="6.5"/></svg>
    </a>
  </div>
</nav>

<header class="hero">
  <div class="hero-headline display">
    <span>Super</span>
    <span>Design</span>
  </div>
  <div class="hero-meta">
    <div class="meta-left mono"><span class="dot"></span> Based in Digital Void</div>

    <div class="scroll-indicator">
      <svg class="scroll-ring" viewBox="0 0 144 144">
        <defs>
          <path id="circlePath" d="M 72,72 m -56,0 a 56,56 0 1,1 112,0 a 56,56 0 1,1 -112,0" />
        </defs>
        <text>
          <textPath href="#circlePath" startOffset="0%">SCROLL DOWN • SCROLL DOWN • SCROLL DOWN • SCROLL DOWN • </textPath>
        </text>
      </svg>
      <div class="scroll-center">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
      </div>
    </div>

    <div class="meta-right mono">AI Product Designer<br>Since 2024</div>
  </div>
</header>

<section class="band" aria-hidden="true">
  <div class="marquee left">
    <div class="track row1 display" id="t1"></div>
  </div>
  <div class="marquee right">
    <div class="track row2 display" id="t2"></div>
  </div>
</section>

<section class="services" id="services">
  <div class="services-header">
    <h2 class="display">Services</h2>
    <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 6.9H22l-6 4.6 2.3 7-6.3-4.4L5.7 20.5 8 13.5l-6-4.6h7.6z"/></svg>
  </div>
  <div id="service-list"></div>
</section>

<section class="cta" id="contact">
  <h2 class="display">Let's Talk</h2>
  <a class="cta-btn" href="mailto:hello@superdesign.ai">hello@superdesign.ai</a>
</section>

<footer>
  <div class="copy">© 2024 Superdesign Inc.</div>
  <div class="links">
    <a href="#">Instagram</a>
    <a href="#">Twitter</a>
    <a href="#">LinkedIn</a>
    <a href="#">Github</a>
  </div>
</footer>

<script>
  // Marquee tracks (duplicated content for gapless -50% loop)
  const row1Str = "STRATEGY • DESIGN • AI • • ";
  const row2Str = "FUTURE • CREATIVE • CODE • • ";
  function buildTrack(el, str, reps){
    const half = str.repeat(reps);
    el.innerHTML = `<span>${half}</span><span>${half}</span>`;
  }
  buildTrack(document.getElementById("t1"), row1Str, 8);
  buildTrack(document.getElementById("t2"), row2Str, 8);

  // Services
  const services = [
    {i:"(01)", t:"AI Strategy",  tags:["Consulting","Implementation","LLM Integration"]},
    {i:"(02)", t:"Interface",    tags:["UI/UX Design","Design Systems","Prototyping"]},
    {i:"(03)", t:"Development",   tags:["React","TypeScript","Next.js","WebGL"]},
    {i:"(04)", t:"Branding",     tags:["Identity","Motion","3D Visuals"]},
  ];
  const arrow = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>';
  document.getElementById("service-list").innerHTML = services.map(s => `
    <div class="service">
      <div class="idx">${s.i}</div>
      <div class="service-body">
        <h3 class="display">${s.t}</h3>
        <div class="tags">${s.tags.map(g=>`<span class="tag">${g}</span>`).join("")}</div>
      </div>
      <div class="arrow">${arrow}</div>
    </div>`).join("");
</script>
</body>
</html>
