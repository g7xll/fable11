<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <filter id="s"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="gn"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer></filter>
  </defs>
  <rect width="800" height="400" fill="url(#b)"/>
  <g filter="url(#s)" opacity="0.85"><ellipse cx="220" cy="120" rx="220" ry="180" fill="#5b21b6"/></g>
  <rect width="800" height="400" filter="url(#gn)" opacity="0.45"/>
