<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1400" viewBox="0 0 1200 1400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="55%" stop-color="#0c2a20"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="fglow" cx="70%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="fsoft"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="fgrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="1400" fill="url(#fg)"/>
  <rect width="1200" height="1400" fill="url(#fglow)"/>
  <g filter="url(#fsoft)" opacity="0.8">
    <ellipse cx="880" cy="380" rx="320" ry="280" fill="#0e6b4c"/>
    <ellipse cx="280" cy="1080" rx="360" ry="300" fill="#0a3a2c"/>
  </g>
  <g opacity="0.10" stroke="#ffffff" stroke-width="1">
    <path d="M0 200 H1200 M0 460 H1200 M0 720 H1200 M0 980 H1200 M0 1240 H1200"/>
    <path d="M200 0 V1400 M460 0 V1400 M720 0 V1400 M980 0 V1400"/>
  </g>
  <rect width="1200" height="1400" filter="url(#fgrain)" opacity="0.5"/>
</svg>
