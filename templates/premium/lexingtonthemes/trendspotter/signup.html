<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Trendspotter</title>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <nav class="nav-inner">
      <div class="nav-left"></div>
      <div class="nav-center">
        <a href="index.html" class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18 9 11.25l4.306 4.307a11.95 11.95 0 0 1 5.814-5.519l2.74-1.22m0 0-5.94-2.281m5.94 2.28-2.28 5.941"/>
          </svg>
          Trendspotter
        </a>
      </div>
      <div class="nav-right">
        <a href="signin.html" class="nav-action">Already have an account? <span style="text-decoration:underline;">Sign in</span></a>
      </div>
    </nav>
  </div>
</header>

<main class="auth-page">
  <div class="auth-card">
    <div style="text-align:center;">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle" style="margin-top:0.25rem;">Start discovering and saving your favorite tools</p>
    </div>

    <form style="display:flex;flex-direction:column;gap:1rem;" onsubmit="return false;">
      <div class="form-group">
        <label for="name" class="form-label">Name</label>
        <input type="text" id="name" placeholder="Your name" class="input" style="border-radius:var(--radius-md);">
      </div>
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" placeholder="you@example.com" class="input" style="border-radius:var(--radius-md);">
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" placeholder="Create a password" class="input" style="border-radius:var(--radius-md);">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">Create account</button>
    </form>

    <div style="position:relative;text-align:center;">
      <hr class="divider" style="margin:0;">
      <span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:0 0.5rem;font-size:0.75rem;color:var(--base-400);">or</span>
    </div>

    <button type="button" class="btn btn-outline btn-full" style="gap:0.5rem;">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <p style="text-align:center;font-size:0.75rem;color:var(--base-500);">
      By signing up, you agree to our <a href="infopages/terms.html" style="color:var(--base-900);text-decoration:underline;">Terms of Service</a>.
    </p>

    <p style="text-align:center;font-size:0.75rem;color:var(--base-500);">
      Already have an account? <a href="signin.html" style="color:var(--base-900);text-decoration:underline;">Sign in</a>
    </p>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-inner">
      <nav class="footer-links">
        <a href="index.html" class="footer-link">Tools</a>
        <a href="pricing.html" class="footer-link">Pricing</a>
        <a href="infopages/terms.html" class="footer-link">Terms</a>
      </nav>
      <p class="footer-credit">Built with <a href="https://lexingtonthemes.com" target="_blank" rel="noopener" class="footer-link" style="text-decoration:underline;">Lexington Themes</a></p>
    </div>
  </div>
</footer>

</body>
</html>
