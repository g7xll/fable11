<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign Up — Trendspotter</title>
		<link rel="preconnect" href="https://rsms.me/">
		<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
		<link rel="stylesheet" href="../styles.css">
	</head>
	<body>
		<header class="site-header">
			<div class="container">
				<nav class="nav-inner">
					<div class="nav-left"></div>
					<div class="nav-center">
						<a href="../index.html" class="logo"
							><svg
								class="logo-icon"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="1.5"
							>
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									d="M2.25 18 9 11.25l4.306 4.307a11.95 11.95 0 0 1 5.814-5.519l2.74-1.22m0 0-5.94-2.281m5.94 2.28-2.28 5.941"
								/>
							</svg>Trendspotter</a
						>
					</div>
					<div class="nav-right">
						<a href="../signin.html" class="nav-action">Sign in</a>
					</div>
				</nav>
			</div>
		</header>
		<main class="auth-page">
			<div class="auth-card">
				<h1 class="auth-title">Create account</h1>
				<p class="auth-subtitle" style="margin-top:0.25rem;">
					Submit tools and track your collections
				</p>
				<form
					style="display:flex;flex-direction:column;gap:1rem;margin-top:1.5rem;"
					onsubmit="return false;"
				>
					<input
						type="email"
						placeholder="Email"
						class="input"
						style="border-radius:var(--radius-md);"
					>
					<input
						type="password"
						placeholder="Password"
						class="input"
						style="border-radius:var(--radius-md);"
					>
					<button type="submit" class="btn btn-primary btn-full">
						Create account
					</button>
				</form>
				<p
					style="text-align:center;font-size:0.75rem;color:var(--base-500);margin-top:1rem;"
				>
					Already have an account?
					<a
						href="../signin.html"
						style="color:var(--base-900);text-decoration:underline;"
						>Sign in</a
					>
				</p>
			</div>
		</main>
		<footer class="site-footer">
			<div class="container">
				<div class="footer-inner">
					<nav class="footer-links">
						<a href="../index.html" class="footer-link">Tools</a>
					</nav>
				</div>
			</div>
		</footer>
	</body>
</html>
