":"Micro Living","price":"$112,500","url":"/store/products/3","tags":["tiny","minimalist","eco","portable"]},{"type":"store","title":"Luma Vista","description":"Luma Vista is a high-end prefab villa built for serene living and sharp aesthetics. With a glass-forward design, adaptive climate systems, and smart automation, it brings boutique luxury to remote or residential plots alike.","category":"Luxury Living","price":"$245,000","url":"/store/products/4","tags":["luxury","smart","eco","retreat"]},{"type":"store","title":"Verdant","description":"Verdant is a micro prefab designed for artists, makers, and green thumbs. Half studio, half greenhouse, it’s a light-filled space that supports both productivity and plant life in one harmonious structure.","category":"Creative Studio","price":"$78,000","url":"/store/products/5","tags":["tiny","studio","greenhouse","eco"]},{"type":"store","title":"Summit Haus","description":"Summit Haus is a spacious, modern prefab built for families or those who love to host. With multiple bedrooms, a full kitchen, and an expansive rooftop terrace, it's your personal sanctuary — with room to grow, gather, and enjoy the view.","category":"Family Living","price":"$198,000","url":"/store/products/6","tags":["family","multi-bedroom","rooftop","modern"]},{"type":"store","title":"Ridge A1","description":"Ridge A1 is a compact A-frame cabin tailored for wilderness retreats and solo escapes. With an iconic profile, high-efficiency materials, and full off-grid capability, it offers everything you need — and nothing you don’t.","category":"Off-Grid Cabin","price":"$74,000","url":"/store/products/7","tags":["tiny","a-frame","off-grid","retreat"]},{"type":"store","title":"Solis V4","description":"Solis V4 is a luxury prefab villa designed for indoor-outdoor living, wellness, and remote sophistication. With wraparound glazing, spa-grade amenities, and an energy-efficient envelope, it turns any site into a sanctuary.","category":"Luxury Villa","price":"$325,000","url":"/store/products/8","tags":["luxury","glass","spa","eco","retreat"]}];

  // Wait for the entire page to load before running the script
  window.addEventListener("load", () => {
    // Get references to various elements in the search UI
    const searchButton = document.getElementById("searchButton"); // Button that opens search modal
    const searchModal = document.getElementById("searchModal"); // Search modal container
    const modalOverlay = document.getElementById("modalOverlay"); // Overlay that closes modal on click
    const searchInput = document.getElementById("searchInput"); // Input field for searching
    const searchResults = document.getElementById("searchResults"); // Container for search results
    const closeSearch = document.getElementById("closeSearch"); // Button to close search modal
    // Initialize Fuse.js for fuzzy searching with posts data
    const fuse = new Fuse(searchItems, {
      keys: ["title", "description", "tags", "category", "price"], // Fields to search within
      threshold: 0.3, // Controls search sensitivity (lower = more strict)
      includeMatches: true, // Includes matching results for highlighting
    });
    // Hide search results by default
    searchResults.classList.add("hidden");

    const formatDate = (value) => {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "2-digit",
      });
    };

    // Function to open the search modal
    function openSearch(e) {
      e.preventDefault(); // Prevent default action (e.g., form submission)
      e.stopPropagation(); // Stop event from bubbling up the DOM
      searchModal.classList.remove("hidden"); // Show modal
      document.body.style.overflow = "hidden"; // Prevent scrolling when modal is open
      setTimeout(() => searchInput.focus(), 100); // Focus input field after a short delay
    }
    // Function to close the search modal
    function closeSearchModal(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      searchModal.classList.add("hidden"); // Hide modal
      document.body.style.overflow = ""; // Restore scrolling
      searchInput.value = ""; // Clear search input
      searchResults.innerHTML = ""; // Clear search results
      searchResults.classList.add("hidden"); // Ensure results remain hidden
    }
    // Function to display search results
    function renderResults(results) {
      // If input is empty, hide results
      if (!searchInput.value.trim()) {
        searchResults.innerHTML = "";
        searchResults.classList.add("hidden");
        return;
      }
      // If no results are found, display a message
      if (results.length === 0) {
        searchResults.innerHTML = `
          <div>
              <h3 class="p-4 text-base font-medium text-base-600">
                There's nothing here,...
              </h3>
          </div>
          `;
        searchResults.classList.remove("hidden");
        return;
      }
      // Generate HTML for each search result
      searchResults.innerHTML = results
        .map(({ item }) => {
          const isBlog = item.type === "blog";
          const eyebrow = isBlog
            ? formatDate(item.date)
            : item.category || (item.tags?.length ? item.tags[0] : "");
          const price =
            !isBlog && item.price
              ? `<p class="mt-1 text-sm font-medium text-base-900">${item.price}</p>`
              : "";

          return `
            <a href="${item.url}" class="block p-4 duration-300 hover:bg-black/5">
              <div class="flex flex-wrap items-center gap-2 text-xs uppercase text-base-500">
                <span class="flex items-center gap-2  ">
                  ${isBlog ? "Blog post" : "Store product"}
                </span>
                ${eyebrow ? `<span>${eyebrow}</span>` : ""}
                ${!isBlog && item.tags?.length ? `<span>• ${item.tags.slice(0, 2).join(", ")}</span>` : ""}
              </div>
              <h3 class="block mt-2 text-sm font-medium text-black">
                ${item.title}
              </h3>
              ${item.description ? `<p class="block text-xs text-base-600">${item.description}</p>` : ""}
              ${price}
            </a>
          `;
        })
        .join(""); // Join all results into a single string of HTML
      // Make the search results visible
      searchResults.classList.remove("hidden");
    }
    // Add event listeners to open the search modal
    searchButton.addEventListener("click", openSearch);
    searchButton.addEventListener("touchend", openSearch); // For mobile devices
    // Add event listeners to close the search modal
    closeSearch.addEventListener("click", closeSearchModal);
    closeSearch.addEventListener("touchend", closeSearchModal);
    // Close modal when clicking on the overlay (outside the modal)
    modalOverlay.addEventListener("click", closeSearchModal);
    modalOverlay.addEventListener("touchend", closeSearchModal);
    // Listen for user input and perform a search
    searchInput.addEventListener("input", (e) => {
      const value = e.target.value.trim(); // Get search input value
      const results = value ? fuse.search(value) : []; // Perform search only if input isn't empty
      renderResults(results); // Display search results
    });
    // Close search modal when the Escape key is pressed
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !searchModal.classList.contains("hidden")) {
        closeSearchModal();
      }
    });
  });
})();</script><!--
