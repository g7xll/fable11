<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign in — Vanta</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<!-- MAIN -->
		<main>
			<section style="min-height:100dvh;">
				<div
					style="width:100%;max-width:28rem;padding:2rem;padding-top:6rem;padding-bottom:8rem;margin:0 auto;"
				>
					<!-- Go back home -->
					<a
						href="index.html"
						class="text-xs text-primary"
						style="text-decoration:none;opacity:0.6;"
						onmouseover="this.style.opacity='1'"
						onmouseout="this.style.opacity='0.6'"
						>Go back home</a
					>

					<!-- Hero -->
					<div style="margin-top:3rem;">
						<h1 class="text-sm text-primary" style="font-weight:500;">
							Sign in
						</h1>
						<p
							class="text-base font-serif text-primary-60"
							style="text-wrap:balance;"
						>
							Welcome back. Enter your email and password like you haven't
							forgotten them for the 12th time this week.
						</p>
					</div>

					<!-- Form -->
					<form
						style="padding-top:0.5rem;margin-top:0.5rem;border-top:1px dotted color-mix(in oklch,var(--color-primary) 15%,transparent);display:flex;flex-direction:column;gap:1rem;max-width:22rem;"
						onsubmit="return false;"
					>
						<!-- Email -->
						<div style="display:flex;flex-direction:column;gap:0.375rem;">
							<label
								for="email"
								style="font-size:0.8125rem;font-weight:500;color:var(--color-primary);"
								>Email Address</label
							>
							<input
								id="email"
								type="email"
								placeholder="you@example.com"
								autocomplete="email"
								style="height:2rem;padding-inline:0.75rem;border:1px solid color-mix(in oklch,var(--color-primary) 15%,transparent);border-radius:0.375rem;font-size:0.875rem;font-family:inherit;background:transparent;color:var(--color-primary);outline:none;transition:border-color 0.15s;"
								onfocus="this.style.borderColor='var(--color-primary)'"
								onblur="this.style.borderColor='color-mix(in oklch,var(--color-primary) 15%,transparent)'"
							>
						</div>

						<!-- Password -->
						<div style="display:flex;flex-direction:column;gap:0.375rem;">
							<label
								for="password"
								style="font-size:0.8125rem;font-weight:500;color:var(--color-primary);"
								>Password</label
							>
							<input
								id="password"
								type="password"
								placeholder="••••••••"
								autocomplete="current-password"
								style="height:2rem;padding-inline:0.75rem;border:1px solid color-mix(in oklch,var(--color-primary) 15%,transparent);border-radius:0.375rem;font-size:0.875rem;font-family:inherit;background:transparent;color:var(--color-primary);outline:none;transition:border-color 0.15s;"
								onfocus="this.style.borderColor='var(--color-primary)'"
								onblur="this.style.borderColor='color-mix(in oklch,var(--color-primary) 15%,transparent)'"
							>
						</div>

						<!-- Remember me -->
						<label
							style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;"
						>
							<input
								type="checkbox"
								id="remember"
								style="width:1rem;height:1rem;accent-color:var(--color-primary);cursor:pointer;"
							>
							<span
								style="font-size:0.8125rem;color:color-mix(in oklch,var(--color-primary) 60%,transparent);"
								>Remember me for 30 days</span
							>
						</label>

						<!-- Buttons -->
						<div
							style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;"
						>
							<button
								type="submit"
								class="btn btn-accent"
								style="height:2rem;padding-inline:1.5rem;font-size:0.8125rem;border-radius:0.375rem;font-weight:500;white-space:nowrap;"
							>
								Sign in with email
							</button>
							<button
								type="button"
								class="btn btn-ghost btn-icon"
								title="Sign in with Google"
								style="width:2rem;height:2rem;border-radius:0.375rem;display:flex;align-items:center;justify-content:center;"
							>
								<svg
									style="width:1rem;height:1rem;"
									viewBox="0 0 256 262"
									xmlns="http://www.w3.org/2000/svg"
								>
									<path
										d="M255.878 133.451c0-10.734-.871-18.567-2.756-26.69H130.55v48.448h71.947c-1.45 12.04-9.283 30.172-26.69 42.356l-.244 1.622 38.755 30.023 2.685.268c24.659-22.774 38.875-56.282 38.875-96.027"
										fill="#4285F4"
									/>
									<path
										d="M130.55 261.1c35.248 0 64.839-11.605 86.453-31.622l-41.196-31.913c-11.024 7.688-25.82 13.055-45.257 13.055-34.523 0-63.824-22.773-74.269-54.25l-1.531.13-40.298 31.187-.527 1.465C35.393 231.798 79.49 261.1 130.55 261.1"
										fill="#34A853"
									/>
									<path
										d="M56.281 156.37c-2.756-8.123-4.351-16.827-4.351-25.82 0-8.994 1.595-17.697 4.206-25.82l-.073-1.73L15.26 71.312l-1.335.635C5.077 89.644 0 109.517 0 130.55s5.077 40.905 13.925 58.602l42.356-32.782"
										fill="#FBBC05"
									/>
									<path
										d="M130.55 50.479c24.514 0 41.05 10.589 50.479 19.438l36.844-35.974C195.245 12.91 165.798 0 130.55 0 79.49 0 35.393 29.301 13.925 71.947l42.211 32.783c10.59-31.477 39.891-54.251 74.414-54.251"
										fill="#EB4335"
									/>
								</svg>
							</button>
						</div>

						<!-- Sign up link -->
						<p
							style="font-size:0.75rem;color:color-mix(in oklch,var(--color-primary) 50%,transparent);"
						>
							Don't have an account?
							<a
								href="#"
								style="color:var(--color-accent);text-decoration:none;font-weight:500;"
								>Sign up</a
							>
						</p>
					</form>
				</div>
			</section>
		</main>

		<!-- SEARCH FAB -->
		<button
			id="search-fab"
			aria-label="Search"
			style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:50;display:flex;align-items:center;justify-content:center;width:2.5rem;height:2.5rem;border-radius:9999px;background:var(--color-primary);color:var(--color-secondary);border:none;cursor:pointer;box-shadow:0 4px 12px color-mix(in oklch,var(--color-primary) 20%,transparent);"
		>
			<svg
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
				style="width:1rem;height:1rem;"
			>
				<circle cx="11" cy="11" r="8"></circle>
				<path d="m21 21-4.35-4.35"></path>
			</svg>
		</button>

		<!-- SEARCH MODAL -->
		<div
			id="search-modal"
			style="display:none;position:fixed;inset:0;z-index:100;background:color-mix(in oklch,var(--color-primary) 60%,transparent);backdrop-filter:blur(4px);"
		>
			<div
				style="display:flex;align-items:flex-start;justify-content:center;padding-top:5rem;padding-inline:1rem;"
			>
				<div
					style="width:100%;max-width:32rem;background:var(--color-secondary);border-radius:0.75rem;overflow:hidden;box-shadow:0 20px 60px color-mix(in oklch,var(--color-primary) 30%,transparent);border:1px solid color-mix(in oklch,var(--color-primary) 10%,transparent);"
				>
					<div
						style="display:flex;align-items:center;gap:0.75rem;padding:0.875rem 1rem;border-bottom:1px solid color-mix(in oklch,var(--color-primary) 8%,transparent);"
					>
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
							style="width:1rem;height:1rem;flex-shrink:0;color:color-mix(in oklch,var(--color-primary) 40%,transparent);"
						>
							<circle cx="11" cy="11" r="8"></circle>
							<path d="m21 21-4.35-4.35"></path>
						</svg>
						<input
							id="search-input"
							type="text"
							placeholder="Search courses, blog, projects..."
							style="flex:1;border:none;outline:none;background:transparent;font-size:0.875rem;font-family:inherit;color:var(--color-primary);"
						>
						<button
							id="search-close"
							style="border:none;background:none;cursor:pointer;font-size:0.75rem;color:color-mix(in oklch,var(--color-primary) 40%,transparent);font-family:inherit;"
						>
							ESC
						</button>
					</div>
					<div
						id="search-results"
						style="max-height:24rem;overflow-y:auto;padding:0.5rem;"
					></div>
				</div>
			</div>
		</div>

		<script
			src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"
		></script>
		<script>
		// No nav on sign-in page

		// Theme toggle
		(function () {
			const dots = document.querySelectorAll(".theme-dot");
			const saved = localStorage.getItem("theme") || "default";
			function applyTheme(theme) {
				if (theme === "default") {
					document.documentElement.removeAttribute("data-theme");
					localStorage.removeItem("theme");
				} else {
					document.documentElement.setAttribute("data-theme", theme);
					localStorage.setItem("theme", theme);
				}
				dots.forEach((d) => {
					const isActive = d.dataset.theme === theme;
					d.style.outlineOffset = isActive ? "2px" : "";
					d.style.boxShadow = isActive ? "0 0 0 2px currentColor" : "";
				});
			}
			applyTheme(saved);
			dots.forEach((d) =>
				d.addEventListener("click", () => applyTheme(d.dataset.theme)),
			);
		})();

		// Search
		(function () {
			const searchItems = [
				{
					title: "Astro Content Collections Masterclass",
					description:
						"Master Astro's powerful content management system and build scalable, type-safe content-driven websites.",
					url: "/courses/astro-content-collections",
					type: "Course",
				},
				{
					title: "Astro Fundamentals",
					description:
						"Master the core concepts of Astro by building fast, modern websites from scratch.",
					url: "/courses/astro-fundamentals",
					type: "Course",
				},
				{
					title: "The Future of Front-End Performance in 2025",
					description:
						"Explore upcoming trends in web performance, how Astro fits into the future of fast websites, and what developers should prepare for.",
					url: "/blog/posts/1",
					type: "Blog",
				},
				{
					title: "Learning Astro: Why Simplicity Wins",
					description:
						"Astro makes modern web development approachable again. Here's why learners love it and how it simplifies the developer experience.",
					url: "/blog/posts/2",
					type: "Blog",
				},
				{
					title: "Content-First Design: How Astro Gets It Right",
					description:
						"Modern websites are driven by content—and Astro is built for exactly that. Here's how its architecture supports clarity, speed, and storytelling.",
					url: "/blog/posts/3",
					type: "Blog",
				},
				{
					title: "Why Developers Love Astro's Tooling",
					description:
						"Astro doesn't just make fast sites—it makes developers faster. Explore how its modern dev experience is reshaping frontend workflows.",
					url: "/blog/posts/4",
					type: "Blog",
				},
				{
					title: "Islands Architecture Explained (Without the Hype)",
					description:
						"You've heard the buzz—Astro's island architecture changes how we build for the web. Here's what it actually means and why it matters.",
					url: "/blog/posts/5",
					type: "Blog",
				},
				{
					title: "From Markdown to Masterpiece: Publishing with Astro",
					description:
						"See how Astro turns simple Markdown files into fully styled, high-performance pages—and why it's perfect for content creators.",
					url: "/blog/posts/6",
					type: "Blog",
				},
				{
					title: "Lexington Themes",
					description:
						"Premium multipage themes crafted with Astro and Tailwind CSS",
					url: "/projects/1",
					type: "Project",
				},
				{
					title: "Oxbow UI",
					description: "Components and UI Blocks crafted with Tailwind CSS",
					url: "/projects/2",
					type: "Project",
				},
				{
					title: "Colors & fonts",
					description:
						"Color & typography tools for web developers & digital designers",
					url: "/projects/3",
					type: "Project",
				},
				{
					title: "Sofia Lundarez",
					description: "This course made everything click for me — finally!",
					url: "/customers/1",
					type: "Customer",
				},
				{
					title: "Alba Ferrucci",
					description:
						"The design system section helped me finally ship my first portfolio!",
					url: "/customers/2",
					type: "Customer",
				},
				{
					title: "Inés Marquina",
					description:
						"The best frontend course I've taken this year — hands down.",
					url: "/customers/3",
					type: "Customer",
				},
				{
					title: "Miro Salonen",
					description: "It finally clicked. Astro made frontend fun again.",
					url: "/customers/4",
					type: "Customer",
				},
				{
					title: "Elena Rodriguez",
					description:
						"From marketing campaigns to shipping products—Astro gave me the technical confidence I never thought I'd have.",
					url: "/customers/5",
					type: "Customer",
				},
				{
					title: "James Chen",
					description:
						"Finally, a frontend framework that doesn't make me want to run back to the server room.",
					url: "/customers/6",
					type: "Customer",
				},
				{
					title: "Marcus Thompson",
					description:
						"I thought I'd be stuck in WordPress forever. Astro showed me there's life beyond plugins and themes.",
					url: "/customers/7",
					type: "Customer",
				},
				{
					title: "Sarah Kim",
					description:
						"I can finally make my data visualizations look as good as the insights they reveal.",
					url: "/customers/8",
					type: "Customer",
				},
				{
					title: "Privacy",
					description: "Legal",
					url: "/legal/privacy",
					type: "Legal",
				},
				{
					title: "Terms",
					description: "Legal",
					url: "/legal/terms",
					type: "Legal",
				},
			];

			const fuse = new Fuse(searchItems, {
				keys: ["title", "description", "type"],
				threshold: 0.4,
			});
			const fab = document.getElementById("search-fab");
			const modal = document.getElementById("search-modal");
			const input = document.getElementById("search-input");
			const results = document.getElementById("search-results");
			const closeBtn = document.getElementById("search-close");

			function openSearch() {
				modal.style.display = "block";
				setTimeout(() => input.focus(), 50);
				renderResults("");
			}
			function closeSearch() {
				modal.style.display = "none";
				input.value = "";
				results.innerHTML = "";
			}

			fab.addEventListener("click", openSearch);
			closeBtn.addEventListener("click", closeSearch);
			modal.addEventListener("click", (e) => {
				if (e.target === modal) closeSearch();
			});
			document.addEventListener("keydown", (e) => {
				if (e.key === "Escape") closeSearch();
				if ((e.metaKey || e.ctrlKey) && e.key === "k") {
					e.preventDefault();
					openSearch();
				}
			});

			input.addEventListener("input", () => renderResults(input.value));

			function renderResults(query) {
				const items = query.trim()
					? fuse.search(query).map((r) => r.item)
					: searchItems.slice(0, 8);
				if (!items.length) {
					results.innerHTML =
						'<p style="padding:1rem;font-size:0.8125rem;color:color-mix(in oklch,var(--color-primary) 40%,transparent);text-align:center;">No results found</p>';
					return;
				}
				results.innerHTML = items
					.map(
						(item) => `
      <a href="${item.url}" style="display:flex;flex-direction:column;gap:0.125rem;padding:0.625rem 0.75rem;border-radius:0.5rem;text-decoration:none;color:inherit;transition:background 0.15s;" onmouseover="this.style.background='color-mix(in oklch,var(--color-primary) 5%,transparent)'" onmouseout="this.style.background=''">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;">
          <span style="font-size:0.8125rem;font-weight:500;color:var(--color-primary);">${item.title}</span>
          <span style="font-size:0.6875rem;padding:0.125rem 0.5rem;border-radius:9999px;background:color-mix(in oklch,var(--color-primary) 8%,transparent);color:color-mix(in oklch,var(--color-primary) 50%,transparent);white-space:nowrap;">${item.type}</span>
        </div>
        <span style="font-size:0.75rem;color:color-mix(in oklch,var(--color-primary) 50%,transparent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.description}</span>
      </a>
    `,
					)
					.join("");
			}
		})();
		</script>
	</body>
</html>
