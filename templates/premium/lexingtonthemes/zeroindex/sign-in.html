<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign In — ZeroIndex</title>
		<script>
		(function () {
			var t = localStorage.getItem("theme") || "system";
			var d = window.matchMedia("(prefers-color-scheme:dark)").matches;
			document.documentElement.classList.toggle(
				"dark",
				t === "dark" || (t === "system" && d),
			);
		})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="assets/tokens.css">
		<link rel="stylesheet" href="assets/layout.css">
	</head>
	<body>
		<div class="signin-page">
			<div class="signin-card">
				<a
					href="index.html"
					style="display:flex;align-items:center;gap:.5rem;justify-content:center;margin-bottom:1.5rem;color:var(--text-primary);text-decoration:none"
				>
					<svg viewBox="0 0 200 200" fill="none" width="28" height="28">
						<circle cx="100" cy="100" r="100" fill="currentColor" />
						<circle cx="133" cy="59" r="15" fill="white" />
					</svg>
					<span style="font-weight:600;font-size:.875rem">ZeroIndex</span>
				</a>
				<h1>Sign in to ZeroIndex</h1>
				<p>Welcome back! Please sign in to continue.</p>
				<form style="margin-top:1.5rem" onsubmit="return false">
					<div class="form-group">
						<label class="form-label" for="email">Email address</label>
						<input
							class="form-input"
							type="email"
							id="email"
							name="email"
							placeholder="you@example.com"
							autocomplete="email"
						>
					</div>
					<div class="form-group">
						<label class="form-label" for="password">Password</label>
						<input
							class="form-input"
							type="password"
							id="password"
							name="password"
							placeholder="Your password"
							autocomplete="current-password"
						>
					</div>
					<div
						style="display:flex;align-items:center;justify-content:space-between;margin-top:.75rem"
					>
						<label
							style="display:flex;align-items:center;gap:.375rem;font-size:.75rem;color:var(--text-secondary);cursor:pointer"
						>
							<input type="checkbox" style="width:14px;height:14px">
							Remember me
						</label>
						<a href="#" style="font-size:.75rem;color:var(--color-accent-600)"
							>Forgot password?</a
						>
					</div>
					<button
						type="submit"
						style="width:100%;margin-top:1.5rem;height:36px;display:flex;align-items:center;justify-content:center;border-radius:9999px;font-size:.875rem;font-weight:500;color:#fff;background:var(--color-accent-600);border:none;cursor:pointer"
					>
						Sign in
					</button>
				</form>
				<p
					style="font-size:.75rem;color:var(--text-secondary);text-align:center;margin-top:1rem"
				>
					Don't have an account?
					<a href="#" style="color:var(--color-accent-600)">Create one</a>
				</p>
				<div style="margin-top:1.5rem;text-align:center">
					<a
						href="index.html"
						style="font-size:.75rem;color:var(--text-secondary)"
						>&larr; Back to home</a
					>
				</div>
			</div>
		</div>
		<script src="assets/main.js"></script>
	</body>
</html>
