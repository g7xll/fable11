		<style>
		:root {
			--white: oklch(95% 0.0187 80.72);
			--black: oklch(29% 0 0);
			--orange: oklch(60% 0.1499 37.55);
			--cyan: oklch(80% 0.0456 250.63);
			--yellow: oklch(75% 0.1081 64.85);
			--gray: oklch(83% 0.0018 325.59);
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html {
			font-family: "Geist", sans-serif;
		}

		body {
			display: flex;
			flex-direction: column;
			min-height: 100vh;
			background-color: var(--white);
			color: var(--black);
		}

		/* ── HEADER ── */
		header {
			background: var(--white);
			border-bottom: 1px dashed rgba(0, 0, 0, 0.2);
			position: sticky;
			top: 0;
			z-index: 50;
		}

		.header-inner {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 8px 24px;
			max-width: 1280px;
			margin: 0 auto;
			width: 100%;
		}

		.logo-link {
			color: var(--black);
			text-decoration: none;
		}
		.logo-link:hover {
			color: var(--orange);
		}
		.logo-link svg {
			height: 32px;
			display: block;
		}

		.header-nav {
			display: flex;
			align-items: center;
			gap: 12px;
			margin-left: auto;
		}

		.nav-link {
			font-weight: 600;
			font-size: 0.875rem;
			color: var(--black);
			text-decoration: none;
			transition: color 0.2s;
		}
		.nav-link:hover {
			color: var(--orange);
		}

		.btn-signin {
			font-weight: 600;
			font-size: 0.75rem;
			color: #fff;
			background: var(--black);
			text-decoration: none;
			padding: 6px 14px;
			border-radius: 4px;
			transition: background 0.2s;
		}
		.btn-signin:hover {
			background: rgba(0, 0, 0, 0.8);
		}

		.icon-btn {
			display: flex;
			align-items: center;
			justify-content: center;
			width: 32px;
			height: 32px;
			background: var(--black);
			color: #fff;
			border: none;
			border-radius: 4px;
			cursor: pointer;
		}

		/* ── MAIN ── */
		main {
			flex: 1;
			display: flex;
			align-items: flex-start;
			justify-content: center;
			padding: 80px 24px 60px;
		}

		.auth-card {
			width: 100%;
			max-width: 28rem;
		}

		.auth-card h1 {
			font-size: 1.5rem;
			font-weight: 700;
			letter-spacing: -0.025em;
			color: var(--black);
			margin-bottom: 6px;
		}

		.auth-subtitle {
			font-size: 0.875rem;
			color: oklch(50% 0 0);
			margin-bottom: 28px;
		}

		.form-group {
			display: flex;
			flex-direction: column;
			gap: 6px;
			margin-bottom: 16px;
		}

		.form-group label {
			font-size: 0.8125rem;
			font-weight: 600;
			color: var(--black);
		}

		.form-group input {
			width: 100%;
			height: 42px;
			padding: 0 12px;
			background: transparent;
			border: 1px dashed var(--black);
			color: var(--black);
			font-family: "Geist", sans-serif;
			font-size: 0.875rem;
			outline: none;
			transition: box-shadow 0.15s;
		}

		.form-group input::placeholder {
			color: oklch(60% 0 0);
		}

		.form-group input:focus {
			box-shadow: 0 0 0 2px var(--black);
		}

		.btn-primary {
			display: block;
			width: 100%;
			padding: 12px;
			background: var(--black);
			color: #fff;
			font-family: "Geist", sans-serif;
			font-size: 0.9375rem;
			font-weight: 600;
			border: none;
			cursor: pointer;
			transition: background 0.2s;
			margin-top: 8px;
			letter-spacing: -0.01em;
		}

		.btn-primary:hover {
			background: oklch(20% 0 0);
		}

		.divider {
			display: flex;
			align-items: center;
			gap: 12px;
			margin: 24px 0;
			color: oklch(55% 0 0);
			font-size: 0.8125rem;
		}

		.divider::before,
		.divider::after {
			content: "";
			flex: 1;
			height: 1px;
			border-top: 1px dashed oklch(70% 0 0);
		}

		.social-btns {
			display: flex;
			gap: 10px;
		}

		.btn-social {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
			height: 42px;
			background: transparent;
			border: 1px solid var(--black);
			color: var(--black);
			font-family: "Geist", sans-serif;
			font-size: 0.875rem;
			font-weight: 600;
			cursor: pointer;
			text-decoration: none;
			transition: background 0.15s;
		}

		.btn-social:hover {
			background: oklch(92% 0.01 80);
		}

		.auth-switch {
			margin-top: 24px;
			font-size: 0.875rem;
			color: oklch(50% 0 0);
			text-align: center;
		}

		.auth-switch a {
			color: var(--black);
			font-weight: 600;
			text-decoration: underline;
			text-underline-offset: 3px;
		}

		/* ── FOOTER ── */
		footer {
			margin-top: auto;
		}

		.footer-bars {
			display: flex;
			flex-direction: column;
			gap: 0;
		}

		.footer-bar-2 {
			height: 2px;
			background: var(--black);
		}
		.footer-bar-4 {
			height: 4px;
			background: var(--black);
		}
		.footer-bar-8 {
			height: 8px;
			background: var(--black);
		}
		.footer-bar-12 {
			height: 12px;
			background: var(--black);
		}

		.footer-band {
			background: var(--black);
			padding: 32px 24px;
		}

		.footer-band-inner {
			max-width: 1280px;
			margin: 0 auto;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 20px;
			flex-wrap: wrap;
		}

		.footer-social-btn {
			display: flex;
			align-items: center;
			justify-content: center;
			width: 36px;
			height: 36px;
			color: #fff;
			text-decoration: none;
			border-radius: 4px;
			transition: background 0.2s;
		}
		.footer-social-btn:hover {
			background: rgba(255, 255, 255, 0.1);
		}

		.footer-nav-row {
			background: var(--black);
			padding: 0 24px 12px;
		}

		.footer-nav-inner {
			max-width: 1280px;
			margin: 0 auto;
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: center;
			gap: 4px 20px;
		}

		.footer-nav-link {
			font-size: 0.8125rem;
			color: rgba(255, 255, 255, 0.7);
			text-decoration: none;
			transition: color 0.2s;
		}
		.footer-nav-link:hover {
			color: #fff;
		}
		.footer-sep {
			color: rgba(255, 255, 255, 0.3);
			font-size: 0.75rem;
		}

		.footer-wordmark {
			background: var(--black);
			padding: 16px 24px 0;
			text-align: center;
		}

		.footer-wordmark svg {
			height: 80px;
			color: #fff;
			display: inline-block;
		}

		@media (max-width: 540px) {
			.footer-wordmark svg {
				height: 48px;
			}
		}

		.footer-copyright {
			background: var(--black);
			padding: 12px 24px 24px;
			text-align: center;
			font-size: 0.75rem;
			color: rgba(255, 255, 255, 0.5);
			font-family: "Geist Mono", monospace;
		}
