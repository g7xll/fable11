<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign In — StudioMax</title>
		<meta name="description" content="Sign in to your StudioMax account.">
		<meta name="theme-color" content="#000000">
		<link rel="preconnect" href="https://rsms.me/">
		<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
		<link
			href="https://api.fontshare.com/v2/css?f[]=jet-brains-mono@1,2&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body class="bg-black">
		<div
			style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;"
			class="bg-stripes"
		>
			<div
				style="width:100%;max-width:28rem;padding:2rem;background-color:var(--color-base-950);border-radius:0.75rem;outline:1px solid var(--color-base-900);box-shadow:0 25px 50px -12px black;"
			>
				<!-- Logo -->
				<div style="display:flex;justify-content:center;margin-bottom:2rem;">
					<a href="index.html" aria-label="Go to StudioMax homepage">
						<svg
							style="height:2rem;color:white;"
							viewBox="0 0 126 125"
							fill="none"
							xmlns="http://www.w3.org/2000/svg"
						>
							<path
								fill-rule="evenodd"
								clip-rule="evenodd"
								d="M108.4 84C108.4 97.4 97.5 108 84.2 108H0V124.7H84.2C106.7 124.7 125 106.4 125 83.9C125 61.4 106.7 43.1 84.2 43.1H40.8999C39.5 43.1 38.3999 42 38.3999 40.6C38.3999 39.2 39.5 38.1 40.8999 38.1H125.1V21.4H40.8999C30.2999 21.4 21.7 30 21.7 40.6C21.7 51.2 30.2999 59.8 40.8999 59.8H84.2C97.6 59.8 108.4 70.7 108.4 84ZM16.7 40.7C16.7 27.2999 27.6 16.5 40.8999 16.5L125.1 16.7V0H40.8999C18.3999 0 0.0999756 18.3 0.0999756 40.8C0.0999756 63.3 18.3999 81.6 40.8999 81.6H84.2C85.6 81.6 86.7 82.7 86.7 84.1C86.7 85.5 85.6 86.6 84.2 86.6H0V103.3H84.2C94.8 103.3 103.4 94.7 103.4 84.1C103.4 73.5 94.8 64.9 84.2 64.9H40.8999C27.5 64.9 16.7 54.1 16.7 40.7Z"
								fill="currentColor"
							/>
						</svg>
					</a>
				</div>

				<h1
					style="font-size:1.5rem;color:white;font-weight:100;letter-spacing:-0.05em;font-family:var(--font-mono);text-transform:uppercase;text-align:center;margin-bottom:2rem;"
				>
					Sign in
				</h1>

				<form style="display:flex;flex-direction:column;gap:1rem;">
					<div>
						<label
							style="display:block;font-size:0.75rem;color:var(--color-base-400);margin-bottom:0.5rem;font-family:var(--font-mono);text-transform:uppercase;"
							>Email</label
						>
						<input
							type="email"
							name="email"
							autocomplete="email"
							placeholder="you@example.com"
							class="contact-input"
							style="width:100%;"
						>
					</div>
					<div>
						<label
							style="display:block;font-size:0.75rem;color:var(--color-base-400);margin-bottom:0.5rem;font-family:var(--font-mono);text-transform:uppercase;"
							>Password</label
						>
						<input
							type="password"
							name="password"
							autocomplete="current-password"
							placeholder="••••••••"
							class="contact-input"
							style="width:100%;"
						>
					</div>

					<div
						style="display:flex;align-items:center;justify-content:space-between;"
					>
						<label
							style="display:flex;align-items:center;gap:0.5rem;font-size:0.875rem;color:var(--color-base-400);cursor:pointer;"
						>
							<input type="checkbox" name="remember">
							Remember me
						</label>
						<a
							href="#"
							style="font-size:0.875rem;color:var(--color-base-400);transition:color 200ms;"
							onmouseover="this.style.color='white'"
							onmouseout="this.style.color='var(--color-base-400)'"
							>Forgot your password?</a
						>
					</div>

					<div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
						<button
							type="button"
							class="btn btn-md btn-light"
							style="flex:1;justify-content:center;"
						>
							<svg
								xmlns="http://www.w3.org/2000/svg"
								viewBox="0 0 24 24"
								style="width:1rem;height:1rem;margin-right:0.5rem;"
								fill="currentColor"
							>
								<path
									d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
								/>
								<path
									d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
								/>
								<path
									d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
								/>
								<path
									d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
								/>
							</svg>
							Sign in with Google
						</button>
						<button
							type="submit"
							class="btn btn-md btn-accent"
							style="flex:1;justify-content:center;"
						>
							Submit
						</button>
					</div>
				</form>

				<p
					style="text-align:center;font-size:0.875rem;color:var(--color-base-500);margin-top:1.5rem;"
				>
					Accountless?
					<a
						href="sign-up.html"
						style="color:var(--color-base-400);transition:color 200ms;"
						onmouseover="this.style.color='white'"
						onmouseout="this.style.color='var(--color-base-400)'"
						>Sign up now</a
					>
				</p>
			</div>
		</div>
	</body>
</html>
