				<nav class="nav-links">
					<a href="customers.html">Customers</a><a href="blog.html">Blog</a
					><a href="helpcenter.html">Help</a><a href="jobs.html">Jobs</a
					><a href="system-overview.html">Overview</a>
					<div class="nav-ctas">
						<a href="sign-in.html" class="btn btn-ghost btn-sm">Sign in</a
						><a href="sign-up.html" class="btn btn-primary btn-sm">Sign up</a>
					</div>
				</nav>
				<div class="mobile-menu-toggle">
					<button
						id="menu-toggle"
						class="btn btn-primary btn-icon-sm"
						aria-label="Toggle menu"
					>
						<svg
							id="menu-icon"
							xmlns="http://www.w3.org/2000/svg"
							viewBox="0 0 256 256"
							fill="currentColor"
							width="16"
							height="16"
						>
							<path
								d="M222,128a6,6,0,0,1-6,6H40a6,6,0,0,1,0-12H216A6,6,0,0,1,222,128ZM40,70H216a6,6,0,0,0,0-12H40a6,6,0,0,0,0,12ZM216,186H40a6,6,0,0,0,0,12H216a6,6,0,0,0,0-12Z"
							/>
						</svg>
						<svg
							id="close-icon"
							class="hidden"
							xmlns="http://www.w3.org/2000/svg"
							viewBox="0 0 256 256"
							fill="currentColor"
							width="16"
							height="16"
						>
							<path
								d="M204.24,195.76a6,6,0,1,1-8.48,8.48L128,136.49,60.24,204.24a6,6,0,0,1-8.48-8.48L119.51,128,51.76,60.24a6,6,0,0,1,8.48-8.48L128,119.51l67.76-67.75a6,6,0,0,1,8.48,8.48L136.49,128Z"
							/>

					</button>
					<nav id="mobile-menu" class="mobile-menu">
						<div>
							<div class="mobile-menu-inner">
								<a href="customers.html">Customers</a
								><a href="blog.html">Blog</a><a href="helpcenter.html">Help</a
								><a href="jobs.html">Jobs</a>
								<div class="mobile-menu-ctas">
									<a href="sign-in.html" class="btn btn-ghost btn-sm">Sign in</a
									><a href="sign-up.html" class="btn btn-primary btn-sm"
										>Sign up</a
									>
								</div>
							</div>
						</div>
					</nav>
				</div>
			</div>
		</div>

		<main>
			<div class="auth-page" style="padding-top:6rem;">
				<div style="width:100%; max-width:28rem;">
					<div style="text-align:center; margin-bottom:2rem;">
						<a
							href="index.html"
							style="font-size:1.75rem; font-weight:600; color:#fff; font-family:'Geist',sans-serif;"
							>buio®</a
						>
					</div>
					<div class="auth-box">
						<h1 class="auth-title">Sign up</h1>
						<p class="auth-subtitle">
							Create your account and start building on Web3 today.
						</p>
						<form onsubmit="return false;">
							<div class="form-group">
								<label class="form-label" for="fullname">Full name</label>
								<input
									type="text"
									id="fullname"
									class="form-input"
									placeholder="Satoshi Nakamoto"
									autocomplete="name"
								>
							</div>
							<div class="form-group">
								<label class="form-label" for="email">Email address</label>
								<input
									type="email"
									id="email"
									class="form-input"
									placeholder="you@example.com"
									autocomplete="email"
								>
							</div>
							<div class="form-group">
								<label class="form-label" for="password">Password</label>
								<input
									type="password"
									id="password"
									class="form-input"
									placeholder="••••••••"
									autocomplete="new-password"
								>
							</div>
							<div class="form-group">
								<label class="form-label" for="confirm">Confirm password</label>
								<input
									type="password"
									id="confirm"
									class="form-input"
									placeholder="••••••••"
									autocomplete="new-password"
								>
							</div>
							<button
								type="submit"
								class="btn btn-primary btn-lg btn-block"
								style="margin-top:1rem; border-radius:var(--radius-full);"
							>
								Create account
							</button>
						</form>
						<p
							style="margin-top:1.5rem; font-size:0.875rem; color:var(--color-base-400); text-align:center;"
						>
							Already have an account?
							<a href="sign-in.html" style="color:#fff;">Sign in</a>
						</p>
						<p
							style="margin-top:1rem; font-size:0.75rem; color:var(--color-base-500); text-align:center;"
						>
							By creating an account, you agree to our
							<a href="#" style="color:var(--color-base-400);"
								>Terms of Service</a
							>
							and
							<a href="#" style="color:var(--color-base-400);"
								>Privacy Policy</a
							>.
						</p>
					</div>
				</div>
			</div>
		</main>

		<script src="assets/shared.js"></script>
	</body>
</html>
