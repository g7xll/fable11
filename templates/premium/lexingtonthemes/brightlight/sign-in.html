<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign in — Brightlight</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,500;0,600;1,400&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="assets/styles.css">
		<style>
		body {
			justify-content: center;
			align-items: center;
			min-height: 100vh;
		}
		.sign-in-card {
			width: 100%;
			max-width: 24rem;
			padding: 2rem;
			background-color: #fff;
			border-radius: 0.75rem;
			box-shadow: 0 4px 24px 0 rgb(0 0 0 / 0.08);
			outline: 1px solid oklch(68.28% 0.074 88.38 / 0.1);
			margin: auto;
		}
		.form-group {
			display: flex;
			flex-direction: column;
			gap: 0.375rem;
			margin-top: 1rem;
		}
		.form-label {
			font-size: 0.875rem;
			font-weight: 500;
			color: var(--color-base-700);
		}
		.form-input {
			padding: 0.5rem 0.75rem;
			border: 1px solid var(--color-base-200);
			border-radius: 0.5rem;
			font-size: 0.875rem;
			color: var(--color-base-900);
			background-color: #fff;
			outline: none;
			transition: border-color 200ms;
			font-family: var(--font-sans);
		}
		.form-input:focus {
			border-color: var(--color-accent-400);
			box-shadow: 0 0 0 3px oklch(73.19% 0.135 87.88 / 0.2);
		}
		.form-divider {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			margin-top: 1.5rem;
			color: var(--color-base-400);
			font-size: 0.75rem;
		}
		.form-divider::before,
		.form-divider::after {
			content: "";
			flex: 1;
			height: 1px;
			background-color: var(--color-base-200);
		}
		.social-btn {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 0.5rem;
			padding: 0.5rem 1rem;
			border: 1px solid var(--color-base-200);
			border-radius: 0.5rem;
			font-size: 0.875rem;
			font-weight: 500;
			color: var(--color-base-700);
			background-color: #fff;
			cursor: pointer;
			transition: background-color 200ms;
			font-family: var(--font-sans);
			width: 100%;
		}
		.social-btn:hover {
			background-color: var(--color-sand-100);
		}
		</style>
	</head>
	<body>
		<main
			style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;"
		>
			<div style="width:100%;max-width:24rem;">
				<!-- Logo -->
				<div style="text-align:center;margin-bottom:2rem;">
					<a
						href="index.html"
						class="nav-logo"
						style="justify-content:center;display:inline-flex;"
					>
						<svg
							xmlns="http://www.w3.org/2000/svg"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
							class="nav-logo-icon"
						>
							<path stroke="none" d="M0 0h24v24H0z" fill="none" />
							<path
								d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"
							/>
							<path
								d="M17 4a2 2 0 0 0 2 2a2 2 0 0 0 -2 2a2 2 0 0 0 -2 -2a2 2 0 0 0 2 -2"
							/>
							<path d="M19 11h2m-1 -1v2" />
						</svg>
						<span>Brightlight</span>
					</a>
				</div>

				<div class="sign-in-card">
					<div style="text-align:center;">
						<h1
							style="font-family:var(--font-serif);font-size:1.5rem;font-weight:500;color:var(--color-base-900);"
						>
							Welcome back
						</h1>
						<p
							class="text-muted"
							style="font-size:0.875rem;margin-top:0.25rem;"
						>
							Sign in to your Brightlight account
						</p>
					</div>

					<form
						action="#"
						method="post"
						style="margin-top:1.5rem;"
						onsubmit="return false;"
					>
						<div class="form-group">
							<label class="form-label" for="email">Email address</label>
							<input
								class="form-input"
								type="email"
								id="email"
								name="email"
								placeholder="you@example.com"
								autocomplete="email"
								required
							>
						</div>
						<div class="form-group">
							<div
								style="display:flex;align-items:center;justify-content:space-between;"
							>
								<label class="form-label" for="password">Password</label>
								<a
									href="#"
									style="font-size:0.75rem;color:var(--color-accent-600);text-decoration:none;"
									onmouseover="this.style.color=\'var(--color-accent-700)\'"
									onmouseout="this.style.color=\'var(--color-accent-600)\'"
									>Forgot password?</a
								>
							</div>
							<input
								class="form-input"
								type="password"
								id="password"
								name="password"
								placeholder="Enter your password"
								autocomplete="current-password"
								required
							>
						</div>
						<button
							type="submit"
							class="btn btn-primary"
							style="width:100%;height:2.5rem;font-size:0.875rem;margin-top:1.5rem;"
						>
							Sign in
						</button>
					</form>

					<div class="form-divider">or</div>

					<div
						style="display:flex;flex-direction:column;gap:0.75rem;margin-top:1rem;"
					>
						<button class="social-btn">
							<svg
								viewBox="0 0 24 24"
								style="width:1rem;height:1rem;flex-shrink:0;"
								aria-hidden="true"
							>
								<path
									d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
									fill="#4285F4"
								/>
								<path
									d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
									fill="#34A853"
								/>
								<path
									d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
									fill="#FBBC05"
								/>
								<path
									d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
									fill="#EA4335"
								/>
							</svg>
							Continue with Google
						</button>
						<button class="social-btn">
							<svg
								viewBox="0 0 24 24"
								style="width:1rem;height:1rem;flex-shrink:0;"
								aria-hidden="true"
								fill="currentColor"
							>
								<path
									d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
								/>
							</svg>
							Continue with GitHub
						</button>
					</div>

					<p
						style="font-size:0.75rem;color:var(--color-base-500);text-align:center;margin-top:1.5rem;"
					>
						Don't have an account?
						<a
							href="#"
							style="color:var(--color-accent-600);text-decoration:none;font-weight:500;"
							>Sign up for free</a
						>
					</p>
				</div>
			</div>
		</main>
	</body>
</html>
