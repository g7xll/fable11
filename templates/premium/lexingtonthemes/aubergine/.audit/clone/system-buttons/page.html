					slug: "6",

			];
			window.addEventListener("load", () => {
				const sb = document.getElementById("searchButton"),
					sm = document.getElementById("searchModal"),
					mo = document.getElementById("modalOverlay"),
					si = document.getElementById("searchInput"),
					sr = document.getElementById("searchResults"),
					cs = document.getElementById("closeSearch");
				const fuse = new Fuse(posts, {
					keys: ["title", "description", "pubDate"],
					threshold: 0.3,
					includeMatches: true,
				});
				sr.classList.add("hidden");
				function open(e) {
					e.preventDefault();
					e.stopPropagation();
					sm.classList.remove("hidden");
					document.body.style.overflow = "hidden";
					setTimeout(() => si.focus(), 100);
				}
				function close(e) {
					if (e) {
						e.preventDefault();
						e.stopPropagation();
					}
					sm.classList.add("hidden");
					document.body.style.overflow = "";
					si.value = "";
					sr.innerHTML = "";
					sr.classList.add("hidden");
				}
				function render(r) {
					if (!si.value.trim()) {
						sr.innerHTML = "";
						sr.classList.add("hidden");
						return;
					}
					if (!r.length) {
						sr.innerHTML =
							'<div class="p-4"><h3 class="font-medium text-base text-base-500">There\'s nothing here,...</h3></div>';
						sr.classList.remove("hidden");
						return;
					}
					sr.innerHTML = r
						.map(
							(x) =>
								`<a href="../blog/posts/${x.item.slug}.html" class="block p-8 duration-300 hover:bg-white/5"><p class="text-xs text-base-500">${new Date(x.item.pubDate).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "2-digit" })}</p><h3 class="font-medium text-sm mt-2 text-white">${x.item.title}</h3><p class="text-base-500 text-xs">${x.item.description}</p></a>`,
						)
						.join("");
					sr.classList.remove("hidden");
				}
				sb.addEventListener("click", open);
				sb.addEventListener("touchend", open);
				cs.addEventListener("click", close);
				cs.addEventListener("touchend", close);
				mo.addEventListener("click", close);
				mo.addEventListener("touchend", close);
				si.addEventListener("input", (e) => {
					const v = e.target.value.trim();
					render(v ? fuse.search(v) : []);
				});
				document.addEventListener("keydown", (e) => {
					if (e.key === "Escape" && !sm.classList.contains("hidden")) close();
				});
			});
		})();
