	<body>

		<!-- Search button -->

				></path>
			</svg>
		</button>

		<!-- Search modal -->
		<div id="searchModal" class="search-modal" role="dialog" aria-modal="true">

						id="searchInput"
						placeholder="Search posts..."

					>
					<div id="searchResults" class="scrollbar-hide"></div>
				</div>
			</div>
		</div>

		<main class="relative grow">
			<section class="relative overflow-hidden">
				<div
					class="px-8 mx-auto md:px-12 lg:px-36  max-w-7xl  flex flex-col lg:h-dvh items-center justify-center"
				>
					<div
						class="text-center mx-auto aos-init aos-animate"
						data-aos="fade-down"
						data-aos-duration="3000"
					>
						<span
							data-aos="fade-down"
							data-aos-duration="2500"
							class="flex items-center justify-center size-24 text-accent-300 rounded-xl border bg-gradient-to-tr mx-auto from-base-950 to-base-700 border-base-800 shadow-massive text-2xl aos-init aos-animate"
							>404</span
						>
						<h1
							class="text-2xl  md:text-3xl lg:text-4xl text-4xl mt-12 lg:text-6xl text-white font-display"
						>
							What you are looking for<span class="md:block text-base-400"
								>might have been moved.</span
							>
						</h1>
						<p class="text-base text-base-300 mt-4">
							Unless you are looking for office space
						</p>
						<div class="flex flex-wrap justify-center gap-3 mt-12">
							<a
								href="index.html"
								class="flex relative transition text-center font-medium items-center shadow-massive justify-center duration-300 ease-in-out transition-all hover:shadow-none outline focus:outline-offset-4 oultine-offset-base-900 focus-visible:outline-none focus:outline-2 text-accent-950 bg-linear-to-tr/oklch from-accent-500 via-accent-400 to-accent-300 hover:to-accent-400  focus:outline-accent-300 outline-accent-400 h-12 px-8 py-3 text-lg rounded-xl"
								>Go back home</a
							>
						</div>
					</div>

		<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
		<script
			src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"
		></script>
		<script
			src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.basic.min.js"
		></script>
		<script>
		(function () {
			// AOS
			AOS.init({
				duration: 600,
				easing: "ease",
				once: true,
				offset: 50,
				disable: false,
			});

			// Vanilla Tilt
			VanillaTilt.init(document.querySelectorAll("[data-tilt]"), {
				max: 5,
				speed: 400,
				glare: true,
				"max-glare": 0.2,
			});

			// Nav scroll expand
			const navContainer = document.getElementById("nav-container");
			if (navContainer) {
				window.addEventListener("scroll", () => {
					if (window.pageYOffset > 50) {
						navContainer.classList.add("expanded");
					} else {
						navContainer.classList.remove("expanded");
					}
				});
			}

			// Nav toggle
			const navToggle = document.getElementById("nav-toggle");
			const navMenu = document.getElementById("nav-menu");
			if (navToggle && navMenu) {
				navToggle.addEventListener("click", () => {
					navMenu.classList.toggle("open");
				});
			}

			// Search
			const posts = [
				{
					title: "The 3-Day Productized Website Sprint",
					pubDate: "2026-01-01",
					description:
						"How we ship a production-ready marketing site in 72 hours with a fixed scope, clear roles, and zero back-and-forth.",
					slug: "1",
				},
				{
					title: "Onboarding Clients in 24 Hours",
					pubDate: "2026-01-02",
					description:
						"A repeatable intake playbook that moves prospects from curious to ready-to-build in one day.",
					slug: "2",
				},
				{
					title: "Async Collaboration for Productized Builds",
					pubDate: "2026-01-03",
					description:
						"The rituals, tools, and cadences we use to keep builds moving without endless meetings.",
					slug: "3",
				},
				{
					title: "Measuring ROI on Productized Design",
					pubDate: "2026-01-04",
					description:
						"Simple metrics to prove the value of a fixed-scope design engagement without drowning in dashboards.",
					slug: "4",
				},
				{
					title: "Pricing a Productized Service with Confidence",
					pubDate: "2026-01-05",
					description:
						"A lightweight pricing ladder that keeps margins healthy and clients decisive.",
					slug: "5",
				},
				{
					title: "The Maintenance Blueprint for Productized Sites",
					pubDate: "2026-01-06",
					description:
						"Keep shipped work fast, secure, and consistent with a lightweight monthly plan.",
					slug: "6",
				},
			];

			window.addEventListener("load", () => {
				const searchButton = document.getElementById("searchButton");
				const searchModal = document.getElementById("searchModal");
				const modalOverlay = document.getElementById("modalOverlay");
				const searchInput = document.getElementById("searchInput");
				const searchResults = document.getElementById("searchResults");

				const fuse = new Fuse(posts, {
					keys: ["title", "description", "pubDate"],
					threshold: 0.3,
					includeMatches: true,
				});

				function openSearch(e) {
					e.preventDefault();
					e.stopPropagation();
					searchModal.classList.add("open");
					document.body.style.overflow = "hidden";
					setTimeout(() => searchInput.focus(), 100);
				}
				function closeSearch() {
					searchModal.classList.remove("open");
					document.body.style.overflow = "";
					searchInput.value = "";
					searchResults.innerHTML = "";
					searchResults.classList.remove("visible");
				}

				function renderResults(results) {
					if (!searchInput.value.trim()) {
						searchResults.innerHTML = "";
						searchResults.classList.remove("visible");
						return;
					}
					if (results.length === 0) {
						searchResults.innerHTML =
							'<div class="search-empty">Nothing found for that search.</div>';
						searchResults.classList.add("visible");
						return;
					}
					searchResults.innerHTML = results
						.map(
							(r) =>
								`<a href="blog/index.html" class="search-result-item"><p class="search-result-date">${new Date(r.item.pubDate).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "2-digit" })}</p><h3 class="search-result-title">${r.item.title}</h3><p class="search-result-desc">${r.item.description}</p></a>`,
						)
						.join("");
					searchResults.classList.add("visible");
				}

				searchButton.addEventListener("click", openSearch);
				modalOverlay.addEventListener("click", closeSearch);
				searchInput.addEventListener("input", (e) => {
					const v = e.target.value.trim();
					renderResults(v ? fuse.search(v) : []);
				});
				document.addEventListener("keydown", (e) => {
					if (e.key === "Escape") closeSearch();
				});
			});

			// FAQ accordion
			document.querySelectorAll(".faq-question").forEach((btn) => {
				btn.addEventListener("click", () => {
					const item = btn.closest(".faq-item");
					const isOpen = item.classList.contains("open");
					document
						.querySelectorAll(".faq-item")
						.forEach((i) => i.classList.remove("open"));
					if (!isOpen) item.classList.add("open");
				});
			});
		})();
		</script>
	</body>
