<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Buttons — Alessandro P</title>
		<link rel="preconnect" href="https://rsms.me/">
		<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
		<link rel="stylesheet" href="../../styles.css">
		<script>
		(function () {
			var stored = localStorage.getItem("theme");
			var prefersDark = window.matchMedia(
				"(prefers-color-scheme: dark)",
			).matches;
			if (stored === "dark" || (!stored && prefersDark)) {
				document.documentElement.classList.add("dark");
			} else {
				document.documentElement.classList.add("light");
			}
		})();
		</script>
	</head>
	<body>
		<nav class="nav">
			<div class="container nav-inner">
				<a href="../../index.html" class="nav-logo"
					><span>alessandro.p</span></a
				>
				<p class="nav-location">Helsinki, Finland<br>Creative Technologist</p>
				<div class="nav-links">
					<a href="../../index.html#work">Work</a>
					<a href="../../index.html#projects">Projects</a>
					<a href="../../index.html#education">Education</a>
					<a href="../../index.html#speaking">Speaking</a>
					<a href="../overview/index.html">Components</a>
				</div>
				<div
					style="display:flex;align-items:center;gap:0.75rem;justify-content:flex-end;"
				>
					<button
						class="theme-toggle"
						id="theme-toggle"
						aria-label="Toggle theme"
					>
						<svg
							id="icon-sun"
							xmlns="http://www.w3.org/2000/svg"
							width="14"
							height="14"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
							style="display:none"
						>
							<circle cx="12" cy="12" r="4" />
							<path
								d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
							/>
						</svg>
						<svg
							id="icon-moon"
							xmlns="http://www.w3.org/2000/svg"
							width="14"
							height="14"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
						</svg>
					</button>
					<div class="mobile-nav">
						<button
							class="hamburger-btn"
							id="hamburger"
							aria-label="Toggle menu"
						>
							<span></span><span></span><span></span>
						</button>
					</div>
				</div>
			</div>
			<div class="mobile-menu" id="mobile-menu">
				<a href="../../index.html#work">Work</a>
				<a href="../../index.html#projects">Projects</a>
				<a href="../../index.html#education">Education</a>
				<a href="../../index.html#speaking">Speaking</a>
				<a href="../overview/index.html">Components</a>
			</div>
		</nav>

		<main>
			<section>
				<div class="container system-container">
					<div class="system-header">
						<h1 class="system-title">Buttons</h1>
						<p class="system-subtitle" style="grid-column:span 2;">
							Button components used across the interface
						</p>
					</div>

					<div class="system-row">
						<h3 class="system-row-label">Primary</h3>
						<div class="btn-row" style="border:none;padding-top:0;">
							<button class="btn-primary">Download</button>
							<button class="btn-primary">View Work</button>
							<button class="btn-primary">Get in Touch</button>
						</div>
					</div>

					<div class="system-row">
						<h3 class="system-row-label">Secondary</h3>
						<div class="btn-row" style="border:none;padding-top:0;">
							<button class="btn-secondary">Components</button>
							<button class="btn-secondary">View Project</button>
							<button class="btn-secondary">Read More</button>
						</div>
					</div>

					<div class="system-row">
						<h3 class="system-row-label">Arrow Link</h3>
						<div class="btn-row" style="border:none;padding-top:0;">
							<a href="#" class="arrow-link" style="margin-left:0;">
								<span style="font-size:0.875rem;margin-right:0.5rem;"
									>Visit Project</span
								>
								<svg
									xmlns="http://www.w3.org/2000/svg"
									width="16"
									height="16"
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round"
								>
									<path d="M5 12h14" />
									<path d="m13 6 6 6-6 6" />
								</svg>
							</a>
						</div>
					</div>
				</div>
			</section>
		</main>

		<footer>
			<div class="container footer-inner">
				<div class="footer-grid">
					<div class="footer-copy">
						<span>2026</span><span>alessandro.p</span>
					</div>
					<div class="footer-links">
						<a href="#">LinkedIn</a>
						<a href="#">Arena</a>
						<a href="#">GitHub</a>
					</div>
				</div>
			</div>
		</footer>

		<script>
		var toggleBtn = document.getElementById("theme-toggle");
		var iconSun = document.getElementById("icon-sun");
		var iconMoon = document.getElementById("icon-moon");
		function updateIcons() {
			if (document.documentElement.classList.contains("dark")) {
				iconSun.style.display = "block";
				iconMoon.style.display = "none";
			} else {
				iconSun.style.display = "none";
				iconMoon.style.display = "block";
			}
		}
		updateIcons();
		toggleBtn.addEventListener("click", function () {
			var isDark = document.documentElement.classList.toggle("dark");
			document.documentElement.classList.toggle("light", !isDark);
			localStorage.setItem("theme", isDark ? "dark" : "light");
			updateIcons();
		});
		var hamburger = document.getElementById("hamburger");
		var mobileMenu = document.getElementById("mobile-menu");
		hamburger.addEventListener("click", function () {
			var isOpen = mobileMenu.classList.toggle("open");
			hamburger.classList.toggle("open", isOpen);
		});
		mobileMenu.querySelectorAll("a").forEach(function (link) {
			link.addEventListener("click", function () {
				mobileMenu.classList.remove("open");
				hamburger.classList.remove("open");
			});
		});
		</script>
	</body>
</html>
