":"Bathroom renovation","description":"A full bathroom transformation featuring modern tiling, sleek fixtures, \nimproved lighting, and a layout optimised for comfort and usability.\n","category":"Projects","url":"/projects/bathroom-renovation"},{"title":"External garden path build","description":"A durable and visually appealing garden path designed to blend naturally with \nthe landscape while improving accessibility and outdoor flow.\n","category":"Projects","url":"/projects/external-garden-path"},{"title":"Loft conversion","description":"A bespoke loft conversion designed to create a bright, functional new living \nspace, complete with structural upgrades, insulation, and premium finishing details.\n","category":"Projects","url":"/projects/loft-conversion"},{"title":"Modern kitchen refit","description":"A complete kitchen transformation featuring bespoke cabinetry, premium \nmaterials, and a clean, modern layout designed for everyday living and entertaining.\n","category":"Projects","url":"/projects/modern-kitchen-refit"},{"title":"Extensions","description":"Home extensions are the perfect way to create more room without relocating. \nWhether you're extending your kitchen, adding a new living area, or creating \na multifunctional space, we manage the entire process from structural work \nto finishing details.\n\nEvery extension is designed to complement your home's character while \nimproving comfort, flow, and long-term value. Our team ensures a smooth, \nefficient build with craftsmanship you can rely on.\n","category":"Services","url":"/services/extensions"},{"title":"External Works","description":"We deliver high-quality exterior work that strengthens your property and \nelevates its curb appeal. From driveways, patios, and pathways to fencing, \nbrickwork, and garden structures, every project is built to last.\n\nOur team combines practical construction expertise with thoughtful design, \nensuring your outdoor spaces are functional, attractive, and tailored to your \nhome's style. Whether you're upgrading for aesthetics or long-term durability, \nwe bring craftsmanship you can rely on.\n","category":"Services","url":"/services/external-works"},{"title":"Kitchens","description":"We create stunning kitchens that blend style, functionality, and craftsmanship. \nWhether you're looking for a sleek modern layout or a warm traditional space, \nour team handles everything from planning and design to installation and finishing. \nWe ensure every detail—cabinetry, lighting, worktops, and layout—comes together \nto create a kitchen that perfectly fits your needs and elevates your home.\n","category":"Services","url":"/services/kitchens"},{"title":"Bathrooms","description":"We design and renovate bathrooms that combine comfort, practicality, and \nmodern craftsmanship. From bespoke tiling and premium fixtures to thoughtful \nlighting and efficient layouts, every detail is handled with expertise.\n\nWhether you're updating an en-suite, modernising a family bathroom, or \nplanning a full renovation, we deliver a space that enhances your daily \nroutine and adds long-term value to your home.\n","category":"Services","url":"/services/bathrooms"},{"title":"Loft Conversions","description":"Loft conversions are one of the most effective ways to add space, comfort, \nand value to your home. Whether you're creating an additional bedroom, a \nhome office, or a peaceful retreat, we handle the entire process—from \nstructural planning and insulation to finishing details and lighting.\n\nOur team ensures every conversion is tailored to your home's layout and your \nlifestyle needs, delivering a high-quality result that feels like a natural \nextension of your existing space.\n","category":"Services","url":"/services/loft-conversions"},{"title":"Restorations","description":"Our restoration work blends traditional craftsmanship with modern building \nstandards to bring older homes back to life. Whether you're reviving period \nfeatures, repairing structural elements, or restoring worn spaces, we handle \nevery detail with care and precision.\n\nWe focus on maintaining the original charm of your property while improving \ndurability, comfort, and functionality. The result is a refreshed home that \nhonours its history and feels ready for the future.\n","category":"Services","url":"/services/restorations"},{"title":"Insurance & Warranty Information","description":"Details about our insurance and warranty policies.","category":"Legal","url":"/legal/insurance-warranty"},{"title":"Building Codes & Compliance","description":"Compliance with building codes and regulations.","category":"Legal","url":"/legal/building-codes-compliance"},{"title":"Licenses & Certifications","description":"Information about our licenses and certifications.","category":"Legal","url":"/legal/licenses-certifications"},{"title":"Privacy","description":"Privacy Policy for Rosewood Construction","category":"Legal","url":"/legal/privacy"},{"title":"Safety Standards","description":"Our safety standards and practices.","category":"Legal","url":"/legal/safety-standards"},{"title":"Service Area","description":"Areas where our services are available.","category":"Legal","url":"/legal/service-area"},{"title":"Terms","description":"Terms of Service for Rosewood Construction","category":"Legal","url":"/legal/terms"}];

  window.addEventListener("load", () => {
    const searchButton = document.getElementById("searchButton");
    const searchModal = document.getElementById("searchModal");
    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");
    const closeSearch = document.getElementById("closeSearch");

    const fuse = new Fuse(searchItems, {
      keys: ["title", "description", "category"],
      threshold: 0.3,
      includeMatches: true,
    });

    searchResults.classList.add("hidden");

    function openSearch(e) {
      e.preventDefault();
      e.stopPropagation();
      searchModal.classList.remove("hidden");
      document.body.style.overflow = "hidden";
      setTimeout(() => searchInput.focus(), 100);
    }

    function closeSearchModal(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      searchModal.classList.add("hidden");
      document.body.style.overflow = "";
      searchInput.value = "";
      searchResults.innerHTML = "";
      searchResults.classList.add("hidden");
    }

    function renderResults(results) {
      if (!searchInput.value.trim()) {
        searchResults.innerHTML = "";
        searchResults.classList.add("hidden");
        return;
      }

      if (results.length === 0) {
        searchResults.innerHTML = `
          <div class="p-8 text-center">
            <p class="text-sm text-base-500">No results found for "${searchInput.value}"</p>
          </div>
        `;
        searchResults.classList.remove("hidden");
        return;
      }

      searchResults.innerHTML = results
        .map(
          (result) => `
          <div class="relative block p-4 transition-colors duration-200 hover:bg-base-50 group">
            <a href="${result.item.url}" class="absolute inset-0 z-10"></a>
            <div class="flex items-center justify-between w-full mb-2">
                <span class="inline-flex items-center text-[10px] font-medium  text-base-600 uppercase tracking-wider">
                  ${result.item.category}
                </span>
                 ${
                   result.item.pubDate
                     ? `<span class="text-xs text-base-400">
                  ${new Date(result.item.pubDate).toLocaleDateString("en-US", {
                    year: "numeric",
                    month: "short",
                    day: "numeric",
                  })}
                </span>`
                     : ""
                 }
            </div>
            <h3 class="text-sm font-medium text-base-900 group-hover:text-base-600 transition-colors">
              ${result.item.title}
            </h3>
            <p class="mt-1 text-xs text-base-500 line-clamp-2">
              ${result.item.description}
            </p>
          </div>
        `
        )
        .join("");

      searchResults.classList.remove("hidden");
    }

    searchButton.addEventListener("click", openSearch);
    searchButton.addEventListener("touchend", openSearch);
    closeSearch.addEventListener("click", closeSearchModal);
    closeSearch.addEventListener("touchend", closeSearchModal);

    searchInput.addEventListener("input", (e) => {
      const value = e.target.value.trim();
      const results = value ? fuse.search(value) : [];
      renderResults(results);
    });

    // Close on escape key
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !searchModal.classList.contains("hidden")) {
        closeSearchModal();
      }
    });

    // NEW: Click outside modal content to close
    searchModal.addEventListener("click", (e) => {
      const modalContent = e.target.closest(".inline-block");
      if (!modalContent) {
        closeSearchModal(e);
      }
    });
  });
})();</script> </body></html>
