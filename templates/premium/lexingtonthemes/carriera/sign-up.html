		<!-- Theme switcher script -->
		<script>
		(function () {
			var dots = Array.from(document.querySelectorAll('[id^="theme-dot"]'));
			var saved = localStorage.getItem("theme") || "default";
			var timer;
			function applyTheme(t) {
				document.documentElement.classList.add("theme-animating");
				clearTimeout(timer);
				timer = setTimeout(function () {
					document.documentElement.classList.remove("theme-animating");
				}, 400);
				if (t === "default") {
					document.documentElement.removeAttribute("data-theme");
					localStorage.removeItem("theme");
				} else {
					document.documentElement.setAttribute("data-theme", t);
					localStorage.setItem("theme", t);
				}
				dots.forEach(function (d) {
					var active = d.dataset.theme === t;
					d.classList.toggle("ring-offset-2", active);
					d.classList.toggle("ring-current", active);
				});
			}
			applyTheme(saved);
			dots.forEach(function (d) {
				d.addEventListener("click", function () {
					applyTheme(d.dataset.theme);
				});
			});
		})();
		</script>

		<!-- Mobile menu script -->
		<script>
		var navToggle = document.getElementById("navToggle");
		var mobileMenu = document.getElementById("mobileMenu");
		var closeTargets = mobileMenu
			? mobileMenu.querySelectorAll("[data-close-nav]")
			: [];
		function openNav() {
			mobileMenu.classList.remove("hidden");
			navToggle && navToggle.setAttribute("aria-expanded", "true");
			document.body.style.overflow = "hidden";
		}
		function closeNav() {
			mobileMenu.classList.add("hidden");
			navToggle && navToggle.setAttribute("aria-expanded", "false");
			document.body.style.overflow = "";
		}
		navToggle &&
			navToggle.addEventListener("click", function () {
				var isOpen = navToggle.getAttribute("aria-expanded") === "true";
				if (isOpen) closeNav();
				else openNav();
			});
		closeTargets.forEach(function (btn) {
			btn.addEventListener("click", closeNav);
		});
		window.addEventListener("resize", function () {
			if (window.innerWidth >= 1024) closeNav();
		});
		</script>

		<!-- Search modal script -->
		<script>
		(function () {
			var searchButton = document.getElementById("searchButton");
			var searchModal = document.getElementById("searchModal");
			var modalOverlay = document.getElementById("modalOverlay");
			var searchInput = document.getElementById("searchInput");
			var searchResults = document.getElementById("searchResults");
			var closeSearch = document.getElementById("closeSearch");
			function openSearch(e) {
				e.preventDefault();
				e.stopPropagation();
				searchModal.classList.remove("hidden");
				document.body.style.overflow = "hidden";
				setTimeout(function () {
					searchInput.focus();
				}, 100);
			}
			function closeSearchModal() {
				searchModal.classList.add("hidden");
				document.body.style.overflow = "";
				searchInput.value = "";
				searchResults.innerHTML = "";
			}
			searchButton && searchButton.addEventListener("click", openSearch);
			closeSearch && closeSearch.addEventListener("click", closeSearchModal);
			modalOverlay && modalOverlay.addEventListener("click", closeSearchModal);
			document.addEventListener("keydown", function (e) {
				if (e.key === "Escape" && !searchModal.classList.contains("hidden"))
					closeSearchModal();
			});
		})();
		</script>

		<!-- Theme switcher widget -->
		<div class="fixed bottom-4 right-4 z-50">

					id="theme-dot-default"

				></button>
				<button
					id="theme-dot-accent"
					data-theme="accent"
					class="outline-primary size-4 rounded-full bg-[#101319] outline-2 transition-colors"
					title="Dark"
				></button>
				<button
					id="theme-dot-dark"
					data-theme="dark"
					class="outline-primary size-4 rounded-full bg-[#245230] outline-2 transition-colors"
					title="Green"
