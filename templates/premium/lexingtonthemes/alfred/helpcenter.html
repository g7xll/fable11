<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Help Center — Alfred</title>
		<meta
			name="description"
			content="Find answers to common questions and learn how to use Alfred."
		>
		<link rel="stylesheet" href="./assets/styles.css">
		<style>
		.page-hero {
			padding-top: 12rem;
			padding-bottom: 2rem;
		}
		@media (min-width: 1024px) {
			.page-hero {
				padding-top: 20.5rem;
			}
		}
		.help-link {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 1.5rem 0;
			border-top: 1px solid var(--base-200);
			color: var(--base-800);
			text-decoration: none;
			font-size: 1rem;
			font-weight: 500;
			transition: color 0.15s;
		}
		.help-link:hover {
			color: var(--base-500);
		}
		.help-link svg {
			width: 1rem;
			height: 1rem;
			flex-shrink: 0;
		}
		</style>
	</head>
	<body>
		<div id="nav-placeholder"></div>

		<main style="flex:1">
			<section>
				<div class="container page-hero">
					<h1
						style="font-size:clamp(1.875rem,4vw,3rem);color:var(--base-800);font-weight:500;letter-spacing:-0.02em;text-wrap:balance;line-height:1.15"
					>
						Help Center
					</h1>
					<p
						style="font-size:1rem;max-width:36rem;margin-top:1rem;color:var(--base-500)"
					>
						Everything you need to get started and make the most of Alfred.
					</p>

					<div style="padding-top:2rem;margin-top:2rem">
						<a href="#" class="help-link">
							Getting started with Alfred
							<svg
								xmlns="http://www.w3.org/2000/svg"
								fill="none"
								viewBox="0 0 24 24"
								stroke="currentColor"
								stroke-width="1.5"
							>
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									d="M9 6l6 6-6 6"
								/>
							</svg>
						</a>
						<a href="#" class="help-link">
							Setting up your workspace
							<svg
								xmlns="http://www.w3.org/2000/svg"
								fill="none"
								viewBox="0 0 24 24"
								stroke="currentColor"
								stroke-width="1.5"
							>
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									d="M9 6l6 6-6 6"
								/>
							</svg>
						</a>
						<a href="#" class="help-link">
							Managing your team and permissions
							<svg
								xmlns="http://www.w3.org/2000/svg"
								fill="none"
								viewBox="0 0 24 24"
								stroke="currentColor"
								stroke-width="1.5"
							>
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									d="M9 6l6 6-6 6"
								/>
							</svg>
						</a>
						<a
							href="#"
							class="help-link"
							style="border-bottom:1px solid var(--base-200)"
						>
							Billing and subscription management
							<svg
								xmlns="http://www.w3.org/2000/svg"
								fill="none"
								viewBox="0 0 24 24"
								stroke="currentColor"
								stroke-width="1.5"
							>
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									d="M9 6l6 6-6 6"
								/>
							</svg>
						</a>
					</div>

					<div style="margin-top:3rem;padding:2rem;background:var(--base-50)">
						<h2 style="font-size:1rem;font-weight:500;color:var(--base-800)">
							Still need help?
						</h2>
						<p
							style="font-size:0.875rem;color:var(--base-500);margin-top:0.5rem"
						>
							Our support team is available Monday–Friday, 9am–6pm EST.
						</p>
						<a
							href="mailto:support@alfred.com"
							class="btn btn-dark"
							style="margin-top:1.25rem;display:inline-flex;height:2.5rem;font-size:0.875rem"
							>Contact support</a
						>
					</div>
				</div>
			</section>
		</main>

		<div id="footer-placeholder"></div>
		<script src="./assets/shared.js"></script>
	</body>
</html>
