<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Book a Demo — Alfred</title>
		<meta
			name="description"
			content="Book a personalized demo with the Alfred team."
		>
		<link rel="stylesheet" href="./assets/styles.css">
		<style>
		.page-hero {
			padding-top: 12rem;
			padding-bottom: 4rem;
		}
		@media (min-width: 1024px) {
			.page-hero {
				padding-top: 20.5rem;
			}
		}
		.form-input {
			display: block;
			width: 100%;
			height: 2.75rem;
			padding: 0 0.875rem;
			background: var(--base-50);
			border: none;
			outline: none;
			font-size: 0.875rem;
			color: var(--base-800);
			font-family: inherit;
		}
		.form-input:focus {
			outline: 2px solid var(--base-800);
		}
		.form-input::placeholder {
			color: var(--base-400);
		}
		textarea.form-input {
			height: auto;
			padding: 0.75rem 0.875rem;
			resize: vertical;
		}
		.form-label {
			font-size: 0.75rem;
			font-weight: 500;
			color: var(--base-700);
			display: block;
			margin-bottom: 0.25rem;
		}
		.form-field {
			display: flex;
			flex-direction: column;
			gap: 0;
		}
		.form-select {
			cursor: pointer;
		}
		</style>
	</head>
	<body>
		<div id="nav-placeholder"></div>

		<main style="flex:1">
			<section>
				<div class="container page-hero">
					<div
						style="display:grid;grid-template-columns:1fr;gap:3rem;align-items:start"
					>
						<div style="max-width:40rem;margin:0 auto;width:100%">
							<h1
								style="font-size:clamp(1.875rem,4vw,3rem);color:var(--base-800);font-weight:500;letter-spacing:-0.02em;text-wrap:balance;line-height:1.15"
							>
								Book a personalized demo
							</h1>
							<p
								style="font-size:1rem;max-width:32rem;margin-top:1rem;color:var(--base-500);text-wrap:balance"
							>
								See Alfred in action. We'll walk you through the features most
								relevant to your team and answer any questions you have.
							</p>

							<form
								style="margin-top:2.5rem;border-top:1px solid var(--base-200);padding-top:2rem;display:flex;flex-direction:column;gap:1rem"
								onsubmit="return false"
							>
								<div
									style="display:grid;grid-template-columns:1fr 1fr;gap:1rem"
								>
									<div class="form-field">
										<label class="form-label">First name</label>
										<input
											type="text"
											placeholder="Jane"
											class="form-input"
											autocomplete="given-name"
										>
									</div>
									<div class="form-field">
										<label class="form-label">Last name</label>
										<input
											type="text"
											placeholder="Smith"
											class="form-input"
											autocomplete="family-name"
										>
									</div>
								</div>
								<div class="form-field">
									<label class="form-label">Work email</label>
									<input
										type="email"
										placeholder="jane@company.com"
										class="form-input"
										autocomplete="email"
									>
								</div>
								<div class="form-field">
									<label class="form-label">Company name</label>
									<input
										type="text"
										placeholder="Acme Inc."
										class="form-input"
										autocomplete="organization"
									>
								</div>
								<div class="form-field">
									<label class="form-label">Team size</label>
									<select class="form-input form-select">
										<option value="" disabled selected>Select team size</option>
										<option>1–10</option>
										<option>11–50</option>
										<option>51–200</option>
										<option>201–1000</option>
										<option>1000+</option>
									</select>
								</div>
								<div class="form-field">
									<label class="form-label"
										>What are you hoping to achieve with Alfred?</label
									>
									<textarea
										class="form-input"
										rows="4"
										placeholder="Tell us about your team and goals..."
									></textarea>
								</div>
								<button
									type="submit"
									class="btn btn-dark"
									style="width:100%;height:2.75rem;font-size:0.875rem;margin-top:0.5rem"
								>
									Book my demo
								</button>
								<p
									style="font-size:0.75rem;color:var(--base-400);text-align:center"
								>
									We'll respond within one business day to schedule your demo.
								</p>
							</form>
						</div>
					</div>
				</div>
			</section>
		</main>

		<div id="footer-placeholder"></div>
		<script src="./assets/shared.js"></script>
	</body>
</html>
