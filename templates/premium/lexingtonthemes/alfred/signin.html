<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign In — Alfred</title>
		<meta name="description" content="Sign in to your Alfred account.">
		<link rel="stylesheet" href="./assets/styles.css">
		<style>
		body {
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}
		.auth-page {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 8rem 1rem 4rem;
		}
		.auth-box {
			width: 100%;
			max-width: 24rem;
		}
		.auth-input {
			display: block;
			width: 100%;
			height: 2.75rem;
			padding: 0 0.875rem;
			background: var(--base-50);
			border: none;
			outline: none;
			font-size: 0.875rem;
			color: var(--base-800);
			font-family: inherit;
		}
		.auth-input:focus {
			outline: 2px solid var(--base-800);
		}
		.auth-input::placeholder {
			color: var(--base-400);
		}
		.google-btn {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 0.5rem;
			width: 100%;
			height: 2.75rem;
			background: #fff;
			border: 1px solid var(--base-200);
			font-size: 0.875rem;
			font-weight: 500;
			color: var(--base-700);
			cursor: pointer;
			font-family: inherit;
			transition: background 0.15s;
			text-decoration: none;
		}
		.google-btn:hover {
			background: var(--base-50);
		}
		</style>
	</head>
	<body>
		<!-- Minimal header -->
		<header
			style="position:fixed;top:1rem;left:0;right:0;z-index:50;pointer-events:none"
		>
			<div style="max-width:80rem;margin:0 auto;padding:0 1.5rem">
				<div style="pointer-events:auto;display:inline-flex">
					<a
						href="./index.html"
						style="display:flex;align-items:center;gap:0.5rem;text-decoration:none"
					>
						<svg
							xmlns="http://www.w3.org/2000/svg"
							viewBox="0 0 32 32"
							style="width:1.5rem;height:1.5rem"
							fill="none"
						>
							<rect width="32" height="32" rx="6" fill="#111" />
							<path
								d="M9 22L16 10L23 22"
								stroke="white"
								stroke-width="2.5"
								stroke-linecap="round"
								stroke-linejoin="round"
							/>
							<path
								d="M11.5 18H20.5"
								stroke="white"
								stroke-width="2.5"
								stroke-linecap="round"
							/>
						</svg>
						<span style="font-weight:600;font-size:1rem;color:var(--base-900)"
							>Alfred</span
						>
					</a>
				</div>
			</div>
		</header>

		<div class="auth-page">
			<div class="auth-box">
				<h1
					style="font-size:1.5rem;font-weight:500;color:var(--base-800);letter-spacing:-0.02em"
				>
					Sign in to Alfred
				</h1>
				<p style="font-size:0.875rem;color:var(--base-500);margin-top:0.5rem">
					Welcome back — let's get you in.
				</p>

				<form
					style="margin-top:2rem;display:flex;flex-direction:column;gap:0.75rem"
					onsubmit="return false"
				>
					<div>
						<label
							style="font-size:0.75rem;font-weight:500;color:var(--base-700);display:block;margin-bottom:0.25rem"
							>Email</label
						>
						<input
							type="email"
							placeholder="you@company.com"
							class="auth-input"
							autocomplete="email"
							required
						>
					</div>
					<button
						type="submit"
						class="btn btn-dark"
						style="width:100%;height:2.75rem;font-size:0.875rem;margin-top:0.25rem"
					>
						Sign in
					</button>
				</form>

				<div
					style="display:flex;align-items:center;gap:0.75rem;margin:1.5rem 0"
				>
					<div style="flex:1;height:1px;background:var(--base-200)"></div>
					<span style="font-size:0.75rem;color:var(--base-400)">or</span>
					<div style="flex:1;height:1px;background:var(--base-200)"></div>
				</div>

				<a href="#" class="google-btn">
					<svg
						viewBox="0 0 24 24"
						style="width:1rem;height:1rem"
						xmlns="http://www.w3.org/2000/svg"
					>
						<path
							d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
							fill="#4285F4"
						/>
						<path
							d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
							fill="#34A853"
						/>
						<path
							d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
							fill="#FBBC05"
						/>
						<path
							d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
							fill="#EA4335"
						/>
					</svg>
					Sign in with Google
				</a>

				<p
					style="font-size:0.75rem;color:var(--base-500);text-align:center;margin-top:1.5rem"
				>
					Don't have an account?
					<a href="#" style="color:var(--base-800);text-decoration:underline"
						>Sign up free</a
					>
				</p>
			</div>
		</div>
	</body>
</html>
