<!DOCTYPE html>
<html lang="en" class="selection:bg-blue selection:text-white scroll-smooth">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign Up — Hirewise</title>
		<meta
			name="description"
			content="Create your Hirewise account and start finding your dream job."
		>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="styles.css">
		<script>
		(function () {
			const t =
				localStorage.getItem("theme") ||
				(window.matchMedia("(prefers-color-scheme: dark)").matches
					? "dark"
					: "light");
			document.documentElement.classList.toggle("dark", t === "dark");
		})();
		</script>
	</head>
	<body class="bg-white dark:bg-base-800 flex flex-col min-h-dvh">
		<div
			class="flex items-center justify-between px-8 lg:px-24 py-4 border-b border-base-200 dark:border-base-700"
		>
			<a
				href="index.html"
				class="font-medium lowercase text-base-900 dark:text-white text-lg"
				>hirewise®</a
			>
			<div class="flex items-center gap-2">
				<button
					class="btn-secondary size-8 rounded"
					id="theme-toggle"
					type="button"
					aria-label="Toggle theme"
				>
					<svg
						xmlns="http://www.w3.org/2000/svg"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
						class="size-4"
					>
						<path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
						<path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path>
						<path
							d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7"
						></path>
					</svg>
				</button>
				<a href="sign-in.html" class="btn-primary h-8 px-3 text-xs rounded"
					>Sign in</a
				>
			</div>
		</div>

		<main class="flex-1 flex">
			<div
				class="max-w-screen 2xl:max-w-[100rem] mx-auto px-8 lg:px-24 py-24 lg:py-12 lg:h-[calc(100vh-4rem)] flex flex-col items-center justify-center w-full"
			>
				<div class="grid grid-cols-1 gap-8 md:grid-cols-2 items-center w-full">
					<!-- Left: form -->
					<div class="flex flex-col gap-6 max-w-md w-full mx-auto md:mx-0">
						<div>
							<div class="flex items-center gap-2 mb-4">
								<span class="size-2 rounded-full bg-orange inline-block"></span>
								<span class="size-2 rounded-full bg-blue inline-block"></span>
								<span class="size-2 rounded-full bg-green inline-block"></span>
								<span
									class="text-xs font-semibold tracking-widest text-base-500 dark:text-base-400 uppercase"
									>Sign Up</span
								>
							</div>
							<h1
								class="text-3xl lg:text-4xl font-semibold text-base-900 dark:text-white leading-tight"
							>
								Create an Account
							</h1>
						</div>

						<div class="bg-base-50 dark:bg-base-700 p-1.5 rounded-xl">
							<div
								class="bg-white dark:bg-base-800 rounded-lg p-5 flex flex-col gap-3"
							>
								<input
									type="text"
									placeholder="Full name"
									class="w-full h-10 px-3 rounded-lg text-sm bg-base-50 dark:bg-base-700 border border-base-200 dark:border-base-600 text-base-900 dark:text-white placeholder:text-base-400 focus:outline-none focus:ring-2 focus:ring-blue"
								>
								<input
									type="email"
									placeholder="Enter your email address"
									class="w-full h-10 px-3 rounded-lg text-sm bg-base-50 dark:bg-base-700 border border-base-200 dark:border-base-600 text-base-900 dark:text-white placeholder:text-base-400 focus:outline-none focus:ring-2 focus:ring-blue"
								>
								<input
									type="password"
									placeholder="Create a password"
									class="w-full h-10 px-3 rounded-lg text-sm bg-base-50 dark:bg-base-700 border border-base-200 dark:border-base-600 text-base-900 dark:text-white placeholder:text-base-400 focus:outline-none focus:ring-2 focus:ring-blue"
								>
								<input
									type="password"
									placeholder="Confirm password"
									class="w-full h-10 px-3 rounded-lg text-sm bg-base-50 dark:bg-base-700 border border-base-200 dark:border-base-600 text-base-900 dark:text-white placeholder:text-base-400 focus:outline-none focus:ring-2 focus:ring-blue"
								>
								<button
									type="button"
									class="btn-dark h-10 w-full rounded-lg text-sm font-medium"
								>
									Create an account
								</button>
							</div>
						</div>

						<div class="flex items-center gap-3">
							<div class="flex-1 h-px bg-base-200 dark:bg-base-600"></div>
							<span
								class="text-xs text-base-400 dark:text-base-500 whitespace-nowrap"
								>Or continue with</span
							>
							<div class="flex-1 h-px bg-base-200 dark:bg-base-600"></div>
						</div>

						<div class="flex flex-col gap-3">
							<button
								type="button"
								class="btn-secondary h-10 w-full rounded-lg text-sm font-medium flex items-center justify-center gap-2"
							>
								<svg
									class="size-4"
									viewBox="0 0 24 24"
									xmlns="http://www.w3.org/2000/svg"
								>
									<path
										d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
										fill="#4285F4"
									/>
									<path
										d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
										fill="#34A853"
									/>
									<path
										d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
										fill="#FBBC05"
									/>
									<path
										d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
										fill="#EA4335"
									/>
								</svg>
								Login with Google
							</button>
							<button
								type="button"
								class="btn-secondary h-10 w-full rounded-lg text-sm font-medium flex items-center justify-center gap-2"
							>
								<svg
									class="size-4"
									viewBox="0 0 24 24"
									fill="currentColor"
									xmlns="http://www.w3.org/2000/svg"
								>
									<path
										d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.39.07 2.37.74 3.18.78 1.21-.24 2.37-.93 3.66-.84 1.56.12 2.73.72 3.51 1.9-3.23 1.94-2.68 5.87.62 7.02-.52 1.37-1.21 2.73-2.97 4.02zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"
									/>
								</svg>
								Login with Apple
							</button>
						</div>

						<label class="flex items-start gap-2 cursor-pointer">
							<input
								type="checkbox"
								class="size-4 mt-0.5 rounded border-base-300 dark:border-base-600"
							>
							<span class="text-sm text-base-600 dark:text-base-400"
								>I agree to terms and conditions</span
							>
						</label>

						<p class="text-sm text-base-500 dark:text-base-400">
							Have an account?
							<a
								href="sign-in.html"
								class="text-base-900 dark:text-white font-medium hover:underline"
								>Sign in instead.</a
							>
						</p>
					</div>

					<!-- Right: testimonial panel -->
					<div
						class="hidden md:grid md:order-first lg:order-last grid-cols-2 gap-3 h-full max-h-[560px]"
					>
						<!-- Orange card with man photo placeholder -->
						<div
							class="col-span-2 bg-orange rounded-3xl overflow-hidden flex flex-col"
							style="max-height: 280px;"
						>
							<div
								class="flex-1 bg-base-400 dark:bg-base-500"
								style="min-height: 160px;"
							></div>
							<div class="p-6">
								<p class="text-white text-sm font-medium leading-snug">
									"Within two days Hirewise found 4 candidates for my startup"
								</p>
								<p class="text-orange-100 text-xs font-semibold mt-2">
									— Roberto Vaquero
								</p>
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>

		<button
			id="theme-toggle-fab"
			data-theme-toggle="true"
			type="button"
			aria-label="Toggle theme"
			class="fixed bottom-4 right-4 btn-secondary size-10 rounded-full shadow-lg flex items-center justify-center z-50"
		>
			<svg
				xmlns="http://www.w3.org/2000/svg"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
				class="size-4"
			>
				<path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
				<path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path>
				<path
					d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7"
				></path>
			</svg>
		</button>

		<script>
		function toggleTheme() {
			const d = document.documentElement.classList.toggle("dark");
			localStorage.setItem("theme", d ? "dark" : "light");
		}
		document
			.getElementById("theme-toggle")
			.addEventListener("click", toggleTheme);
		document
			.getElementById("theme-toggle-fab")
			.addEventListener("click", toggleTheme);
		</script>
	</body>
</html>
