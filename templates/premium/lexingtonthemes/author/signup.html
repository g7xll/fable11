<!DOCTYPE html>
<html lang="en" class="scroll-smooth selection:bg-white selection:text-black">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Author — signup</title>
		<meta
			name="description"
			content="Perspectives in Architecture — conversations and creativity with architects, designers, and visionaries."
		>
		<link rel="preconnect" href="https://rsms.me/">
		<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
		<link
			href="https://cdn.jsdelivr.net/npm/keen-slider@6.8.6/keen-slider.min.css"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="assets/styles-base.css">
		<script src="assets/js/fuse.min.js"></script>
	</head>
	<body class="flex flex-col min-h-screen bg-black">
		<main class="grow">
			<div class="flex h-screen">
				<div class="flex items-center justify-center w-full p-8 lg:w-2/3">
					<div class="w-full max-w-md">
						<h3
							class="text-lg  sm:text-xl md:text-2xl lg:text-3xl font-light tracking-tight text-white leading-12 lg:leading-10 indent-8 lg:indent-48"
						>
							Sign up to unlock exclusive content, connect with a community of
							design enthusiasts, and stay inspired by the stories and insights
							shaping the world of architecture
						</h3>
						<form class="flex flex-col mt-12 gap-2">
							<!-- Name Field -->
							<div>
								<label for="name" class="sr-only">Full Name</label>
								<input
									id="name"
									type="text"
									name="name"
									autocomplete="name"
									placeholder="Enter your full name"
									required=""
									class="block w-full px-0 pb-8 text-sm text-white bg-transparent border-t-0 border-b appearance-none duration-300 border-base-500 h-14 border-x-0 placeholder-base-400 focus:bg-transparent focus:outline-none focus:ring-0 focus:border-white"
									style=""
								>
							</div>
							<!-- Email Field -->
							<div>
								<label for="email-address" class="sr-only">Email address</label>
								<input
									id="email-address"
									type="email"
									name="email"
									autocomplete="email"
									placeholder="Enter your email"
									required=""
									class="block w-full px-0 pb-8 text-sm text-white bg-transparent border-t-0 border-b appearance-none duration-300 border-base-500 h-14 border-x-0 placeholder-base-400 focus:bg-transparent focus:outline-none focus:ring-0 focus:border-white"
									style=""
								>
							</div>
							<!-- Password Field -->
							<div>
								<label for="password" class="sr-only">Password</label>
								<input
									id="password"
									type="password"
									name="password"
									autocomplete="new-password"
									placeholder="Enter your password"
									required=""
									class="block w-full px-0 pb-8 text-sm text-white bg-transparent border-t-0 border-b appearance-none duration-300 border-base-500 h-14 border-x-0 placeholder-base-400 focus:bg-transparent focus:outline-none focus:ring-0 focus:border-white"
									style=""
								>
							</div>
							<!-- Confirm Password Field -->
							<div>
								<label for="confirm-password" class="sr-only"
									>Confirm Password</label
								><input
									id="confirm-password"
									type="password"
									name="confirm-password"
									autocomplete="new-password"
									placeholder="Confirm your password"
									required=""
									class="block w-full px-0 pb-8 text-sm text-white bg-transparent border-t-0 border-b appearance-none duration-300 border-base-500 h-14 border-x-0 placeholder-base-400 focus:bg-transparent focus:outline-none focus:ring-0 focus:border-white"
									style=""
								>
							</div>
							<!-- Submit Button --><button
								class="flex items-center justify-center text-center font-medium transition-all duration-300 ease-in-out focus:ring-2 focus:outline-none focus:ring-offset-2 focus:ring-offset-black text-white bg-base-950 hover:bg-base-900 focus:ring-white h-14 px-6 py-3 text-xl flex items-center justify-center w-full"
								type="submit"
							>
								Sign up
							</button><a
								class="flex items-center justify-center text-center font-medium transition-all duration-300 ease-in-out focus:ring-2 focus:outline-none focus:ring-offset-2 focus:ring-offset-black bg-white text-black focus:ring-white hover:bg-base-200 h-14 px-6 py-3 text-xl flex items-center justify-center w-full"
								href="#_"
							>
								Sign up with Google
							</a>
						</form>
					</div>
				</div>
				<div
					class="relative hidden overflow-hidden lg:block lg:w-1/3 lg:order-first"
				>
					<img
						src="assets/img/6.BFMdHBql_Z1uthC3.webp"
						alt="Background"
						aria-hidden="true"
						decoding="async"
						width="1200"
						height="1200"
						class="object-cover object-center w-full h-full bg-base-50"
					>
					<div
						aria-hidden="true"
						class="absolute inset-0 pointer-events-none bg-accent-800/50"
					></div>
				</div>
			</div>
		</main>
	</body>
</html>
