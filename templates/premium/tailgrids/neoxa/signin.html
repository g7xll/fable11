<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<link rel="icon" type="image/x-icon" href="/favicon.png">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<!-- Primary Meta Tags -->
		<title>Sign In - React SaaS Dashboard Template</title>
		<meta name="title" content="Neoxa - React SaaS Dashboard Template">
		<meta
			name="description"
			content="React SaaS dashboard template built with Tailwind CSS. Includes dashboards, users, orders, invoices, analytics, auth pages, and pre-built UI components.
"
		>

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://neoxa.demos.tailgrids.com">
		<meta property="og:title" content="Neoxa - React SaaS Dashboard Template">
		<meta
			property="og:description"
			content="React SaaS dashboard template built with Tailwind CSS. Includes dashboards, users, orders, invoices, analytics, auth pages, and pre-built UI components.
"
		>
		<meta
			property="og:image"
			content="https://assets.tailgrids.com/1768893422021-neox-lg.png"
		>

		<meta
			name="description"
			content="Sign in to your Neoxa admin account to access your dashboard and manage your application."
			data-rh="true"
		>
		<link rel="stylesheet" href="./assets/tokens.css">
		<link rel="stylesheet" href="./assets/styles.css">
		<script>
		(function () {
			const theme =
				localStorage.getItem("theme") ||
				(window.matchMedia("(prefers-color-scheme: dark)").matches
					? "dark"
					: "light");
			if (theme === "dark") {
				document.documentElement.setAttribute("data-theme", "dark");
			}
		})();
		</script>
	</head>
	<body>
		<div id="root">
			<section class="max-w-[1440px] mx-auto antialiased">
				<div class="flex flex-col lg:flex-row items-center min-h-screen">
					<div class="lg:w-1/2 p-5 hidden lg:block">
						<div class="rounded-3xl relative">
							<img
								class="rounded-3xl"
								alt="Onboarding background"
								src="./images/sigin/bg-onboard.jpg"
							><img
								class="absolute top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2"
								alt="Logo"
								src="./images/sigin/logo.svg"
							>
						</div>
					</div>
					<div class="lg:w-1/2 py-10 sm:py-20 px-5 xl:px-0 xl:py-0">
						<div class="max-w-[460px] mx-auto">
							<div class="mb-9">
								<a href="./index.html" data-discover="true"
									><img
										class="mb-6 block"
										alt="Logo"
										src="./images/sigin/main-logo.svg"
									></a
								>
								<h3 class="mb-3 text-4xl font-semibold text-gray-800">
									Sign in to your account
								</h3>
								<p class="text-gray-500 text-base">
									Sign up to get started and enjoy full access to all features.
								</p>
							</div>
							<form action="#">
								<div class="grid gap-3">
									<div>
										<label
											for="email"
											class="font-medium text-sm text-gray-700 block mb-2"
											>Email</label
										>
										<div class="relative">
											<input
												id="email"
												placeholder="Enter your email"
												class="px-4 py-2.5 h-12 w-full rounded-xl focus:border-primary-200 focus:ring-0 focus:outline-0 focus:shadow-input border-gray-300 border "
												type="email"
												value=""
												style=""
											>
										</div>
									</div>
									<div>
										<label
											for="password"
											class="font-medium text-sm text-gray-700 block mb-2"
											>Password*</label
										>
										<div class="relative">
											<input
												id="password"
												placeholder="********"
												class="px-4 py-2.5 h-12 w-full rounded-xl focus:border-primary-200 focus:ring-0 focus:outline-0 focus:shadow-input border-gray-300 border pr-10 col-span-full"
												type="password"
												value=""
												style=""
											><span
												class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 cursor-pointer"
												><svg
													class="text-gray-400"
													xmlns="http://www.w3.org/2000/svg"
													width="20"
													height="20"
													viewBox="0 0 20 20"
													fill="none"
												>
													<path
														d="M2.46585 10.7925C2.23404 10.2899 2.23404 9.71023 2.46585 9.20764C3.78181 6.35442 6.66064 4.375 10.0003 4.375C13.3399 4.375 16.2187 6.35442 17.5347 9.20765C17.7665 9.71024 17.7665 10.2899 17.5347 10.7925C16.2187 13.6458 13.3399 15.6252 10.0003 15.6252C6.66064 15.6252 3.78181 13.6458 2.46585 10.7925Z"
														stroke="currentColor"
														stroke-width="1.5"
														stroke-linecap="round"
														stroke-linejoin="round"
													></path>
													<path
														d="M13.0212 10C13.0212 11.6684 11.6687 13.0208 10.0003 13.0208C8.33197 13.0208 6.97949 11.6684 6.97949 10C6.97949 8.33164 8.33197 6.97917 10.0003 6.97917C11.6687 6.97917 13.0212 8.33164 13.0212 10Z"
														stroke="currentColor"
														stroke-width="1.5"
														stroke-linecap="round"
														stroke-linejoin="round"
													></path>
												</svg></span
											>
										</div>
									</div>
									<div class="flex justify-end">
										<a
											class="text-primary-500 font-medium text-sm"
											href="./resetpassword.html"
											data-discover="true"
											>Forget password?</a
										>
									</div>
								</div>
								<div class="mt-5 mb-6">
									<button
										class="px-5 py-3 cursor-pointer w-full rounded-xl text-white bg-primary-500 text-base font-medium"
									>
										Sign In
									</button>
								</div>
								<p class="text-gray-500">
									Don't have an account?
									<a
										class="font-medium text-primary-500"
										href="./signup.html"
										data-discover="true"
										>Sign up</a
									>
								</p>
							</form>
							<div class="relative my-8">
								<div class="absolute inset-0 flex items-center">
									<div class="w-full border-t border-gray-200"></div>
								</div>
								<div class="relative flex justify-center text-sm">
									<span class="bg-white px-3 text-gray-500"
										>Or register with email</span
									>
								</div>
							</div>
							<div class="space-y-3">
								<button
									type="button"
									class="w-full flex items-center cursor-pointer h-12 font-medium justify-center gap-2 py-3 border border-gray-300 rounded-xl text-gray-800 hover:bg-gray-50"
								>
									<svg
										xmlns="http://www.w3.org/2000/svg"
										width="24"
										height="24"
										viewBox="0 0 24 24"
										fill="none"
									>
										<path
											d="M22.501 12.2331C22.501 11.3698 22.4296 10.7398 22.2748 10.0864H12.2153V13.983H18.12C18.001 14.9514 17.3582 16.4097 15.9296 17.3897L15.9096 17.5202L19.0902 19.9349L19.3106 19.9564C21.3343 18.1247 22.501 15.4297 22.501 12.2331Z"
											fill="#4285F4"
										></path>
										<path
											d="M12.2145 22.5001C15.1073 22.5001 17.5358 21.5667 19.3097 19.9567L15.9287 17.39C15.024 18.0083 13.8097 18.44 12.2145 18.44C9.38118 18.44 6.97645 16.6083 6.11922 14.0767L5.99358 14.0871L2.68632 16.5955L2.64307 16.7133C4.40495 20.1433 8.02399 22.5001 12.2145 22.5001Z"
											fill="#34A853"
										></path>
										<path
											d="M6.11997 14.0765C5.89379 13.4232 5.76289 12.7231 5.76289 11.9998C5.76289 11.2764 5.89379 10.5765 6.10807 9.92313L6.10208 9.78398L2.75337 7.23535L2.64381 7.28642C1.91765 8.70977 1.50098 10.3081 1.50098 11.9998C1.50098 13.6915 1.91765 15.2897 2.64381 16.7131L6.11997 14.0765Z"
											fill="#FBBC05"
										></path>
										<path
											d="M12.2145 5.55997C14.2264 5.55997 15.5835 6.41163 16.3574 7.12335L19.3812 4.23C17.5241 2.53834 15.1074 1.5 12.2145 1.5C8.02402 1.5 4.40496 3.85665 2.64307 7.28662L6.10734 9.92332C6.97647 7.39166 9.38122 5.55997 12.2145 5.55997Z"
											fill="#EB4335"
										></path>
									</svg>Sign in with Google
								</button><button
									type="button"
									class="w-full flex items-center cursor-pointer font-medium h-12 justify-center gap-2 py-3 border border-gray-300 rounded-xl text-gray-800 hover:bg-gray-50"
								>
									<svg
										xmlns="http://www.w3.org/2000/svg"
										width="24"
										height="24"
										viewBox="0 0 24 24"
										fill="none"
									>
										<path
											d="M19.7413 7.81869C19.6235 7.90869 17.5433 9.0628 17.5433 11.6291C17.5433 14.5974 20.1903 15.6475 20.2695 15.6735C20.2573 15.7375 19.849 17.1116 18.8739 18.5118C18.0044 19.7439 17.0964 20.974 15.715 20.974C14.3336 20.974 13.9781 20.1839 12.3834 20.1839C10.8293 20.1839 10.2768 21 9.01321 21C7.74964 21 6.86798 19.8599 5.85429 18.4598C4.68013 16.8156 3.73145 14.2613 3.73145 11.8371C3.73145 7.94872 6.2992 5.88648 8.82631 5.88648C10.1691 5.88648 11.2884 6.75458 12.1315 6.75458C12.9339 6.75458 14.1853 5.83449 15.7129 5.83449C16.2919 5.83449 18.3721 5.88648 19.7413 7.81869ZM14.9877 4.18832C15.6195 3.45025 16.0664 2.42614 16.0664 1.40204C16.0664 1.26003 16.0542 1.11601 16.0278 1C14.9999 1.038 13.777 1.67407 13.0395 2.51615C12.4606 3.16422 11.9202 4.18832 11.9202 5.22642C11.9202 5.38247 11.9466 5.53845 11.9588 5.58844C12.0238 5.60047 12.1294 5.61446 12.2351 5.61446C13.1574 5.61446 14.3173 5.00639 14.9877 4.18832Z"
											fill="#1F2937"
										></path>
									</svg>Sign in with Apple
								</button>
							</div>
						</div>
					</div>
				</div>
			</section>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
		<script src="./assets/script.js"></script>
	</body>
</html>
