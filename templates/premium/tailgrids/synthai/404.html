		<script>
		if (
			localStorage.theme === "dark" ||
			(!("theme" in localStorage) &&
				window.matchMedia("(prefers-color-scheme: dark)").matches)
		) {
			document.documentElement.classList.add("dark");
		} else {
			document.documentElement.classList.remove("dark");
		}
		</script>
	</head>
	<body>
		<div id="root">
			<div>
				<div class="p-3 bg-neutral-100 antialiased overflow-x-hidden ">
					<div class="bg-white py-12 lg:py-25 rounded-xl min-h-screen">
						<div class="max-w-2xl mx-auto text-center">
							<h2
								class="text-3xl -tracking-[2px] sm:text-4xl lg:text-5xl font-medium text-neutral-900 lg:leading-14 mb-4"
							>
								Oops ! Page not Found
							</h2>
							<p
								class="text-lg text-neutral-500 mb-8 sm:mb-11 font-normal max-w-lg mx-auto"
							>
								The page you’re looking for might have been moved, deleted, or
								never existed. Let’s get you back on track.
							</p>
							<a
								class="py-3 px-5 inline-flex text-white font-mono text-sm uppercase gap-2 items-center rounded-lg bg-black hover:bg-neutral-700 transition-colors duration-300"
								href="index.html"
								data-discover="true"
								>Go back to home<span
									class="relative overflow-hidden inline-flex w-5 h-5"
									><span
										class="absolute inset-0 flex items-center justify-center"
										style="transform: none;"
										><svg
											width="20"
											height="20"
											viewBox="0 0 20 20"

												fill="currentColor"
											></path>
										</svg></span
									><span
										class="absolute inset-0 flex items-center justify-center"
										style="transform: translateX(-100%) translateY(100%);"
										><svg
											width="20"
											height="20"
											viewBox="0 0 20 20"
											fill="none"
											xmlns="http://www.w3.org/2000/svg"
										>

												clip-rule="evenodd"
												d="M15.3581 4.46332C15.2893 4.41722 15.2113 4.38389 15.1273 4.36675L15.1156 4.36557C15.0812 4.3593 15.0464 4.35582 15.0115 4.35512L14.9968 4.35364L7.50083 4.35156C7.14186 4.35144 6.85049 4.64175 6.85021 5.00053C6.85008 5.35922 7.14069 5.6504 7.49945 5.65087L13.4311 5.65267L4.54155 14.5422C4.28781 14.7961 4.28843 15.2075 4.54224 15.4613C4.79605 15.7151 5.20749 15.7158 5.46134 15.462L14.3465 6.57691L14.3482 12.4967C14.3484 12.8556 14.6405 13.1465 14.9996 13.1464C15.3584 13.146 15.6489 12.8548 15.6488 12.4961L15.6467 5.0544C15.6605 4.87194 15.5976 4.68478 15.4582 4.54536C15.427 4.51418 15.3935 4.48684 15.3581 4.46332Z"
												fill="currentColor"
											></path>
										</svg></span
									></span
								></a
							>
							<div class="mt-10 sm:mt-16">
								<img alt="" src="images/404.png">
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script>
		document.addEventListener("DOMContentLoaded", () => {
			// Theme toggle action
			document.querySelectorAll(".theme-toggle-btn").forEach((btn) => {
				btn.addEventListener("click", () => {
					if (document.documentElement.classList.contains("dark")) {
						document.documentElement.classList.remove("dark");
						localStorage.theme = "light";
					} else {
						document.documentElement.classList.add("dark");
						localStorage.theme = "dark";
					}
				});
			});

			// Mobile hamburger menu toggle
			const hamburger = document.querySelector(".mobile-hamburger-btn");
			if (hamburger) {
				let mobileMenu = document.querySelector(".mobile-menu");
				if (!mobileMenu) {
					mobileMenu = document.createElement("div");
					mobileMenu.className =
						"mobile-menu hidden lg:hidden absolute top-full left-3 right-3 rounded-xl bg-white dark:bg-neutral-950 py-4 px-4 mt-2 flex flex-col space-y-4 z-50 shadow-lg border border-neutral-100 dark:border-neutral-800";
					mobileMenu.innerHTML = `
              <a class="py-2 px-4 font-mono uppercase text-base rounded-lg hover:bg-neutral-50 dark:hover:bg-neutral-900 text-neutral-900 dark:text-white" href="features.html">Features</a>
              <a class="py-2 px-4 font-mono uppercase text-base rounded-lg hover:bg-neutral-50 dark:hover:bg-neutral-900 text-neutral-900 dark:text-white" href="pricing.html">Pricing</a>
              <a class="py-2 px-4 font-mono uppercase text-base rounded-lg hover:bg-neutral-50 dark:hover:bg-neutral-900 text-neutral-900 dark:text-white" href="about.html">About</a>
              <a class="py-2 px-4 font-mono uppercase text-base rounded-lg hover:bg-neutral-50 dark:hover:bg-neutral-900 text-neutral-900 dark:text-white" href="blog.html">Blog</a>
              <a class="py-2 px-4 font-mono uppercase text-base rounded-lg hover:bg-neutral-50 dark:hover:bg-neutral-900 text-neutral-900 dark:text-white" href="contacts.html">Contact</a>
              <a class="text-white text-center py-2.5 px-5 h-11 font-mono uppercase text-base rounded-lg bg-neutral-950 hover:bg-neutral-700" href="contacts.html">Get Started</a>
            `;
					hamburger.parentElement.appendChild(mobileMenu);
				}
				hamburger.addEventListener("click", (e) => {
					e.stopPropagation();
					mobileMenu.classList.toggle("hidden");
				});
				document.addEventListener("click", (e) => {
					if (
						mobileMenu &&
						!mobileMenu.contains(e.target) &&
						e.target !== hamburger
					) {
						mobileMenu.classList.add("hidden");
					}
				});
			}

			// Accordions
			document.querySelectorAll(".divide-y button").forEach((button) => {
				button.addEventListener("click", () => {
					const answerContainer = button.nextElementSibling;
					const iconSpan = button.querySelector("span");
					const svgIcon = button.querySelector("svg");

					if (answerContainer) {
						const isCollapsed =
							answerContainer.style.height === "0px" ||
							!answerContainer.style.height;

						// Close all other FAQs first
						document.querySelectorAll(".divide-y > div > div").forEach((ac) => {
							ac.style.height = "0px";
							ac.style.opacity = "0";
							ac.style.overflow = "hidden";
							const btn = ac.previousElementSibling;
							if (btn) {
								const sp = btn.querySelector("span");
								if (sp) {
									sp.style.backgroundColor = "transparent";
									sp.style.color = "rgb(107, 114, 128)";
									const svg = sp.querySelector("svg");
									if (svg) {
										svg.style.transform = "none";
										svg.style.color = "rgb(107, 114, 128)";
									}
								}
							}
						});

						if (isCollapsed) {
							answerContainer.style.height = "auto";
							answerContainer.style.opacity = "1";
							answerContainer.style.overflow = "visible";
							if (iconSpan) {
								iconSpan.style.backgroundColor = "rgb(17, 24, 39)";
								iconSpan.style.color = "rgb(255, 255, 255)";
								if (svgIcon) {
									svgIcon.style.transform = "rotate(90deg)";
									svgIcon.style.color = "rgb(255, 255, 255)";
								}
							}
						}
					}
				});
			});

			// Active Link Styling
			const pathName =
				window.location.pathname.split("/").pop() || "index.html";
			document.querySelectorAll("header nav a, .mobile-menu a").forEach((a) => {
				const href = a.getAttribute("href");
				if (href === pathName) {
					a.classList.add(
						"text-neutral-900",
						"bg-neutral-50",
						"dark:bg-neutral-900",
					);
				}
			});
		});
		</script>
	</body>
</html>
