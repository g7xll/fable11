<!DOCTYPE html>

		<title>Lytic – Settings</title>
		<link rel="stylesheet" href="styles.css">
		<script>
		(function () {
			var saved = localStorage.getItem("lytic-theme");
			var prefersDark = window.matchMedia(
				"(prefers-color-scheme: dark)",
			).matches;
			if (saved === "dark" || (!saved && prefersDark)) {
				document.documentElement.classList.add("dark");
			} else {
				document.documentElement.classList.add("light");
			}
		})();
		</script>
	</head>

			<div class="main-content">
				<div class="topbar">
					<div class="flex items-center gap-2">
						<button class="mobile-menu-toggle" id="mobileMenuToggle">
							<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
								<path
									d="M3 12h18M3 6h18M3 18h18"
									stroke="currentColor"
									stroke-width="1.5"
									stroke-linecap="round"
								/>
							</svg>
						</button>
						<h1 class="topbar-title">Settings</h1>
					</div>
				</div>

				<div class="page-body">
					<div class="settings-layout">
						<!-- Settings sidebar tabs -->
						<div class="settings-sidebar">
							<a
								class="active"
								onclick="showTab('general'); return false;"
								href="#"
								>General</a
							>
							<a onclick="showTab('account'); return false;" href="#"
								>Account</a
							>
							<a onclick="showTab('team'); return false;" href="#">Team</a>
							<a onclick="showTab('notification'); return false;" href="#"
								>Notification</a
							>
							<a onclick="showTab('billing'); return false;" href="#"
								>Plan &amp; Billing</a
							>
							<a onclick="showTab('integrations'); return false;" href="#"
								>Integrations</a
							>
							<a onclick="showTab('api'); return false;" href="#">API Keys</a>
							<a onclick="showTab('security'); return false;" href="#"
								>Security &amp; Access</a
							>
						</div>

						<!-- Settings content -->
						<div class="settings-content">
							<div class="settings-content-title">General Settings</div>
							<div class="settings-content-subtitle">
								Configure your general account settings.
							</div>

							<div class="form-group">
								<label class="form-label">Workspace Name</label>
								<select class="form-select">
									<option>Lytic Analytics</option>
									<option>My Workspace</option>
								</select>
							</div>

							<div class="form-group">
								<label class="form-label">Workspace URL</label>
								<input
									type="text"
									class="form-input"
									value="lyticspro.app/workspace/main"
								>
							</div>

							<div class="form-group">
								<label class="form-label">Industry</label>
								<select class="form-select">
									<option>SaaS / Software</option>
									<option>E-commerce</option>
									<option>Finance</option>
									<option>Healthcare</option>
									<option>Education</option>
								</select>
							</div>

							<div class="form-group">
								<label class="form-label">Timezone</label>
								<select class="form-select">
									<option>UTC +06:00 (Dhaka)</option>
									<option>UTC +00:00 (London)</option>
									<option>UTC -05:00 (New York)</option>
									<option>UTC -08:00 (Los Angeles)</option>
									<option>UTC +01:00 (Paris)</option>
								</select>
							</div>

							<div class="form-group">
								<label class="form-label">Date Format</label>
								<select class="form-select">
									<option>DD / MM / YYYY</option>
									<option>MM / DD / YYYY</option>
									<option>YYYY-MM-DD</option>
								</select>
							</div>

							<div class="form-group">
								<label class="form-label">Currency</label>
								<select class="form-select">
									<option>USD</option>
									<option>EUR</option>
									<option>GBP</option>
									<option>BDT</option>
								</select>
							</div>

							<div class="settings-actions">
								<button class="btn btn-outline">Reset</button>
								<button class="btn btn-primary">Save Changes</button>
							</div>
						</div>
					</div>
				</div>
			</div>

		<button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
			<svg
				id="themeIconSun"
				width="20"
				height="20"
				viewBox="0 0 24 24"
				fill="none"
				style="display:none;"
			>
				<circle
					cx="12"
					cy="12"
					r="5"
					stroke="currentColor"
					stroke-width="1.5"
				/>
				<path
					d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
					stroke="currentColor"
					stroke-width="1.5"
					stroke-linecap="round"
				/>
			</svg>
			<svg
				id="themeIconMoon"
				width="20"
				height="20"
				viewBox="0 0 24 24"
				fill="none"
			>
				<path
					d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
					stroke="currentColor"
					stroke-width="1.5"
					stroke-linecap="round"
					stroke-linejoin="round"
				/>
			</svg>
		</button>

		<script src="shared.js"></script>
		<script>
		function showTab(tab) {
			var tabs = document.querySelectorAll(".settings-sidebar a");
			var idx = {
				general: 0,
				account: 1,
				team: 2,
				notification: 3,
				billing: 4,
				integrations: 5,
				api: 6,
				security: 7,
			};
			tabs.forEach(function (t, i) {
				t.classList.toggle("active", i === idx[tab]);
			});
		}
		</script>
	</body>
</html>
