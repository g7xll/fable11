		<script>
		// Calendar implementation
		const EVENTS = [
			{ date: "2026-07-01", label: "Event Conf.", color: "red" },
			{ date: "2026-07-02", label: "Meeting", color: "green" },
			{ date: "2026-07-03", label: "Workshop", color: "blue" },
		];

		let currentYear = 2026;
		let currentMonth = 6; // 0-indexed, so 6 = July

		function renderCalendar(year, month) {
			const monthNames = [
				"January",
				"February",
				"March",
				"April",
				"May",
				"June",
				"July",
				"August",
				"September",
				"October",
				"November",
				"December",
			];
			document.getElementById("cal-title").textContent =
				`${monthNames[month]} ${year}`;

			const firstDay = new Date(year, month, 1).getDay();
			const daysInMonth = new Date(year, month + 1, 0).getDate();
			const daysInPrevMonth = new Date(year, month, 0).getDate();

			const today = new Date();
			const isCurrentMonth =
				today.getFullYear() === year && today.getMonth() === month;
			const todayDate = today.getDate();

			const dayHeaders = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

			let html = `<div class="cal-grid">`;

			// Day headers
			dayHeaders.forEach((d) => {
				html += `<div class="cal-day-header">${d}</div>`;
			});

			// Previous month days
			for (let i = firstDay - 1; i >= 0; i--) {
				const d = daysInPrevMonth - i;
				html += `<div class="cal-cell"><div class="cal-day-num other-month">${d}</div></div>`;
			}

			// Current month days
			for (let d = 1; d <= daysInMonth; d++) {
				const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
				const dayEvents = EVENTS.filter((e) => e.date === dateStr);
				const isToday = isCurrentMonth && d === todayDate;

				html += `<div class="cal-cell">`;
				if (isToday) {
					html += `<div class="cal-day-num today">${d}</div>`;
				} else {
					html += `<div class="cal-day-num">${d}</div>`;
				}
				dayEvents.forEach((ev) => {
					html += `<div class="cal-event cal-event-${ev.color}">
              <div class="cal-event-dot"></div>
              ${ev.label}
            </div>`;
				});
				html += `</div>`;
			}

			// Next month days
			const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
			const remaining = totalCells - firstDay - daysInMonth;
			for (let d = 1; d <= remaining; d++) {
				html += `<div class="cal-cell"><div class="cal-day-num other-month">${d}</div></div>`;
			}

			html += "</div>";
			document.getElementById("calendar-container").innerHTML = html;
		}

		document.addEventListener("DOMContentLoaded", () => {
			renderCalendar(currentYear, currentMonth);

			document.getElementById("cal-prev").addEventListener("click", () => {
				currentMonth--;
				if (currentMonth < 0) {
					currentMonth = 11;
					currentYear--;
				}
				renderCalendar(currentYear, currentMonth);
			});

			document.getElementById("cal-next").addEventListener("click", () => {
				currentMonth++;
				if (currentMonth > 11) {
					currentMonth = 0;
					currentYear++;
				}
				renderCalendar(currentYear, currentMonth);
			});
		});
		</script>
