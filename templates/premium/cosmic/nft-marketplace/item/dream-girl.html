<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
(function(){
  try {
    var saved = localStorage.getItem('unft-theme');
    var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (dark) document.documentElement.classList.add('dark');
  } catch(e) {}
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>uNFT Marketplace — Item</title>
<meta name="description" content="uNFT Marketplace built with Cosmic CMS, Next.js, and the Stripe API">
<link rel="icon" href="../assets/img/misc/logo.png">
<link rel="stylesheet" href="../assets/css/fonts.css">
<link rel="stylesheet" href="../assets/css/tokens.css">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/home.css">
<link rel="stylesheet" href="../assets/css/item.css">
</head>
<body>
<div data-mount="header"></div>

<section class="section">
  <div class="container item-hero">
    <div class="item-media">
      <img data-item-image src="" alt="">
    </div>
    <div class="item-info">
      <h1 data-item-title></h1>
      <div class="item-price-row">
        <span class="card-price" data-item-price></span>
        <span class="item-stock" data-item-stock></span>
      </div>
      <p class="item-desc" data-item-desc></p>
      <div class="item-tags" data-item-tags></div>
      <select class="select item-qty" aria-label="Quantity">
        <option>1</option>
        <option>2</option>
        <option>3</option>
      </select>
      <div>
        <button type="button" class="btn btn-primary" data-buy-now>Buy Now</button>
      </div>
    </div>
  </div>
</section>

<section class="section hotbid-section">
  <div class="container">
    <div class="section-head">
      <h2 class="section-title">Hot bid</h2>
      <div class="carousel-arrows">
        <button type="button" class="arrow-btn" data-carousel-prev aria-label="Previous">&larr;</button>
        <button type="button" class="arrow-btn" data-carousel-next aria-label="Next">&rarr;</button>
      </div>
    </div>
    <div class="hotbid-track" data-hotbid-track></div>
  </div>
</section>

<section class="section discover-section" id="discover">
  <div class="container">
    <div class="discover-head">
      <div>
        <span class="eyebrow">Create, explore, &amp; collect digital art</span>
        <h2 class="section-title">Discover</h2>
      </div>
      <a href="../search.html" class="btn btn-outline btn-sm">Start search</a>
    </div>
    <div class="discover-controls">
      <select class="select discover-color-select" aria-label="Filter by color">
        <option>Any color</option>
      </select>
      <div class="chip-row" data-chip-row>
        <button type="button" class="chip is-active" data-filter-chip="all">All</button>
        <button type="button" class="chip" data-filter-chip="sale">Sale</button>
        <button type="button" class="chip" data-filter-chip="offer">Special offer</button>
        <button type="button" class="chip" data-filter-chip="cosmos">Cosmos</button>
        <button type="button" class="chip" data-filter-chip="artwork">Artwork</button>
      </div>
      <button type="button" class="btn btn-primary btn-sm">Filter</button>
    </div>
    <div class="grid" data-grid></div>
  </div>
</section>

<div data-mount="footer"></div>
<div data-mount="modal"></div>

<script>var ITEM_SLUG = "dream-girl";</script>
<script src="../assets/data/catalog.js"></script>
<script src="../assets/js/chrome.js"></script>
<script src="../assets/js/product-grid.js"></script>
<script src="../assets/js/filter.js"></script>
<script src="../assets/js/item.js"></script>
<script src="../assets/js/theme.js"></script>
<script>UnftChrome.mount("../", "");</script>
</body>
</html>
