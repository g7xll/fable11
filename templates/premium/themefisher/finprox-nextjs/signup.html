<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - FinProX</title>
  <link rel="icon" href="assets/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 1rem 2rem;
      background: var(--color-body);
    }
    .auth-card {
      width: 100%;
      max-width: 480px;
      padding: 2.5rem;
      border-radius: var(--radius-3xl);
      background: var(--color-white);
      border: 1px solid var(--color-border);
    }
    .auth-card .auth-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .auth-card .auth-logo img {
      width: 120px;
      height: auto;
      display: block;
      margin: 0 auto 1.25rem;
    }
    .auth-card .auth-heading {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--color-dark);
      margin-bottom: 0.375rem;
    }
    .auth-card .auth-heading em {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-style: italic;
    }
    .auth-card .auth-subtext {
      font-size: 0.875rem;
      color: rgba(26,26,26,0.6);
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      font-size: 0.8125rem;
      color: rgba(26,26,26,0.45);
    }
    .auth-divider span.line {
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }
    .auth-social-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .auth-footer-text {
      text-align: center;
      font-size: 0.875rem;
      color: rgba(26,26,26,0.6);
      margin-top: 1.5rem;
    }
    .auth-footer-text a {
      color: var(--color-primary);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="auth-page">
      <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
          <a href="index.html">
            <img src="assets/images/logo.png" alt="FinProX" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
            <span style="display:none;font-size:1.5rem;font-weight:700;color:var(--color-dark);">FinProX</span>
          </a>
          <h1 class="auth-heading has-em">Start your <em>free trial</em></h1>
          <p class="auth-subtext">Create your FinProX account</p>
        </div>

        <!-- Form -->
        <form>
          <div class="form-group">
            <label class="form-label" for="full-name">Full Name</label>
            <input class="form-control" type="text" id="full-name" placeholder="Jane Smith" autocomplete="name" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input class="form-control" type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" type="password" id="password" placeholder="Create a strong password" autocomplete="new-password" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm Password</label>
            <input class="form-control" type="password" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password" required>
          </div>
          <div style="display:flex;align-items:flex-start;gap:0.625rem;margin-bottom:1.5rem;">
            <input type="checkbox" id="agree-terms" style="width:1rem;height:1rem;accent-color:var(--color-dark);cursor:pointer;margin-top:0.2rem;flex-shrink:0;" required>
            <label for="agree-terms" style="font-size:0.875rem;cursor:pointer;color:rgba(26,26,26,0.8);line-height:1.5;">
              I agree to the <a href="#" style="color:var(--color-primary);font-weight:500;">Terms of Service</a> and <a href="#" style="color:var(--color-primary);font-weight:500;">Privacy Policy</a>
            </label>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-full">Create Account</button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">
          <span class="line"></span>
          or continue with
          <span class="line"></span>
        </div>

        <!-- Social Buttons -->
        <div class="auth-social-row">
          <button type="button" class="btn btn-outline-primary" style="font-size:0.875rem;display:flex;align-items:center;justify-content:center;gap:0.5rem;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
          </button>
          <button type="button" class="btn btn-outline-primary" style="font-size:0.875rem;display:flex;align-items:center;justify-content:center;gap:0.5rem;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
            Continue with GitHub
          </button>
        </div>

        <p class="auth-footer-text">Already have an account? <a href="signin.html">Sign in</a></p>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
