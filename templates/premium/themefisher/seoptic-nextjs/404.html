<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Seoptic</title>
  <meta name="description" content="The page you were looking for could not be found. Return to the Seoptic homepage.">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    .error-logo {
      margin-bottom: 1rem;
    }
    .error-code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      line-height: 1;
      color: var(--color-primary);
      font-family: var(--font-heading);
      letter-spacing: -0.04em;
    }
    .error-title {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      font-family: var(--font-heading);
      color: var(--color-text);
      margin: 0;
    }
    .error-message {
      color: var(--color-text-light);
      font-size: 1.0625rem;
      line-height: 1.7;
      max-width: 460px;
    }
    .error-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
<div class="error-page">
  <a href="index.html" class="error-logo">
    <img src="assets/images/logo.png" alt="Seoptic" width="120" height="36">
  </a>
  <div class="error-code">404</div>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-message">Oops! The page you're looking for doesn't exist or has been moved. Double-check the URL or head back to the homepage.</p>
  <div class="error-actions">
    <a href="index.html" class="btn btn-primary">Go Back Home</a>
    <a href="contact.html" class="btn btn-outline">Contact Support</a>
  </div>
</div>
<script src="assets/js/main.js"></script>
</body>
</html>
