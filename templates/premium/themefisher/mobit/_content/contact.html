<section class="page-hero">
	<div class="container" data-aos="fade-up-sm">
		<h1>Get In Touch</h1>
		<p>We are here to help you with any questions you may have. Reach out to us and we will respond as soon as we can.</p>
	</div>
</section>

<section class="section" style="padding-top:1rem">
	<div class="container">
		<form class="contact-form" data-aos="fade-up-sm" onsubmit="return false">
			<div class="form-row">
				<div class="form-group">
					<label for="name">Your Name *</label>
					<input id="name" type="text" placeholder="Your Full Name" required />
				</div>
				<div class="form-group">
					<label for="email">Email Address *</label>
					<input id="email" type="email" placeholder="Email Address" required />
				</div>
			</div>
			<div class="form-group">
				<label for="subject">Subject *</label>
				<input id="subject" type="text" placeholder="Write Your Subject Here" required />
			</div>
			<div class="form-group">
				<label for="message">Write Message *</label>
				<textarea id="message" placeholder="Write Your Message Here" required></textarea>
			</div>
			<button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Send Message</button>
		</form>
	</div>
</section>
