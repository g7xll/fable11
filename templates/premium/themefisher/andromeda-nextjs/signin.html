<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — Andromeda</title>
  <link rel="shortcut icon" href="assets/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="auth-layout">
    <!-- Left panel: light peach with illustration -->
    <div class="auth-left">
      <a class="auth-logo" href="index.html">
        <img src="assets/images/logo.png" alt="Andromeda" style="height:36px">
      </a>
      <p style="margin:1rem 0 0;font-size:1rem;color:var(--heading-color);max-width:18rem;text-align:center">Join Over 30000 Companys Validing Proto Decision With Andromeda</p>
      <div class="auth-left-content">
        <img src="assets/images/signup.webp" alt="Sign In Illustration" style="max-width:80%;margin:0 auto;display:block">
      </div>
    </div>

    <!-- Right panel: form -->
    <div class="auth-right">
      <div class="auth-form-wrap">
        <div class="auth-form-header">
          <h2 style="position:relative;display:inline-block;padding-bottom:0.75rem">Sign In
            <span style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:3rem;height:3px;background:var(--primary);border-radius:2px"></span>
          </h2>
        </div>

        <form class="auth-form" action="#" method="post" style="margin-top:1.5rem">
          <div class="form-group">
            <label for="email">Enter Email Address</label>
            <input class="form-control" id="email" type="email" placeholder="Type Your Email Address" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input class="form-control" id="password" type="password" placeholder="Enter Your Password" required>
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:0.5rem">
            <input type="checkbox" id="remember" style="accent-color:var(--primary);width:16px;height:16px">
            <label for="remember" style="margin:0;font-size:0.9rem;color:var(--body-color)">Remember Me</label>
          </div>
          <button class="btn btn-primary w-full" type="submit" style="margin-top:0.5rem">Submit Now</button>
        </form>

        <p style="text-align:center;margin-top:1.25rem;font-size:0.9rem;color:var(--body-color)">
          Dont Have An Account? <a href="signup.html" style="color:var(--primary);font-weight:500">Sign Up</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
