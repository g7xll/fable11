<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up — Andromeda</title>
  <link rel="shortcut icon" href="assets/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="auth-layout">
    <!-- Left panel: light peach with illustration -->
    <div class="auth-left">
      <a class="auth-logo" href="index.html">
        <img src="assets/images/logo.png" alt="Andromeda" style="height:36px">
      </a>
      <p style="margin:1rem 0 0;font-size:1rem;color:var(--heading-color);max-width:18rem;text-align:center">Join Over 30000 Companys Validing Proto Decision With Andromeda</p>
      <div class="auth-left-content">
        <img src="assets/images/signup.webp" alt="Sign Up Illustration" style="max-width:80%;margin:0 auto;display:block">
      </div>
    </div>

    <!-- Right panel: form -->
    <div class="auth-right">
      <div class="auth-form-wrap">
        <div class="auth-form-header">
          <h2 style="position:relative;display:inline-block;padding-bottom:0.75rem">Sign Up
            <span style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:3rem;height:3px;background:var(--primary);border-radius:2px"></span>
          </h2>
        </div>

        <form class="auth-form" action="#" method="post" style="margin-top:1.5rem">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input class="form-control" id="name" type="text" placeholder="Your Full Name" required>
          </div>
          <div class="form-group">
            <label for="email">Enter Email Address</label>
            <input class="form-control" id="email" type="email" placeholder="Type Your Email Address" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input class="form-control" id="password" type="password" placeholder="Enter Your Password" required>
          </div>
          <button class="btn btn-primary w-full" type="submit" style="margin-top:0.25rem">Submit Now</button>
        </form>

        <p style="text-align:center;margin-top:1.25rem;font-size:0.9rem;font-weight:600;color:var(--heading-color)">Otherwise Log In With</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.75rem">
          <button style="display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.6rem 1rem;border:none;border-radius:0.5rem;background:#1877f2;color:#fff;font-family:inherit;font-size:0.9rem;font-weight:500;cursor:pointer">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
            Facebook
          </button>
          <button style="display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.6rem 1rem;border:none;border-radius:0.5rem;background:#e94235;color:#fff;font-family:inherit;font-size:0.9rem;font-weight:500;cursor:pointer">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/></svg>
            Google
          </button>
        </div>

        <p style="text-align:center;margin-top:1.25rem;font-size:0.9rem;color:var(--body-color)">
          Already Have An Account? <a href="signin.html" style="color:var(--primary);font-weight:500">Sign In</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
