<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Gray — Request Demo</title>
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<link rel="stylesheet" href="assets/css/styles.css">
	</head>
	<body>
		<div class="page-wrapper">
			<!-- Header -->
			<header class="site-header">
				<div class="header-inner">
					<div class="header-bar">
						<div style="display:flex;align-items:center;flex:1;">
							<a class="logo-link" href="index.html">
								<img
									src="assets/images/logo.png"
									width="24"
									height="24"
									alt="Logo"
								>
							</a>
						</div>
						<nav>
							<ul
								style="display:flex;align-items:center;gap:0.25rem;list-style:none;"
							>
								<li><a class="nav-link" href="login.html">Log in</a></li>
								<li>
									<a class="btn btn-dark" href="request-demo.html"
										>Request Demo</a
									>
								</li>
							</ul>
						</nav>
					</div>
				</div>
			</header>

			<main class="auth-section">
				<div class="auth-inner">
					<div class="auth-header">
						<h1 class="auth-title">Request a Demo</h1>
						<p class="auth-subtitle">
							Discover how Gray helps design teams create without limits.
						</p>
					</div>
					<div class="auth-card-wrap">
						<div class="auth-card" style="max-width:36rem;">
							<form>
								<div class="form-fields">
									<div
										style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;"
									>
										<div>
											<label class="form-label" for="first-name"
												>First name</label
											>
											<input
												class="form-input"
												id="first-name"
												type="text"
												placeholder="John"
												required
											>
										</div>
										<div>
											<label class="form-label" for="last-name"
												>Last name</label
											>
											<input
												class="form-input"
												id="last-name"
												type="text"
												placeholder="Doe"
												required
											>
										</div>
									</div>
									<div>
										<label class="form-label" for="email">Work email</label>
										<input
											class="form-input"
											id="email"
											type="email"
											placeholder="mark@acmecorp.com"
											required
										>
									</div>
									<div>
										<label class="form-label" for="company">Company</label>
										<input
											class="form-input"
											id="company"
											type="text"
											placeholder="Acme Corp"
											required
										>
									</div>
									<div>
										<label class="form-label" for="role">Role</label>
										<select class="form-select form-input" id="role">
											<option value="">Select your role</option>
											<option>Designer</option>
											<option>Developer</option>
											<option>Product Manager</option>
											<option>Executive</option>
											<option>Other</option>
										</select>
									</div>
									<div>
										<label class="form-label" for="message"
											>Message (optional)</label
										>
										<textarea
											class="form-input form-textarea"
											id="message"
											rows="4"
											placeholder="Tell us about your needs..."
										></textarea>
									</div>
								</div>
								<button class="btn btn-dark btn-full" type="submit">
									Request Demo
								</button>
							</form>
							<div class="auth-terms">
								By submitting this form you agree to our
								<a href="#0">Privacy Policy</a>
							</div>
						</div>
					</div>
				</div>
			</main>

			<!-- Footer -->
			<footer style="padding:1.5rem 0;border-top:1px solid var(--zinc-200);">
				<div
					class="container"
					style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;"
				>
					<a class="logo-link" href="index.html"
						><img
							src="assets/images/logo.png"
							width="24"
							height="24"
							alt="Logo"
						></a
					>
					<p style="font-size:0.75rem;color:var(--zinc-500);">
						© Cruip.com. All rights reserved.
					</p>
				</div>
			</footer>
		</div>
		<script src="assets/js/alpinejs.min.js" defer></script>
	</body>
</html>
