<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Gray — Log In</title>
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<link rel="stylesheet" href="assets/css/styles.css">
	</head>
	<body>
		<div class="page-wrapper">
			<!-- Header -->
			<header class="site-header">
				<div class="header-inner">
					<div class="header-bar">
						<div style="display:flex;align-items:center;flex:1;">
							<a class="logo-link" href="index.html">
								<img
									src="assets/images/logo.png"
									width="24"
									height="24"
									alt="Logo"
								>
							</a>
						</div>
						<nav>
							<ul
								style="display:flex;align-items:center;gap:0.25rem;list-style:none;"
							>
								<li><a class="nav-link" href="login.html">Log in</a></li>
								<li>
									<a class="btn btn-dark" href="request-demo.html"
										>Request Demo</a
									>
								</li>
							</ul>
						</nav>
					</div>
				</div>
			</header>

			<main class="auth-section">
				<div class="auth-inner">
					<div class="auth-header">
						<h1 class="auth-title">Log in to Gray</h1>
					</div>
					<div class="auth-card-wrap">
						<div class="auth-card">
							<form>
								<div class="form-fields">
									<div>
										<label class="form-label" for="email">Email</label>
										<input
											class="form-input"
											id="email"
											type="email"
											placeholder="mark@acmecorp.com"
											required
										>
									</div>
									<div>
										<div class="form-field-head">
											<label class="form-label" for="password">Password</label>
											<a class="forgot-link" href="reset-password.html"
												>Forgot?</a
											>
										</div>
										<input
											class="form-input"
											id="password"
											type="password"
											required
										>
									</div>
								</div>
								<button class="btn btn-dark btn-full" type="submit">
									Log in
								</button>
							</form>
							<div class="auth-divider"><span class="auth-or">Or</span></div>
							<button class="google-btn">
								<div class="google-btn-icon">
									<svg
										viewBox="0 0 16 16"
										xmlns="http://www.w3.org/2000/svg"
										width="16"
										height="16"
									>
										<path
											d="M15.679 6.545H8.043v3.273h4.328c-.692 2.182-2.401 2.91-4.363 2.91a4.727 4.727 0 1 1 3.035-8.347l2.378-2.265A8 8 0 1 0 8.008 16c4.41 0 8.4-2.909 7.67-9.455Z"
										/>
									</svg>
								</div>
								<span class="google-btn-text">Continue With Google</span>
								<span class="google-btn-after"></span>
							</button>
							<div class="auth-terms">
								By logging in you agree with our <a href="#0">Terms</a>
							</div>
						</div>
					</div>
				</div>
			</main>

			<!-- Footer -->
			<footer style="padding:1.5rem 0;border-top:1px solid var(--zinc-200);">
				<div
					class="container"
					style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;"
				>
					<a class="logo-link" href="index.html"
						><img
							src="assets/images/logo.png"
							width="24"
							height="24"
							alt="Logo"
						></a
					>
					<p style="font-size:0.75rem;color:var(--zinc-500);">
						© Cruip.com. All rights reserved.
					</p>
				</div>
			</footer>
		</div>
		<script src="assets/js/alpinejs.min.js" defer></script>
	</body>
</html>
