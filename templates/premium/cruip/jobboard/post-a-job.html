<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Job Board – Post a Job</title>
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<link rel="stylesheet" href="styles.css">
	</head>
	<body
		style="font-family:'Inter',sans-serif;color:#1f2937;background:#fff;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em"
	>
		<main style="display:flex">
			<!-- Left: form panel -->
			<div class="split-left">
				<div style="height:100%">
					<div class="split-form-inner">
						<!-- Logo -->
						<header style="display:flex;flex-grow:1;margin-bottom:auto">
							<div
								style="display:flex;align-items:center;justify-content:space-between;height:4rem;flex-grow:1"
							>
								<a href="index.html" aria-label="Cruip" style="display:block">
									<svg
										width="32"
										height="32"
										xmlns="http://www.w3.org/2000/svg"
									>
										<path
											fill="#6366f1"
											d="M13.853 18.14 1 10.643 31 1l-.019.058z"
										></path>
										<path
											fill="#a5b4fc"
											d="M13.853 18.14 30.981 1.058 21.357 31l-7.5-12.857z"
										></path>
									</svg>
								</a>
							</div>
						</header>

						<!-- Form content -->
						<div style="flex-grow:1;padding-top:2rem;padding-bottom:2rem">
							<div style="margin-bottom:2.5rem">
								<h1
									style="font-size:2.25rem;line-height:1.277;letter-spacing:-0.01em;font-weight:800;margin-bottom:0.5rem"
								>
									Post a job on JobBoard
								</h1>
								<div style="color:#6b7280">
									Find the best talent from around the world on the most
									exclusive job board on the internet.
								</div>
							</div>

							<!-- Form -->
							<form onsubmit="return false" style="margin-bottom:3rem">
								<div
									style="display:flex;flex-direction:column;gap:0;border-top:1px solid #e5e7eb"
								>
									<!-- Group 1: Your company -->
									<div
										style="padding-top:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid #e5e7eb"
									>
										<div
											style="font-size:1.125rem;font-weight:700;letter-spacing:-0.01em;color:#1f2937;margin-bottom:1.25rem"
										>
											<span style="color:#6366f1">1.</span>
											Your company
										</div>
										<div style="display:flex;flex-direction:column;gap:1rem">
											<div>
												<label
													for="company-name"
													style="display:block;font-size:0.875rem;font-weight:500;color:#1f2937;margin-bottom:0.25rem"
													>Company Name
													<span style="color:#ef4444">*</span></label
												>
												<input
													id="company-name"
													type="text"
													required
													placeholder="E.g., Acme Inc."
													class="form-input"
												>
											</div>
											<div>
												<label
													for="contact-email"
													style="display:block;font-size:0.875rem;font-weight:500;color:#1f2937;margin-bottom:0.25rem"
													>Contact Email
													<span style="color:#ef4444">*</span></label
												>
												<input
													id="contact-email"
													type="email"
													required
													class="form-input"
												>
											</div>
											<div>
												<label
													for="logo-upload"
													style="display:block;font-size:0.875rem;font-weight:500;color:#1f2937;margin-bottom:0.25rem"
													>Company Logo
													<span style="color:#6b7280">(optional)</span></label
												>
												<div
													style="display:flex;align-items:center;gap:0.75rem"
												>
													<div style="flex-shrink:0;margin-right:0.75rem">
														<img
															src="assets/images/upload.jpg"
															alt="Upload"
															style="border-radius:9999px;width:4rem;height:4rem;object-fit:cover;border:1px solid #e5e7eb"
														>
													</div>
													<div>
														<input
															id="logo-upload"
															type="file"
															style="font-size:0.875rem;cursor:pointer;color:#6b7280;width:100%"
														>
													</div>
												</div>
											</div>
										</div>
									</div>

									<!-- Group 2: The role -->
									<div
										style="padding-top:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid #e5e7eb"
									>
										<div
											style="font-size:1.125rem;font-weight:700;letter-spacing:-0.01em;color:#1f2937;margin-bottom:1.25rem"
										>
											<span style="color:#6366f1">2.</span>
											The role
										</div>
										<div style="display:flex;flex-direction:column;gap:1rem">
											<div>
												<label
													for="position"
													style="display:block;font-size:0.875rem;font-weight:500;color:#1f2937;margin-bottom:0.25rem"
													>Position Name
													<span style="color:#ef4444">*</span></label
												>
												<input
													id="position"
													type="text"
													required
													placeholder="E.g., Senior Software Engineer"
													class="form-input"
												>
											</div>
											<div>
												<label
													for="role"
													style="display:block;font-size:0.875rem;font-weight:500;color:#1f2937;margin-bottom:0.25rem"
													>Role <span style="color:#f43f5e">*</span></label
												>
												<select
													id="role"
													required
													class="form-select"
													style="font-size:0.875rem;padding-top:0.5rem;padding-bottom:0.5rem"
												>
													<option>Programming</option>
													<option>Design</option>
													<option>Management / Finance</option>
													<option>Customer Support</option>
													<option>Sales / Marketing</option>
												</select>
											</div>
											<div>
												<label
													for="commitment"
													style="display:block;font-size:0.875rem;font-weight:500;color:#1f2937;margin-bottom:0.25rem"
													>Commitment
													<span style="color:#f43f5e">*</span></label
												>
												<select
													id="commitment"
													required
													class="form-select"
													style="font-size:0.875rem;padding-top:0.5rem;padding-bottom:0.5rem"
												>
													<option>Full-time</option>
													<option>Part-time</option>
													<option>Intership</option>
													<option>Contract / Freelance</option>
													<option>Co-founder</option>
												</select>
											</div>
											<div>
												<label
													for="description"
													style="display:block;font-size:0.875rem;font-weight:500;color:#1f2937;margin-bottom:0.25rem"
													>Job Description
													<span style="color:#f43f5e">*</span></label
												>
												<textarea
													id="description"
													rows="4"
													required
													class="form-textarea"
													style="font-size:0.875rem;padding-top:0.5rem;padding-bottom:0.5rem"
												></textarea>
											</div>
											<div>
												<label
													for="salary"
													style="display:block;font-size:0.875rem;font-weight:500;color:#1f2937;margin-bottom:0.25rem"
													>Salary
													<span style="color:#6b7280">(optional)</span></label
												>
												<input id="salary" type="text" class="form-input">
												<div
													style="font-size:0.75rem;color:#6b7280;font-style:italic;margin-top:0.5rem"
												>
													Example: "$100,000 – $170,000 USD"
												</div>
											</div>
										</div>
									</div>

									<!-- Group 3: Add-ons -->
									<div style="padding-top:1.5rem">
										<div
											style="font-size:1.125rem;font-weight:700;letter-spacing:-0.01em;color:#1f2937;margin-bottom:1.25rem"
										>
											<span style="color:#6366f1">3.</span>
											Select add-ons and pay
										</div>
										<div
											style="display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem"
										>
											<!-- Add-on: Stick post -->
											<button
												type="button"
												id="addon-stick"
												onclick="toggleAddon('stick')"
												class="addon-btn"
												style="text-align:left"
											>
												<div
													style="display:flex;align-items:center;justify-content:space-between"
												>
													<div>
														<div
															style="font-size:0.875rem;font-weight:500;color:#1f2937;margin-bottom:0.25rem"
														>
															Stick your post to stay on top (+$79)
														</div>
														<div
															style="font-size:0.875rem;color:#6b7280;font-style:italic"
														>
															4x more views
														</div>
													</div>
													<div
														style="flex-shrink:0;margin-left:0.75rem;border:1px solid #e5e7eb;border-radius:9999px"
													>
														<svg
															id="addon-stick-plus"
															style="fill:#6366f1;display:block"
															width="32"
															height="32"
															xmlns="http://www.w3.org/2000/svg"
														>
															<path
																d="M21 15h-4v-4a1 1 0 0 0-2 0v4h-4a1 1 0 0 0 0 2h4v4a1 1 0 0 0 2 0v-4h4a1 1 0 0 0 0-2Z"
															/>
														</svg>
														<svg
															id="addon-stick-check"
															style="fill:#14b8a6;display:none"
															width="32"
															height="32"
															xmlns="http://www.w3.org/2000/svg"
														>
															<path
																d="m20.28 12.28-6.292 6.294-2.293-2.293a1 1 0 0 0-1.414 1.414l3 3a1 1 0 0 0 1.414 0l7-7a1 1 0 0 0-1.414-1.414Z"
															/>
														</svg>
													</div>
												</div>
											</button>
											<!-- Add-on: Highlight -->
											<button
												type="button"
												id="addon-highlight"
												onclick="toggleAddon('highlight')"
												class="addon-btn active"
												style="text-align:left"
											>
												<div
													style="display:flex;align-items:center;justify-content:space-between"
												>
													<div>
														<div
															style="font-size:0.875rem;font-weight:500;color:#1f2937;margin-bottom:0.25rem"
														>
															Highlight your post in indigo (+$49)
														</div>
														<div
															style="font-size:0.875rem;color:#6b7280;font-style:italic"
														>
															2x more views
														</div>
													</div>
													<div
														style="flex-shrink:0;margin-left:0.75rem;border:1px solid #e5e7eb;border-radius:9999px"
													>
														<svg
															id="addon-highlight-plus"
															style="fill:#6366f1;display:none"
															width="32"
															height="32"
															xmlns="http://www.w3.org/2000/svg"
														>
															<path
																d="M21 15h-4v-4a1 1 0 0 0-2 0v4h-4a1 1 0 0 0 0 2h4v4a1 1 0 0 0 2 0v-4h4a1 1 0 0 0 0-2Z"
															/>
														</svg>
														<svg
															id="addon-highlight-check"
															style="fill:#14b8a6;display:block"
															width="32"
															height="32"
															xmlns="http://www.w3.org/2000/svg"
														>
															<path
																d="m20.28 12.28-6.292 6.294-2.293-2.293a1 1 0 0 0-1.414 1.414l3 3a1 1 0 0 0 1.414 0l7-7a1 1 0 0 0-1.414-1.414Z"
															/>
														</svg>
													</div>
												</div>
											</button>
										</div>
										<div style="margin-top:1.5rem">
											<button
												type="submit"
												class="btn btn-primary"
												style="width:100%;padding:0.625rem 1.25rem"
											>
												Pay Now – $349
											</button>
										</div>
										<div style="margin-top:1rem">
											<div style="font-size:0.75rem;color:#6b7280">
												By clicking pay you agree to our
												<a href="#" style="text-decoration:underline"
													>Terms of Service</a
												>
												and
												<a href="#" style="text-decoration:underline"
													>Privacy Policy</a
												>.
											</div>
										</div>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>

			<!-- Right: decorative panel -->
			<div class="split-right" aria-hidden="true">
				<div class="split-right-bg"></div>
				<div style="position:absolute;right:0;z-index:-10;pointer-events:none">
					<img
						src="assets/images/auth-illustration.svg"
						width="1440"
						height="900"
						alt=""
						style="max-width:none"
					>
				</div>
				<!-- Testimonials -->
				<div
					style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"
				>
					<div class="auth-testimonials">
						<div
							style="display:flex;flex-direction:column;gap:0.75rem;padding:2rem 1.5rem"
						>
							<!-- Testimonial 1 (dimmed) -->
							<div class="auth-testimonial-card dimmed">
								<div class="auth-testimonial-inner">
									<div class="auth-testimonial-avatar">
										<img
											src="assets/images/testimonial-auth-04.jpg"
											width="88"
											height="88"
											alt="Testimonial 04"
										>
										<svg
											class="auth-testimonial-quote-icon"
											width="26"
											height="17"
											xmlns="http://www.w3.org/2000/svg"
										>
											<path
												d="M0 16.026h8.092l6.888-16h-4.592L0 16.026Zm11.02 0h8.092L26 .026h-4.65l-10.33 16Z"
											/>
										</svg>
									</div>
									<figure>
										<blockquote
											style="font-size:1.125rem;font-weight:700;line-height:1.5;padding-bottom:0.25rem"
										>
											<p>
												Listing our jobs through JobBoard was simple, quick, and
												helped us find amazing candidates.
											</p>
										</blockquote>
										<figcaption
											style="font-size:0.875rem;font-weight:500;color:#6b7280"
										>
											Lisa Smith, developer at
											<a href="#" style="color:#0ea5e9">AppyYou</a>
										</figcaption>
									</figure>
								</div>
							</div>
							<!-- Testimonial 2 (active) -->
							<div class="auth-testimonial-card">
								<div class="auth-testimonial-inner">
									<div class="auth-testimonial-avatar">
										<img
											src="assets/images/testimonial-auth-05.jpg"
											width="88"
											height="88"
											alt="Testimonial 05"
										>
										<svg
											class="auth-testimonial-quote-icon"
											width="26"
											height="17"
											xmlns="http://www.w3.org/2000/svg"
										>
											<path
												d="M0 16.026h8.092l6.888-16h-4.592L0 16.026Zm11.02 0h8.092L26 .026h-4.65l-10.33 16Z"
											/>
										</svg>
									</div>
									<figure>
										<blockquote
											style="font-size:1.125rem;font-weight:700;line-height:1.5;padding-bottom:0.25rem"
										>
											<p>
												Listing our jobs through JobBoard was simple, quick, and
												helped us find amazing candidates.
											</p>
										</blockquote>
										<figcaption
											style="font-size:0.875rem;font-weight:500;color:#6b7280"
										>
											Mark Mills, developer at
											<a href="#" style="color:#0ea5e9">App.com</a>
										</figcaption>
									</figure>
								</div>
							</div>
							<!-- Testimonial 3 (dimmed) -->
							<div class="auth-testimonial-card dimmed">
								<div class="auth-testimonial-inner">
									<div class="auth-testimonial-avatar">
										<img
											src="assets/images/testimonial-auth-06.jpg"
											width="88"
											height="88"
											alt="Testimonial 06"
										>
										<svg
											class="auth-testimonial-quote-icon"
											width="26"
											height="17"
											xmlns="http://www.w3.org/2000/svg"
										>
											<path
												d="M0 16.026h8.092l6.888-16h-4.592L0 16.026Zm11.02 0h8.092L26 .026h-4.65l-10.33 16Z"
											/>
										</svg>
									</div>
									<figure>
										<blockquote
											style="font-size:1.125rem;font-weight:700;line-height:1.5;padding-bottom:0.25rem"
										>
											<p>
												Listing our jobs through JobBoard was simple, quick, and
												helped us find amazing candidates.
											</p>
										</blockquote>
										<figcaption
											style="font-size:0.875rem;font-weight:500;color:#6b7280"
										>
											Lisa Smith, developer at
											<a href="#" style="color:#0ea5e9">AppyYou</a>
										</figcaption>
									</figure>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>

		<script>
		function toggleAddon(id) {
			var btn = document.getElementById("addon-" + id);
			var plus = document.getElementById("addon-" + id + "-plus");
			var check = document.getElementById("addon-" + id + "-check");
			var active = btn.classList.contains("active");
			if (active) {
				btn.classList.remove("active");
				plus.style.display = "block";
				check.style.display = "none";
			} else {
				btn.classList.add("active");
				plus.style.display = "none";
				check.style.display = "block";
			}
		}
		</script>
	</body>
</html>
