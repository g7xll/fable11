<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Job Board – Sign In</title>
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<link rel="stylesheet" href="styles.css">
	</head>
	<body
		style="font-family:'Inter',sans-serif;color:#1f2937;background:#fff;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em"
	>
		<main style="display:flex">
			<!-- Left: form panel -->
			<div class="split-left">
				<div style="height:100%">
					<div class="split-form-inner">
						<!-- Logo -->
						<header style="display:flex;flex-grow:1;margin-bottom:auto">
							<div
								style="display:flex;align-items:center;justify-content:space-between;height:4rem;flex-grow:1"
							>
								<a href="index.html" aria-label="Cruip" style="display:block">
									<svg
										width="32"
										height="32"
										xmlns="http://www.w3.org/2000/svg"
									>
										<path
											fill="#6366f1"
											d="M13.853 18.14 1 10.643 31 1l-.019.058z"
										></path>
										<path
											fill="#a5b4fc"
											d="M13.853 18.14 30.981 1.058 21.357 31l-7.5-12.857z"
										></path>
									</svg>
								</a>
							</div>
						</header>

						<!-- Form content -->
						<div style="flex-grow:1;padding-top:2rem;padding-bottom:2rem">
							<div style="margin-bottom:2.5rem">
								<h1
									style="font-size:2.25rem;line-height:1.277;letter-spacing:-0.01em;font-weight:800;margin-bottom:0.5rem"
								>
									Sign in to JobBoard!
								</h1>
								<div style="color:#6b7280">
									Enter your email and we'll email you a magic link for a
									password-free sign in.
								</div>
							</div>

							<!-- Magic link form -->
							<form onsubmit="return false">
								<div
									style="display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem"
								>
									<div>
										<label
											for="email"
											style="display:block;font-size:0.875rem;font-weight:500;color:#1f2937;margin-bottom:0.25rem"
											>Email</label
										>
										<input
											id="email"
											type="email"
											required
											class="form-input"
											style="width:100%"
										>
									</div>
								</div>
								<div style="margin-top:1.5rem">
									<button
										type="submit"
										class="btn btn-primary"
										style="width:100%;padding:0.625rem 1.25rem"
									>
										Get Magic Link
										<span class="btn-arrow" style="color:#c7d2fe">→</span>
									</button>
								</div>
							</form>

							<!-- Divider -->
							<div
								style="display:flex;align-items:center;margin-top:1.5rem;margin-bottom:1.5rem"
							>
								<div
									style="flex-grow:1;height:1px;background:#e5e7eb;margin-right:0.75rem"
								></div>
								<div style="font-size:0.875rem;color:#6b7280;font-style:italic">
									Or
								</div>
								<div
									style="flex-grow:1;height:1px;background:#e5e7eb;margin-left:0.75rem"
								></div>
							</div>

							<!-- Google sign in -->
							<button
								type="button"
								class="btn btn-danger"
								style="width:100%;position:relative;padding:0.5rem 1rem"
							>
								<div
									style="display:flex;align-items:center;flex-grow:1;margin-right:0.5rem"
								>
									<svg
										style="width:1rem;height:1rem;fill:#fecdd3;flex-shrink:0"
										viewBox="0 0 16 16"
										xmlns="http://www.w3.org/2000/svg"
									>
										<path
											d="M15.679 6.545H8.043v3.273h4.328c-.692 2.182-2.401 2.91-4.363 2.91a4.727 4.727 0 1 1 3.035-8.347l2.378-2.265A8 8 0 1 0 8.008 16c4.41 0 8.4-2.909 7.67-9.455Z"
										/>
									</svg>
								</div>
								<span
									style="color:#fff241;flex-grow:1;padding-left:0.75rem;color:#fff1f2"
								>
									Continue With Google
									<span class="btn-arrow" style="color:#fecdd3">→</span>
								</span>
							</button>
						</div>
					</div>
				</div>
			</div>

			<!-- Right: decorative panel -->
			<div class="split-right" aria-hidden="true">
				<!-- Gradient bg -->
				<div class="split-right-bg"></div>
				<!-- Illustration -->
				<div style="position:absolute;right:0;z-index:-10;pointer-events:none">
					<img
						src="assets/images/auth-illustration.svg"
						width="1440"
						height="900"
						alt=""
						style="max-width:none"
					>
				</div>
				<!-- Testimonials -->
				<div
					style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"
				>
					<div class="auth-testimonials">
						<div style="display:flex;flex-direction:column;gap:0.75rem">
							<!-- Testimonial 1 (dimmed) -->
							<div class="auth-testimonial-card dimmed">
								<div class="auth-testimonial-inner">
									<div class="auth-testimonial-avatar">
										<img
											src="assets/images/testimonial-auth-01.jpg"
											width="88"
											height="88"
											alt="Testimonial 01"
										>
										<svg
											class="auth-testimonial-quote-icon"
											width="26"
											height="17"
											xmlns="http://www.w3.org/2000/svg"
										>
											<path
												d="M0 16.026h8.092l6.888-16h-4.592L0 16.026Zm11.02 0h8.092L26 .026h-4.65l-10.33 16Z"
											/>
										</svg>
									</div>
									<figure>
										<blockquote
											style="font-size:1.125rem;font-weight:700;line-height:1.5;padding-bottom:0.25rem"
										>
											<p>
												I got an offer three weeks after I applied via JobBoard.
												I have never been happier in my career life.
											</p>
										</blockquote>
										<figcaption
											style="font-size:0.875rem;font-weight:500;color:#6b7280"
										>
											Lisa Smith, developer at
											<a href="#" style="color:#0ea5e9">AppyYou</a>
										</figcaption>
									</figure>
								</div>
							</div>
							<!-- Testimonial 2 (active) -->
							<div class="auth-testimonial-card">
								<div class="auth-testimonial-inner">
									<div class="auth-testimonial-avatar">
										<img
											src="assets/images/testimonial-auth-02.jpg"
											width="88"
											height="88"
											alt="Testimonial 02"
										>
										<svg
											class="auth-testimonial-quote-icon"
											width="26"
											height="17"
											xmlns="http://www.w3.org/2000/svg"
										>
											<path
												d="M0 16.026h8.092l6.888-16h-4.592L0 16.026Zm11.02 0h8.092L26 .026h-4.65l-10.33 16Z"
											/>
										</svg>
									</div>
									<figure>
										<blockquote
											style="font-size:1.125rem;font-weight:700;line-height:1.5;padding-bottom:0.25rem"
										>
											<p>
												I got an offer three weeks after I applied via JobBoard.
												I have never been happier in my career life.
											</p>
										</blockquote>
										<figcaption
											style="font-size:0.875rem;font-weight:500;color:#6b7280"
										>
											Mark Mills, developer at
											<a href="#" style="color:#0ea5e9">App.com</a>
										</figcaption>
									</figure>
								</div>
							</div>
							<!-- Testimonial 3 (dimmed) -->
							<div class="auth-testimonial-card dimmed">
								<div class="auth-testimonial-inner">
									<div class="auth-testimonial-avatar">
										<img
											src="assets/images/testimonial-auth-03.jpg"
											width="88"
											height="88"
											alt="Testimonial 03"
										>
										<svg
											class="auth-testimonial-quote-icon"
											width="26"
											height="17"
											xmlns="http://www.w3.org/2000/svg"
										>
											<path
												d="M0 16.026h8.092l6.888-16h-4.592L0 16.026Zm11.02 0h8.092L26 .026h-4.65l-10.33 16Z"
											/>
										</svg>
									</div>
									<figure>
										<blockquote
											style="font-size:1.125rem;font-weight:700;line-height:1.5;padding-bottom:0.25rem"
										>
											<p>
												I got an offer three weeks after I applied via JobBoard.
												I have never been happier in my career life.
											</p>
										</blockquote>
										<figcaption
											style="font-size:0.875rem;font-weight:500;color:#6b7280"
										>
											Lisa Smith, developer at
											<a href="#" style="color:#0ea5e9">AppyYou</a>
										</figcaption>
									</figure>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>
	</body>
</html>
