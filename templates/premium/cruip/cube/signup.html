<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Cube — Get Started Free</title>
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body class="auth-page">
		<!-- Header -->
		<header class="auth-header">
			<div class="container">
				<a href="index.html" aria-label="Cube">
					<svg
						class="logo-svg"
						viewBox="0 0 32 32"
						xmlns="http://www.w3.org/2000/svg"
					>
						<defs>
							<linearGradient
								x1="0%"
								y1="32.443%"
								x2="104.18%"
								y2="50%"
								id="hlogo-a"
							>
								<stop stop-color="#FFF" stop-opacity=".299" offset="0%" />
								<stop stop-color="#7587E4" stop-opacity="0" offset="100%" />
							</linearGradient>
							<linearGradient
								x1="18.591%"
								y1="0%"
								x2="100%"
								y2="100%"
								id="hlogo-b"
							>
								<stop stop-color="#818CF8" offset="0%" />
								<stop stop-color="#C7D2FE" offset="100%" />
							</linearGradient>
						</defs>
						<g fill="none" fill-rule="evenodd">
							<path fill="#3730A3" d="M16 18.5V32l15.999-9.25V9.25z" />
							<path fill="#4F46E5" d="m0 23 16 9V18.501L0 9.251z" />
							<path
								fill-opacity=".64"
								fill="url(#hlogo-a)"
								d="M16 13 0 23l16 9 16-9z"
							/>
							<path
								fill="url(#hlogo-b)"
								d="M16 0 0 9.25l16 9.25 15.999-9.25z"
							/>
						</g>
					</svg>
				</a>
			</div>
		</header>

		<main>
			<section
				class="auth-section"
				style="align-items:flex-start;padding:48px 0 80px;"
			>
				<div aria-hidden="true">
					<img
						src="assets/images/auth-illustration.svg"
						class="auth-illustration"
						width="1440"
						height="332"
						alt=""
					>
				</div>
				<div class="container" style="position:relative;z-index:1;">
					<div class="signup-split">
						<!-- Left: Features -->
						<div class="signup-left">
							<div class="avatars-stack">
								<img
									src="assets/images/avatar-01.jpg"
									width="40"
									height="40"
									alt="User avatar"
								>
								<img
									src="assets/images/avatar-02.jpg"
									width="40"
									height="40"
									alt="User avatar"
								>
								<img
									src="assets/images/avatar-03.jpg"
									width="40"
									height="40"
									alt="User avatar"
								>
								<img
									src="assets/images/avatar-04.jpg"
									width="40"
									height="40"
									alt="User avatar"
								>
							</div>
							<h1>Get a taste of the user-centric platform</h1>
							<ul class="signup-features">
								<li class="signup-feature-item">
									<svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
										<path
											d="M10.28 2.28L3.989 8.575 1.695 6.28A1 1 0 00.28 7.695l3 3a1 1 0 001.414 0l7-7A1 1 0 0010.28 2.28z"
										/>
									</svg>
									<span
										>Excepteur sint occaecat cupidatat non proident sunt in
										culpa.</span
									>
								</li>
								<li class="signup-feature-item">
									<svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
										<path
											d="M10.28 2.28L3.989 8.575 1.695 6.28A1 1 0 00.28 7.695l3 3a1 1 0 001.414 0l7-7A1 1 0 0010.28 2.28z"
										/>
									</svg>
									<span
										>Duis aute irure dolor in reprehenderit in voluptate.</span
									>
								</li>
								<li class="signup-feature-item">
									<svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
										<path
											d="M10.28 2.28L3.989 8.575 1.695 6.28A1 1 0 00.28 7.695l3 3a1 1 0 001.414 0l7-7A1 1 0 0010.28 2.28z"
										/>
									</svg>
									<span
										>Eiusmod tempor incididunt ut labore et dolore magna aliqua.</span
									>
								</li>
							</ul>
						</div>

						<!-- Right: Form -->
						<div class="signup-right">
							<div class="signup-right-glow" aria-hidden="true"></div>
							<h2>Let's talk</h2>
							<form>
								<div
									style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;"
								>
									<div>
										<label class="form-label" for="name"
											>Name <span class="required">*</span></label
										>
										<input id="name" class="form-input" type="text" required>
									</div>
									<div>
										<label class="form-label" for="surname"
											>Surname <span class="required">*</span></label
										>
										<input id="surname" class="form-input" type="text" required>
									</div>
								</div>
								<div class="form-group">
									<label class="form-label" for="email"
										>Email <span class="required">*</span></label
									>
									<input id="email" class="form-input" type="email" required>
								</div>
								<div class="form-group">
									<label class="form-label" for="phone"
										>Phone <span class="required">*</span></label
									>
									<input id="phone" class="form-input" type="text" required>
								</div>
								<div class="form-group">
									<label class="form-label" for="referrer"
										>How did you hear about us?
										<span class="required">*</span></label
									>
									<select id="referrer" class="form-select form-input" required>
										<option>Twitter</option>
										<option>Medium</option>
										<option>GitHub</option>
									</select>
								</div>
								<div class="form-group">
									<label class="form-label" for="message"
										>How can we help with?
										<span class="required">*</span></label
									>
									<textarea
										id="message"
										class="form-textarea form-input"
										rows="4"
										required
									></textarea>
								</div>
								<button type="submit" class="btn-full">
									Request Demo <span>-&gt;</span>
								</button>
							</form>
						</div>
					</div>
				</div>
			</section>
		</main>
	</body>
</html>
