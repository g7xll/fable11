<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Cube — Sign In</title>
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body class="auth-page">
		<!-- Header -->
		<header class="auth-header">
			<div class="container">
				<a href="index.html" aria-label="Cube">
					<svg
						class="logo-svg"
						viewBox="0 0 32 32"
						xmlns="http://www.w3.org/2000/svg"
					>
						<defs>
							<linearGradient
								x1="0%"
								y1="32.443%"
								x2="104.18%"
								y2="50%"
								id="hlogo-a"
							>
								<stop stop-color="#FFF" stop-opacity=".299" offset="0%" />
								<stop stop-color="#7587E4" stop-opacity="0" offset="100%" />
							</linearGradient>
							<linearGradient
								x1="18.591%"
								y1="0%"
								x2="100%"
								y2="100%"
								id="hlogo-b"
							>
								<stop stop-color="#818CF8" offset="0%" />
								<stop stop-color="#C7D2FE" offset="100%" />
							</linearGradient>
						</defs>
						<g fill="none" fill-rule="evenodd">
							<path fill="#3730A3" d="M16 18.5V32l15.999-9.25V9.25z" />
							<path fill="#4F46E5" d="m0 23 16 9V18.501L0 9.251z" />
							<path
								fill-opacity=".64"
								fill="url(#hlogo-a)"
								d="M16 13 0 23l16 9 16-9z"
							/>
							<path
								fill="url(#hlogo-b)"
								d="M16 0 0 9.25l16 9.25 15.999-9.25z"
							/>
						</g>
					</svg>
				</a>
			</div>
		</header>

		<main>
			<section class="auth-section">
				<div aria-hidden="true">
					<img
						src="assets/images/auth-illustration.svg"
						class="auth-illustration"
						width="1440"
						height="332"
						alt=""
					>
				</div>
				<div class="container">
					<div class="auth-card">
						<h1>Welcome back!</h1>

						<form>
							<div class="form-group">
								<label class="form-label" for="email">Email</label>
								<input
									id="email"
									class="form-input"
									type="email"
									required
									placeholder="you@example.com"
								>
							</div>
							<div class="form-group">
								<div class="form-row">
									<label
										class="form-label"
										for="password"
										style="margin-bottom:0;"
										>Password</label
									>
									<a
										href="reset-password.html"
										style="font-size:0.8125rem;color:var(--color-accent-light);"
										>Forgot?</a
									>
								</div>
								<input
									id="password"
									class="form-input"
									type="password"
									autocomplete="current-password"
									required
									placeholder="••••••••"
								>
							</div>
							<div class="form-group">
								<button type="submit" class="btn-full">
									Sign In <span>-&gt;</span>
								</button>
							</div>
						</form>

						<div class="divider">
							<div class="divider-line"></div>
							<span class="divider-text">Or</span>
							<div class="divider-line"></div>
						</div>

						<button type="button" class="btn-google">
							<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
								<path
									d="M15.679 6.545H8.043v3.273h4.328c-.692 2.182-2.401 2.91-4.363 2.91a4.727 4.727 0 1 1 3.035-8.347l2.378-2.265A8 8 0 1 0 8.008 16c4.41 0 8.4-2.909 7.67-9.455Z"
								/>
							</svg>
							Continue With Google
						</button>

						<div class="form-footer">
							<p>
								Don't you have an account? <a href="signup.html">Get Started</a>
							</p>
						</div>
					</div>
				</div>
			</section>
		</main>
	</body>
</html>
