<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Cube — Reset Password</title>
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body class="auth-page">
		<!-- Header -->
		<header class="auth-header">
			<div class="container">
				<a href="index.html" aria-label="Cube">
					<svg
						class="logo-svg"
						viewBox="0 0 32 32"
						xmlns="http://www.w3.org/2000/svg"
					>
						<defs>
							<linearGradient
								x1="0%"
								y1="32.443%"
								x2="104.18%"
								y2="50%"
								id="hlogo-a"
							>
								<stop stop-color="#FFF" stop-opacity=".299" offset="0%" />
								<stop stop-color="#7587E4" stop-opacity="0" offset="100%" />
							</linearGradient>
							<linearGradient
								x1="18.591%"
								y1="0%"
								x2="100%"
								y2="100%"
								id="hlogo-b"
							>
								<stop stop-color="#818CF8" offset="0%" />
								<stop stop-color="#C7D2FE" offset="100%" />
							</linearGradient>
						</defs>
						<g fill="none" fill-rule="evenodd">
							<path fill="#3730A3" d="M16 18.5V32l15.999-9.25V9.25z" />
							<path fill="#4F46E5" d="m0 23 16 9V18.501L0 9.251z" />
							<path
								fill-opacity=".64"
								fill="url(#hlogo-a)"
								d="M16 13 0 23l16 9 16-9z"
							/>
							<path
								fill="url(#hlogo-b)"
								d="M16 0 0 9.25l16 9.25 15.999-9.25z"
							/>
						</g>
					</svg>
				</a>
			</div>
		</header>

		<main>
			<section class="auth-section">
				<div aria-hidden="true">
					<img
						src="assets/images/auth-illustration.svg"
						class="auth-illustration"
						width="1440"
						height="332"
						alt=""
					>
				</div>
				<div class="container">
					<div class="auth-card">
						<h1>Reset your password</h1>
						<p
							style="text-align:center;color:var(--color-text-muted);font-size:0.9375rem;margin-bottom:32px;"
						>
							Enter your email address and we'll send you a link to reset your
							password.
						</p>

						<form>
							<div class="form-group">
								<label class="form-label" for="email">Email</label>
								<input
									id="email"
									class="form-input"
									type="email"
									required
									placeholder="you@example.com"
								>
							</div>
							<div class="form-group">
								<button type="submit" class="btn-full">
									Reset Password <span>-&gt;</span>
								</button>
							</div>
						</form>

						<div class="form-footer" style="margin-top:24px;">
							<p>
								<a
									href="signin.html"
									style="color:var(--color-text-muted);display:inline-flex;align-items:center;gap:6px;"
								>
									<svg
										width="8"
										height="12"
										viewBox="0 0 8 12"
										fill="none"
										xmlns="http://www.w3.org/2000/svg"
									>
										<path
											d="M7 11L2 6L7 1"
											stroke="currentColor"
											stroke-width="2"
											stroke-linecap="round"
											stroke-linejoin="round"
										/>
									</svg>
									Back to Sign In
								</a>
							</p>
						</div>
					</div>
				</div>
			</section>
		</main>
	</body>
</html>
