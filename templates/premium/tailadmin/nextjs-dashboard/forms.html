nu"><a href="forms.html" class="active">Form Elements</a></div></div><div class="nav-item"><a href="#" class="nav-link" data-toggle="tables"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg><span class="nav-label">Tables</span><span class="nav-arrow">▾</span></a><div class="submenu"><a href="tables.html">Basic Tables</a></div></div></nav></aside>
<div class="main-wrapper">
<header class="topbar"><button class="topbar-toggle" id="sidebar-toggle"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button><div class="topbar-search"><input type="text" placeholder="Search..."></div><div class="topbar-actions"><button class="topbar-btn" onclick="toggleTheme()">🌙</button><div class="topbar-user"><div style="width:32px;height:32px;border-radius:50%;background:#E0E7FF;display:flex;align-items:center;justify-content:center;font-weight:700;color:#465FFF;font-size:13px">M</div><div class="topbar-user-info"><div class="topbar-user-name">Musharof</div></div></div></div></header>
<main class="main-content">
  <div class="page-header"><h1>Form Elements</h1><nav class="breadcrumb"><a href="index.html">Home</a> › Forms › <span>Form Elements</span></nav></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div>
      <div class="card" style="margin-bottom:20px">
        <div class="card-title" style="margin-bottom:16px">Input Fields</div>
        <div class="form-group"><label class="form-label">Default Input</label><input type="text" class="form-control" placeholder="Enter text..."></div>
        <div class="form-group"><label class="form-label">Email Input</label><input type="email" class="form-control" placeholder="you@example.com"></div>
        <div class="form-group"><label class="form-label">Password Input</label><input type="password" class="form-control" placeholder="Enter password"></div>
        <div class="form-group"><label class="form-label">Textarea</label><textarea class="form-control" rows="4" placeholder="Enter your message..."></textarea></div>
        <div class="form-group"><label class="form-label">Select</label><select class="form-control"><option>Choose an option</option><option>Option 1</option><option>Option 2</option><option>Option 3</option></select></div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:16px">Checkboxes & Radios</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <label class="form-check"><input type="checkbox" checked> <span style="font-size:13px">Option 1 (checked)</span></label>
          <label class="form-check"><input type="checkbox"> <span style="font-size:13px">Option 2</span></label>
          <label class="form-check"><input type="checkbox"> <span style="font-size:13px">Option 3</span></label>
        </div>
        <div style="margin-top:16px;display:flex;flex-direction:column;gap:10px">
          <label class="form-check"><input type="radio" name="r1" checked> <span style="font-size:13px">Radio Option 1</span></label>
          <label class="form-check"><input type="radio" name="r1"> <span style="font-size:13px">Radio Option 2</span></label>
        </div>
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:20px">
        <div class="card-title" style="margin-bottom:16px">Toggle Switches</div>
        <div style="display:flex;flex-direction:column;gap:16px">
          <div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px">Enable Notifications</span><label class="switch"><input type="checkbox" checked><div class="switch-track"></div><div class="switch-thumb"></div></label></div>
          <div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px">Dark Mode</span><label class="switch"><input type="checkbox"><div class="switch-track"></div><div class="switch-thumb"></div></label></div>
          <div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px">Auto-save</span><label class="switch"><input type="checkbox" checked><div class="switch-track"></div><div class="switch-thumb"></div></label></div>
          <div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px">Analytics Tracking</span><label class="switch"><input type="checkbox"><div class="switch-track"></div><div class="switch-thumb"></div></label></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:20px">
        <div class="card-title" style="margin-bottom:16px">Buttons</div>
        <div style="display:flex;flex-wrap:wrap;gap:10px">
          <button class="btn btn-primary">Primary</button>
          <button class="btn btn-outline">Secondary</button>
          <button class="btn btn-sm" style="background:var(--success);color:white">Success</button>
          <button class="btn btn-sm" style="background:var(--error);color:white">Danger</button>
          <button class="btn btn-sm" style="background:var(--warning);color:white">Warning</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:16px">Date & Time</div>
        <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-control"></div>
        <div class="form-group"><label class="form-label">Time</label><input type="time" class="form-control"></div>
        <div class="form-group"><label class="form-label">Date & Time</label><input type="datetime-local" class="form-control"></div>
        <div class="form-group"><label class="form-label">Range</label><input type="range" style="width:100%;accent-color:var(--primary)"></div>
      </div>
    </div>
  </div>
</main></div></div>
