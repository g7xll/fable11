<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign Up | TailAdmin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card card">
    <a href="../index.html" class="auth-logo">
      <svg width="36" height="36" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#465FFF"/><path d="M8 22L14 10L20 18L24 14" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>TailAdmin</span>
    </a>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-subtitle">Enter your details to get started</p>
    <div class="auth-social">
      <button class="auth-social-btn"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Sign up with Google</button>
    </div>
    <div class="auth-divider">OR</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-control" placeholder="John"></div>
      <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-control" placeholder="Doe"></div>
    </div>
    <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" placeholder="info@example.com"></div>
    <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-control" placeholder="Create a password"></div>
    <div class="form-group"><label class="form-check"><input type="checkbox"> <span style="font-size:13px;color:var(--text-2)">I agree to the <a href="#" style="color:var(--primary);text-decoration:none">Terms of Service</a></span></label></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px">Create Account</button>
    <div class="auth-footer">Already have an account? <a href="signin.html">Sign In</a></div>
  </div>
</div>
<script src="../assets/js/main.js"></script>
</body>
</html>
