<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>404 — Hatch</title>
		<meta
			name="description"
			content="The page you're looking for doesn't exist or has been moved."
		>
		<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
		<script>
		try {
			var t =
				localStorage.getItem("hatch-theme") ||
				(matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light");
			document.documentElement.classList.toggle("dark", t === "dark");
		} catch (e) {}
		</script>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<div data-promo></div>
		<div data-header></div>
		<main>
			<section style="min-height:60vh;display:flex;align-items:center">
				<div class="container text-center reveal" style="max-width:560px">
					<span class="eyebrow">Oops!</span>
					<h1
						class="serif"
						style="font-size:clamp(4rem,12vw,7rem);margin:1rem 0"
					>
						404
					</h1>
					<p class="lead" style="margin-bottom:2rem">
						The page you're looking for doesn't exist or has been moved.
					</p>
					<div
						style="display:flex;gap:.85rem;justify-content:center;flex-wrap:wrap"
					>
						<a class="btn btn-primary" href="index.html"
							>Back to Home
							<svg
								width="16"
								height="16"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="M5 12h14" />
								<path d="m12 5 7 7-7 7" />
							</svg></a
						>
						<a class="btn btn-outline" href="contact.html">Contact Support</a>
					</div>
				</div>
			</section>
		</main>
		<div data-footer></div>
		<script src="app.js"></script>
	</body>
</html>
