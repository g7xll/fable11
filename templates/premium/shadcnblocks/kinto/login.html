<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Sign in — Kinto</title>
		<meta
			name="description"
			content="Sign in to Kinto and pick up where you left off."
		>
		<script src="/assets/js/theme-boot.js"></script>
		<link rel="stylesheet" href="/assets/css/tokens.css">
		<link rel="stylesheet" href="/assets/css/base.css">
		<link rel="stylesheet" href="/assets/css/auth.css">
	</head>
	<body>
		<header class="auth-header">
			<a href="/index.html" class="brand">
				<svg class="brand-mark" viewBox="0 0 24 24" fill="none">
					<path
						d="M5 3v18M5 12l9-9M5 12l9 9"
						stroke="currentColor"
						stroke-width="2.4"
						stroke-linecap="round"
						stroke-linejoin="round"
					/>
				</svg>
				Kinto
			</a>
			<button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
				<svg
					viewBox="0 0 24 24"
					width="18"
					height="18"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
				>
					<circle cx="12" cy="12" r="4" />
					<path
						d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"
					/>
				</svg>
			</button>
		</header>

		<main>
			<div class="auth-shell">
				<!-- Quote panel (always dark) -->
				<aside class="auth-quote">
					<div class="auth-quote__bg"></div>
					<div class="auth-quote__inner">
						<a href="/index.html" class="brand">
							<svg class="brand-mark" viewBox="0 0 24 24" fill="none">
								<path
									d="M5 3v18M5 12l9-9M5 12l9 9"
									stroke="currentColor"
									stroke-width="2.4"
									stroke-linecap="round"
									stroke-linejoin="round"
								/>
							</svg>
							Kinto
						</a>
						<div>
							<p class="auth-quote__q">
								“The unexamined life is not worth living — but the examined life
								needs a place to breathe.”
							</p>
							<div class="auth-quote__rule"></div>
							<p class="auth-quote__attr">A founding principle</p>
						</div>
					</div>
				</aside>

				<!-- Form panel -->
				<section class="auth-form-panel">
					<div class="auth-form">
						<a href="/index.html" class="brand-mobile">
							<svg class="brand-mark" viewBox="0 0 24 24" fill="none">
								<path
									d="M5 3v18M5 12l9-9M5 12l9 9"
									stroke="currentColor"
									stroke-width="2.4"
									stroke-linecap="round"
									stroke-linejoin="round"
								/>
							</svg>
							Kinto
						</a>
						<h1>Welcome back</h1>
						<p class="sub">Pick up where you left off.</p>

						<div class="auth-social">
							<button type="button">
								<svg viewBox="0 0 24 24">
									<path
										fill="currentColor"
										d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z"
									/>
									<path
										fill="currentColor"
										d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z"
									/>
									<path
										fill="currentColor"
										d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62Z"
									/>
									<path
										fill="currentColor"
										d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z"
									/>
								</svg>
								Google
							</button>
							<button type="button">
								<svg viewBox="0 0 24 24" fill="currentColor">
									<path
										d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09ZM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-2.12 4.53-3.74 4.25Z"
									/>
								</svg>
								Apple
							</button>
						</div>

						<div class="auth-divider"><span>or continue with email</span></div>

						<form id="auth-form">
							<div class="auth-fields">
								<div class="auth-field">
									<label for="email">Email</label>
									<input
										type="email"
										id="email"
										placeholder="you@example.com"
										autocomplete="email"
									>
								</div>
								<div class="auth-field">
									<label for="password">Password</label>
									<input
										type="password"
										id="password"
										placeholder="••••••••"
										autocomplete="current-password"
									>
								</div>
							</div>
							<button type="submit" class="auth-submit">Sign in</button>
						</form>

						<p class="auth-foot">
							Don't have an account? <a href="/signup.html">Sign up</a>
						</p>
					</div>
				</section>
			</div>
		</main>

		<script src="/assets/js/main.js"></script>
		<script>
		document
			.getElementById("auth-form")
			.addEventListener("submit", function (e) {
				e.preventDefault();
			});
		</script>
	</body>
</html>
