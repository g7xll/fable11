<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project — Echo</title>
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
    <script>
      (function () { try { var s = localStorage.getItem("echo-theme"); var d = s ? s === "dark" : matchMedia("(prefers-color-scheme: dark)").matches; document.documentElement.classList.toggle("dark", d); document.documentElement.classList.toggle("light", !d); } catch (e) {} })();
    </script>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body data-page="projects" data-slug="justos">
    <main>
      <div class="container page prose-width">
        <header class="reveal">
          <h1 class="page-title" id="d-title"></h1>
          <div class="detail-links">
            <a class="text-link" href="javascript:void(0)">View live</a>
            <a class="text-link" href="javascript:void(0)">Source code</a>
          </div>
        </header>
        <div class="detail-cover reveal"><img id="d-cover" src="" alt="cover" /></div>
        <p class="detail-intro reveal" id="d-intro"></p>

        <section class="section reveal">
          <div class="section-head"><h2 class="section-title">Project stack</h2></div>
          <div class="stack-row" id="d-stack"></div>
        </section>

        <section class="section" id="d-showcase"></section>

        <p class="detail-intro reveal" id="d-body" style="margin-top:2.5rem"></p>

        <section class="section reveal">
          <div class="section-head"><h2 class="section-title">Highlights</h2></div>
          <ul class="highlights" id="d-highlights"></ul>
        </section>

        <section class="section reveal">
          <div class="section-head"><h2 class="section-title">More projects</h2></div>
          <div class="cards-grid" id="d-more"></div>
        </section>
      </div>
    </main>

    <script src="../assets/js/icons.js"></script>
    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/render.js"></script>
    <script src="../assets/js/project-detail.js"></script>
  </body>
</html>
