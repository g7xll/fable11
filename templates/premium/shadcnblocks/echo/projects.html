<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Projects — Echo</title>
    <meta name="description" content="A selection of tools, products, and experiments I've built over the years" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <script>
      (function () { try { var s = localStorage.getItem("echo-theme"); var d = s ? s === "dark" : matchMedia("(prefers-color-scheme: dark)").matches; document.documentElement.classList.toggle("dark", d); document.documentElement.classList.toggle("light", !d); } catch (e) {} })();
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="projects">
    <main>
      <div class="container page">
        <header class="reveal">
          <h1 class="page-title">Projects &amp; experiments</h1>
          <p class="page-subtitle">A selection of tools, products, and experiments I've built over the years</p>
        </header>

        <div class="reveal" style="margin-top:2rem">
          <div class="tabs" data-tabs data-target="#projects-grid">
            <button class="tab active" data-filter="all">All</button>
            <button class="tab" data-filter="featured">Featured</button>
            <button class="tab" data-filter="open-source">Open Source</button>
            <button class="tab" data-filter="personal">Personal</button>
          </div>
          <div class="cards-grid" id="projects-grid"></div>
        </div>
      </div>
    </main>

    <script src="assets/js/icons.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/render.js"></script>
  </body>
</html>
