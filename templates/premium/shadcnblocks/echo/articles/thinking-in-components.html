<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Article — Echo</title>
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
    <script>
      (function () { try { var s = localStorage.getItem("echo-theme"); var d = s ? s === "dark" : matchMedia("(prefers-color-scheme: dark)").matches; document.documentElement.classList.toggle("dark", d); document.documentElement.classList.toggle("light", !d); } catch (e) {} })();
    </script>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body data-page="articles" data-slug="thinking-in-components">
    <main>
      <div class="container page prose-width">
        <header class="reveal">
          <h1 class="page-title" id="a-title"></h1>
          <button class="text-link" data-copy-link style="background:none;border:none;padding:0;margin-top:0.75rem">Copy link</button>
        </header>
        <div class="article-prose reveal" id="a-body"></div>

        <section class="section reveal">
          <div class="section-head"><h2 class="section-title">Related articles</h2></div>
          <div class="write-list" id="a-related"></div>
        </section>
      </div>
    </main>

    <script src="../assets/js/icons.js"></script>
    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/render.js"></script>
    <script src="../assets/js/article-detail.js"></script>
  </body>
</html>
