<!doctype html>
<html lang="en" class="light">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Articles — Echo</title>
		<meta name="description" content="Articles & notes on building software.">
		<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
		<script>
		(function () {
			try {
				var s = localStorage.getItem("echo-theme");
				var d = s
					? s === "dark"
					: matchMedia("(prefers-color-scheme: dark)").matches;
				document.documentElement.classList.toggle("dark", d);
				document.documentElement.classList.toggle("light", !d);
			} catch (e) {}
		})();
		</script>
		<link rel="stylesheet" href="assets/css/styles.css">
	</head>
	<body data-page="articles">
		<main>
			<div class="container page prose-width">
				<header class="reveal">
					<h1 class="page-title">Articles &amp; notes</h1>
					<p class="page-subtitle">
						Full-stack developer who loves building things from idea to launch.
					</p>
				</header>
				<div
					class="write-list reveal"
					id="articles-list"
					style="margin-top:2.5rem"
				></div>
			</div>
		</main>

		<script src="assets/js/icons.js"></script>
		<script src="assets/js/data.js"></script>
		<script src="assets/js/app.js"></script>
		<script src="assets/js/render.js"></script>
	</body>
</html>
