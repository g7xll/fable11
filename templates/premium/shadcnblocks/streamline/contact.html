<!DOCTYPE html>
<html lang="en" class="light">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Streamline — Contact us</title>
		<link rel="icon" href="assets/favicon/favicon.svg">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="styles.css">
		<link rel="stylesheet" href="pages.css">
		<script>
		(function () {
			try {
				var t = localStorage.getItem("theme");
				if (!t)
					t = matchMedia("(prefers-color-scheme: dark)").matches
						? "dark"
						: "light";
				document.documentElement.classList.toggle("dark", t === "dark");
			} catch (e) {}
		})();
		</script>
	</head>
	<body data-page="contact">
		<div data-mount="header"></div>
		<main>
			<div class="contact-wrap container">
				<div class="contact-head reveal">
					<h1>Contact us</h1>
					<p class="muted">
						Hopefully this form gets through our spam filters.
					</p>
				</div>
				<div class="contact-grid reveal">
					<aside class="contact-side">
						<div class="blk">
							<h3>Corporate office</h3>
							<p>1 Carlsberg Close<br>1260 Hillview, Australia</p>
						</div>
						<div class="blk">
							<h3>Email us</h3>
							<strong>Careers</strong
							><a href="mailto:careers@streamline.com"
								>careers@streamline.com</a
							>
							<strong>Press</strong
							><a href="mailto:press@streamline.com">press@streamline.com</a>
						</div>
						<div class="blk">
							<h3>Follow us</h3>
							<div class="contact-socials">
								<a href="#" aria-label="Facebook"
									><svg
										width="20"
										height="20"
										viewBox="0 0 24 24"
										fill="currentColor"
									>
										<path
											d="M22 12a10 10 0 1 0-11.5 9.9v-7H8v-2.9h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6v1.9h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12z"
										/>
									</svg></a
								>
								<a href="#" aria-label="Twitter"
									><svg
										width="20"
										height="20"
										viewBox="0 0 24 24"
										fill="currentColor"
									>
										<path
											d="M23 4.9c-.8.4-1.7.6-2.6.8 1-.6 1.6-1.5 2-2.5-.9.5-1.9.9-2.9 1.1A4.5 4.5 0 0 0 11.8 8 12.8 12.8 0 0 1 2.5 3.2 4.5 4.5 0 0 0 3.9 9 4.4 4.4 0 0 1 2 8.5v.1c0 2.2 1.5 4 3.6 4.4-.7.2-1.4.2-2 .1.6 1.8 2.2 3.1 4.2 3.1A9 9 0 0 1 1 18.1 12.7 12.7 0 0 0 7.9 20c8.3 0 12.8-6.9 12.8-12.8v-.6c.9-.6 1.6-1.4 2.3-2.3z"
										/>
									</svg></a
								>
								<a href="#" aria-label="LinkedIn"
									><svg
										width="20"
										height="20"
										viewBox="0 0 24 24"
										fill="currentColor"
									>
										<path
											d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 9h4v12H3V9zm7 0h3.8v1.7h.05c.53-1 1.8-2 3.7-2 4 0 4.7 2.6 4.7 6V21h-4v-5.6c0-1.3 0-3-1.9-3s-2.1 1.4-2.1 2.9V21h-4V9z"
										/>
									</svg></a
								>
							</div>
						</div>
					</aside>
					<form class="contact-form" onsubmit="return false">
						<h3>Inquiries</h3>
						<div class="form-row">
							<label class="field-label">Full name</label>
							<input class="field-input" placeholder="First and last name">
						</div>
						<div class="form-row">
							<label class="field-label">Work email address</label>
							<input class="field-input" placeholder="me@company.com">
						</div>
						<div class="form-row">
							<label class="field-label"
								>Company name <span class="opt">(optional)</span></label
							><input class="field-input" placeholder="Company name">
						</div>
						<div class="form-row">
							<label class="field-label"
								>Number of employees <span class="opt">(optional)</span></label
							><input class="field-input" placeholder="Company name">
						</div>
						<div class="form-row">
							<label class="field-label">Your message</label
							><textarea
								class="field-textarea"
								rows="5"
								placeholder="Write your message"
							></textarea>
						</div>
						<button class="btn btn-primary" type="submit">Send message</button>
					</form>
				</div>
			</div>
		</main>
		<div data-mount="footer"></div>
		<script src="app.js"></script>
	</body>
</html>
