<!DOCTYPE html>
<html lang="en" class="light">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Streamline — Page Not Found</title>
		<link rel="icon" href="assets/favicon/favicon.svg">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="styles.css">
		<link rel="stylesheet" href="pages.css">
		<script>
		(function () {
			try {
				var t = localStorage.getItem("theme");
				if (!t)
					t = matchMedia("(prefers-color-scheme: dark)").matches
						? "dark"
						: "light";
				document.documentElement.classList.toggle("dark", t === "dark");
			} catch (e) {}
		})();
		</script>
	</head>
	<body data-page="">
		<div data-mount="header"></div>
		<main class="section-warm">
			<div class="nf">
				<h1>Page Not Found</h1>
				<p>
					Sorry, we couldn't find the page you're looking for. The page might
					have been removed or the URL might be incorrect.
				</p>
				<div class="nf-btns">
					<a class="btn btn-primary btn-lg" href="index.html"
						>&larr;&nbsp; Back to Home</a
					>
					<a class="btn btn-outline btn-lg" href="contact.html"
						>Contact Support</a
					>
				</div>
			</div>
		</main>
		<div data-mount="footer"></div>
		<script src="app.js"></script>
	</body>
</html>
