<!DOCTYPE html>
<html lang="en" class="light">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Streamline — Sign up</title>
		<link rel="icon" href="assets/favicon/favicon.svg">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="styles.css">
		<link rel="stylesheet" href="pages.css">
		<script>
		(function () {
			try {
				var t = localStorage.getItem("theme");
				if (!t)
					t = matchMedia("(prefers-color-scheme: dark)").matches
						? "dark"
						: "light";
				document.documentElement.classList.toggle("dark", t === "dark");
			} catch (e) {}
		})();
		</script>
	</head>
	<body data-page="signup">
		<div data-mount="header"></div>
		<main class="section-warm">
			<div class="auth-wrap">
				<form class="auth-card reveal" onsubmit="return false">
					<div class="auth-logo">
						<img src="assets/favicon/favicon.svg" alt="">
						Streamline
					</div>
					<h1>Start your free trial</h1>
					<p class="sub">Sign up in less than 2 minutes.</p>
					<input class="field-input" placeholder="Enter your name" type="text">
					<input
						class="field-input"
						placeholder="Enter your email"
						type="email"
					>
					<input
						class="field-input"
						placeholder="Enter your password"
						type="password"
					>
					<p class="auth-hint">Must be at least 8 characters.</p>
					<button class="btn btn-primary" type="submit">
						Create an account
					</button>
					<button class="btn btn-outline btn-google" type="button">
						<svg width="18" height="18" viewBox="0 0 24 24">
							<path
								fill="#4285F4"
								d="M22.5 12.2c0-.7-.1-1.4-.2-2H12v3.9h5.9a5 5 0 0 1-2.2 3.3v2.7h3.6c2.1-1.9 3.2-4.8 3.2-7.9z"
							/>
							<path
								fill="#34A853"
								d="M12 23c2.9 0 5.4-1 7.2-2.6l-3.6-2.7c-1 .7-2.2 1-3.6 1-2.8 0-5.1-1.9-6-4.4H2.3v2.8A11 11 0 0 0 12 23z"
							/>
							<path
								fill="#FBBC05"
								d="M6 14.3a6.6 6.6 0 0 1 0-4.2V7.3H2.3a11 11 0 0 0 0 9.8L6 14.3z"
							/>
							<path
								fill="#EA4335"
								d="M12 5.4c1.6 0 3 .6 4.1 1.6l3.1-3.1A11 11 0 0 0 2.3 7.3L6 10.1c.9-2.6 3.2-4.7 6-4.7z"
							/>
						</svg>
						Sign up with Google
					</button>
					<p class="auth-foot">
						Already have an account? <a href="login.html">Log in</a>
					</p>
				</form>
			</div>
		</main>
		<div data-mount="footer"></div>
		<script src="app.js"></script>
	</body>
</html>
