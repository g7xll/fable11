<!DOCTYPE html>
<html lang="en" class="light">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Streamline — FAQ</title>
		<link rel="icon" href="assets/favicon/favicon.svg">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="styles.css">
		<link rel="stylesheet" href="pages.css">
		<script>
		(function () {
			try {
				var t = localStorage.getItem("theme");
				if (!t)
					t = matchMedia("(prefers-color-scheme: dark)").matches
						? "dark"
						: "light";
				document.documentElement.classList.toggle("dark", t === "dark");
			} catch (e) {}
		})();
		</script>
	</head>
	<body data-page="faq">
		<div data-mount="header"></div>
		<main class="section-warm">
			<div class="faqp container">
				<div class="faqp-head reveal">
					<h1>We've got answers</h1>
					<p class="muted">
						This really should be an LLM but we're waiting for RAG to truly
						reach commodity stage before we touch it.
					</p>
				</div>
				<div class="faqp-grid reveal">
					<nav class="faqp-nav">
						<a href="#support" class="active">Support</a>
						<a href="#account">Account</a>
						<a href="#features">Features</a>
						<a href="#security">Security</a>
						<a href="#other">Other</a>
					</nav>
					<div class="faqp-body" id="faqp-body"></div>
				</div>
			</div>
		</main>
		<div data-mount="footer"></div>
		<script src="app.js"></script>
		<script src="faq.js"></script>
	</body>
</html>
