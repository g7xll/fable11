<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact us — Mainline</title>
  <meta name="description" content="Contact the Mainline team." />
  <link rel="icon" href="assets/logo.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>(function(){try{var t=localStorage.getItem("mainline-theme");if(!t)t=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";if(t==="dark")document.documentElement.classList.add("dark");}catch(e){}})();</script>
</head>
<body>
  <div class="hero-bg"><div data-header></div></div>
  <main>
    <div class="page-head reveal">
      <h1>Contact us</h1>
      <p>Hopefully this form gets through our spam filters.</p>
    </div>
    <div class="container">
      <div class="contact-info reveal">
        <div><h4>Corporate office</h4><p>1 Carlsberg Close<br>1260 Hillview, Australia</p></div>
        <div><h4>Email us</h4><p style="margin-bottom:.75rem"><strong style="color:var(--foreground)">Careers</strong><br><a href="mailto:careers@example.com">careers@example.com</a></p><p><strong style="color:var(--foreground)">Press</strong><br><a href="mailto:press@example.com">press@example.com</a></p></div>
        <div><h4>Follow us</h4><div style="display:flex;gap:1rem;color:var(--muted-foreground)">
          <a href="#" aria-label="Facebook"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.56 9.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.89 3.78-3.89 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99A10 10 0 0 0 22 12Z"/></svg></a>
          <a href="#" aria-label="Twitter"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22 5.92a8.2 8.2 0 0 1-2.36.65 4.12 4.12 0 0 0 1.8-2.27 8.22 8.22 0 0 1-2.6 1 4.1 4.1 0 0 0-7 3.74A11.65 11.65 0 0 1 3.4 4.7a4.1 4.1 0 0 0 1.27 5.47A4.07 4.07 0 0 1 2.8 9.7v.05a4.1 4.1 0 0 0 3.3 4.02 4.1 4.1 0 0 1-1.85.07 4.1 4.1 0 0 0 3.83 2.85A8.23 8.23 0 0 1 2 18.4a11.62 11.62 0 0 0 6.29 1.84c7.55 0 11.67-6.25 11.67-11.67v-.53A8.3 8.3 0 0 0 22 5.92Z"/></svg></a>
          <a href="#" aria-label="LinkedIn"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14ZM8.34 18.34V9.99H5.67v8.35h2.67ZM7 8.81a1.55 1.55 0 1 0 0-3.1 1.55 1.55 0 0 0 0 3.1Zm11.34 9.53v-4.58c0-2.45-1.31-3.59-3.06-3.59a2.64 2.64 0 0 0-2.39 1.31v-1.13h-2.67c.04.75 0 8.35 0 8.35h2.67v-4.66c0-.25.02-.5.09-.67.2-.5.66-1.02 1.43-1.02 1.01 0 1.41.77 1.41 1.9v4.45h2.52Z"/></svg></a>
        </div></div>
      </div>
      <div class="dashed-div"></div>
      <form class="form reveal" onsubmit="event.preventDefault();this.querySelector('button[type=submit]').textContent='Sent!';">
        <h4 style="font-size:1rem">Inquiries</h4>
        <div class="field"><label>Full name *</label><input type="text" placeholder="First and last name" required /></div>
        <div class="field"><label>Email address *</label><input type="email" placeholder="me@company.com" required /></div>
        <div class="field"><label>Company name</label><input type="text" placeholder="Company name" /></div>
        <div class="field"><label>Number of employees</label><select><option value="">e.g. 11-50</option><option>1-10</option><option>11-50</option><option>51-200</option><option>200+</option></select></div>
        <div class="field"><label>Your message *</label><textarea placeholder="Write your message" required></textarea></div>
        <label class="checkbox-row"><input type="checkbox" required /> I agree to the terms and conditions</label>
        <div style="text-align:right"><button type="submit" class="btn btn-primary">Submit</button></div>
      </form>
    </div>
  </main>
  <div data-footer></div>
  <script src="app.js"></script>
  <script>MAINLINE.mountChrome("contact");</script>
</body>
</html>
