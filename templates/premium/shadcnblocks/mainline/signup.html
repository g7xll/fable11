<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — Mainline</title>
  <meta name="description" content="Create your Mainline account." />
  <link rel="icon" href="assets/logo.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>(function(){try{var t=localStorage.getItem("mainline-theme");if(!t)t=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";if(t==="dark")document.documentElement.classList.add("dark");}catch(e){}})();</script>
</head>
<body>
  <div class="hero-bg"><div data-header></div></div>
  <main class="auth-wrap">
    <div class="auth-card reveal">
      <div class="brand"><img src="assets/logo.svg" alt="Mainline" /></div>
      <h1>Start your free trial</h1>
      <p class="sub">Sign up in less than 2 minutes.</p>
      <form onsubmit="event.preventDefault();">
        <div class="field"><input type="text" placeholder="Enter your name" /></div>
        <div class="field"><input type="email" placeholder="Enter your email" /></div>
        <div class="field" style="margin-bottom:.5rem"><input type="password" placeholder="Enter your password" /></div>
        <p class="muted" style="font-size:.8rem;margin-bottom:1.25rem">Must be at least 8 characters.</p>
        <button type="submit" class="btn btn-primary">Create an account</button>
        <button type="button" class="btn btn-outline">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1Z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23Z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84Z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38Z"/></svg>
          Sign up with Google
        </button>
      </form>
      <p class="auth-foot">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </main>
  <div data-footer></div>
  <script src="app.js"></script>
  <script>MAINLINE.mountChrome("login");</script>
</body>
</html>
