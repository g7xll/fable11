<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Page not found - Relative</title>
		<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
		<link rel="stylesheet" href="styles.css">
		<link rel="stylesheet" href="pages.css">
		<script>
		(function () {
			try {
				var t =
					localStorage.getItem("theme") ||
					(matchMedia("(prefers-color-scheme: dark)").matches
						? "dark"
						: "light");
				if (t === "dark") document.documentElement.classList.add("dark");
			} catch (e) {}
		})();
		</script>
	</head>
	<body>
		<div data-header></div>

		<main>
			<div class="container">
				<div class="notfound">
					<div class="nf-code">404</div>
					<h2>Page not found</h2>
					<p>
						Oops! It seems you've ventured into uncharted territory. The page
						you're looking for doesn't exist.
					</p>
					<div class="nf-cta">
						<a class="btn btn-primary btn-lg" href="index.html">
							Return home
							<svg
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="m9 18 6-6-6-6" />
							</svg>
						</a>
						<a class="btn btn-outline btn-lg" href="contact.html"
							>Contact support</a
						>
					</div>
				</div>
			</div>
		</main>

		<div data-footer></div>
		<script src="data.js"></script>
		<script src="app.js"></script>
	</body>
</html>
