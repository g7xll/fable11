<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Login - Relative</title>
		<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
		<link rel="stylesheet" href="styles.css">
		<link rel="stylesheet" href="pages.css">
		<script>
		(function () {
			try {
				var t =
					localStorage.getItem("theme") ||
					(matchMedia("(prefers-color-scheme: dark)").matches
						? "dark"
						: "light");
				if (t === "dark") document.documentElement.classList.add("dark");
			} catch (e) {}
		})();
		</script>
	</head>
	<body>
		<div data-header></div>

		<main>
			<div class="auth-wrap">
				<div class="card auth-card">
					<div class="auth-logo">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<path
								d="M2.97 12.92A2 2 0 0 0 2 14.63v3.24a2 2 0 0 0 .97 1.71l3 1.8a2 2 0 0 0 2.06 0L12 19v-5.5l-5-3-4.03 2.42Z"
							/>
							<path d="m7 16.5-4.74-2.85" />
							<path d="m7 16.5 5-3" />
							<path d="M7 16.5v5.17" />
							<path
								d="M12 13.5V19l3.97 2.38a2 2 0 0 0 2.06 0l3-1.8a2 2 0 0 0 .97-1.71v-3.24a2 2 0 0 0-.97-1.71L17 10.5l-5 3Z"
							/>
							<path d="m17 16.5-5-3" />
							<path d="m17 16.5 4.74-2.85" />
							<path d="M17 16.5v5.17" />
							<path
								d="M7.97 4.42A2 2 0 0 0 7 6.13v4.37l5 3 5-3V6.13a2 2 0 0 0-.97-1.71l-3-1.8a2 2 0 0 0-2.06 0l-3 1.8Z"
							/>
							<path d="M12 8 7.26 5.15" />
							<path d="m12 8 4.74-2.85" />
							<path d="M12 13.5V8" />
						</svg>
					</div>
					<h1>Welcome back</h1>
					<p class="auth-sub">Please enter your details.</p>
					<form class="auth-fields" onsubmit="return false">
						<input class="input" type="email" placeholder="Enter your email">
						<input
							class="input"
							type="password"
							placeholder="Enter your password"
						>
						<div class="auth-row">
							<label
								><input type="checkbox" class="checkbox">
								Remember me</label
							>
							<a href="#">Forgot password</a>
						</div>
						<button type="submit" class="btn btn-primary btn-block">
							Create an account
						</button>
						<button type="button" class="btn btn-outline btn-block">
							<svg viewBox="0 0 48 48" width="18" height="18">
								<path
									fill="#FFC107"
									d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C36.2 6.5 30.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"
								/>
								<path
									fill="#FF3D00"
									d="m6.3 14.7 6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C36.2 6.5 30.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"
								/>
								<path
									fill="#4CAF50"
									d="M24 44c6.3 0 12-2.4 16.3-6.4l-7.5-6.4C30.6 33 27.4 34 24 34c-5.2 0-9.6-3.3-11.3-7.9l-6.6 5.1C9.6 39.6 16.2 44 24 44z"
								/>
								<path
									fill="#1976D2"
									d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l7.5 6.4C42.5 36.9 44 30.9 44 24c0-1.3-.1-2.3-.4-3.5z"
								/>
							</svg>
							Sign up with Google
						</button>
					</form>
					<p class="auth-foot">
						Don't have an account? <a href="signup.html">Sign up</a>
					</p>
				</div>
			</div>
		</main>

		<div data-footer></div>
		<script src="data.js"></script>
		<script src="app.js"></script>
	</body>
</html>
