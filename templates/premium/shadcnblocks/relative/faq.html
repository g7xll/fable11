<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>FAQ - Relative</title>
		<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
		<link rel="stylesheet" href="styles.css">
		<link rel="stylesheet" href="pages.css">
		<script>
		(function () {
			try {
				var t =
					localStorage.getItem("theme") ||
					(matchMedia("(prefers-color-scheme: dark)").matches
						? "dark"
						: "light");
				if (t === "dark") document.documentElement.classList.add("dark");
			} catch (e) {}
		})();
		</script>
	</head>
	<body>
		<div data-header></div>

		<main>
			<!-- HEADER -->
			<section class="py-section" style="padding-top:5rem">
				<div class="container">
					<div class="section-head center reveal">
						<p class="badge">
							<svg
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
							>
								<circle cx="12" cy="12" r="10" />
								<path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01" />
							</svg>
							FAQ
						</p>
						<h2 class="h-section" style="margin-top:1rem">
							Everything You Need to Know
						</h2>
						<p class="lead">
							Looking for quick answers? Check out our FAQ section.
						</p>
					</div>
					<div class="accordion" data-accordion data-faq></div>
				</div>
			</section>

			<!-- TESTIMONIALS -->
			<section class="py-section" data-testimonials></section>
		</main>

		<div data-footer></div>
		<script src="data.js"></script>
		<script src="app.js"></script>
	</body>
</html>
