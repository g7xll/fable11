<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Work — Hive®</title>
		<meta
			name="description"
			content="Selected work from Hive — logos, brand identities, and icon systems crafted to help businesses stand out and grow."
		>
		<link rel="icon" href="assets/favicon.svg">
		<script>
		try {
			var t = localStorage.getItem("hive-theme");
			if (
				t === "dark" ||
				(!t && matchMedia("(prefers-color-scheme:dark)").matches)
			)
				document.documentElement.classList.add("dark");
		} catch (e) {}
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Instrument+Serif:ital@0;1&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="assets/css/tokens.css">
		<link rel="stylesheet" href="assets/css/styles.css">
		<link rel="stylesheet" href="assets/css/projects.css">
	</head>

					<article class="work-tile" data-category="Logo Design">

						>

					</article>
					<article class="work-tile" data-category="Logo Design">
						<a class="img-zoom" href="projects/scalar.html"
							><img
								src="assets/images/projects/project-5/1.webp"
								alt="Scalar"
							></a
						>
						<div class="work-meta"><span class="work-name">Scalar</span></div>

					<article class="work-tile" data-category="Brand Identity">

								src="assets/images/projects/project-6/1.webp"

							></a
						>

							><img

						>

		</main>
		<footer data-footer></footer>
		<script src="assets/js/site.js"></script>
		<script>
		(function () {
			var filters = document.querySelector("[data-filters]");
			var tiles = Array.prototype.slice.call(
				document.querySelectorAll(".work-tile"),
			);
			if (!filters) return;
			filters.addEventListener("click", function (e) {
				var btn = e.target.closest("[data-filter]");
				if (!btn) return;
				var cat = btn.getAttribute("data-filter");
				filters.querySelectorAll(".chip").forEach(function (c) {
					c.classList.remove("active");
				});
				btn.classList.add("active");
				tiles.forEach(function (t) {
					var show = cat === "all" || t.getAttribute("data-category") === cat;
					t.classList.toggle("is-hidden", !show);
				});
			});
		})();
		</script>
	</body>
</html>
