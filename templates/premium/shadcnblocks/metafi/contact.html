<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Metafi</title>
  <meta name="description" content="Let's talk. Explore tailored solutions, discuss industry insights, and collaborate to find the best strategies for your success.">
  <link rel="icon" href="assets/images/layout/logo-single.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="page.css">
  <script src="theme-boot.js"></script>
</head>
<body>
  <main>
    <section class="hero container">
      <h1 class="reveal">Let's Talk</h1>
      <p class="lead reveal">Join us as we explore tailored solutions, discuss industry insights, and collaborate to find the best strategies for your success.</p>
    </section>

    <section class="section container">
      <div class="contact-card reveal">
        <h2>Speak to us</h2>
        <form class="contact-form" id="contactForm">
          <div class="field">
            <label for="name">Full name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="johndoe@mail.com" required>
          </div>
          <div class="field">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="Create a subject...">
          </div>
          <div class="field">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Enter your message..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Send Message</button>
        </form>
      </div>
    </section>
  </main>
  <script>
    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();
    });
  </script>
  <script src="app.js"></script>
</body>
</html>
