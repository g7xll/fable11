<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign Up — Metafi</title>
		<meta
			name="description"
			content="Create your Metafi account and start simplifying payments today."
		>
		<link rel="icon" href="assets/images/layout/logo-single.svg">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=IBM+Plex+Mono:wght@400;600&display=swap"
			rel="stylesheet"
		>
		<link rel="stylesheet" href="styles.css">
		<link rel="stylesheet" href="page.css">
		<script src="theme-boot.js"></script>
	</head>
	<body>
		<main>
			<section class="auth-wrap">
				<div class="auth-stack reveal">
					<div class="auth-head">
						<span class="auth-logo"
							><img src="assets/images/layout/logo-single.svg" alt=""></span
						>
						<h1>Sign up to your account</h1>
						<p class="sub">Welcome back! Please enter your details</p>
					</div>
					<div class="auth-card">
						<form id="signupForm">
							<div class="field">
								<label for="email">Email</label>
								<input
									type="email"
									id="email"
									name="email"
									placeholder="johndoe@mail.com"
									required
								>
							</div>
							<div class="field">
								<label for="password">Password</label>
								<div class="field-pass">
									<input
										type="password"
										id="password"
										name="password"
										placeholder="Password"
										required
									>
									<button
										type="button"
										class="toggle-pass"
										aria-label="Show password"
									>
										<svg
											width="18"
											height="18"
											viewBox="0 0 24 24"
											fill="none"
											stroke="currentColor"
											stroke-width="2"
										>
											<path
												d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"
											/>
											<circle cx="12" cy="12" r="3" />
										</svg>
									</button>
								</div>
							</div>
							<div class="field">
								<label for="password2">Repeat Password</label>
								<div class="field-pass">
									<input
										type="password"
										id="password2"
										name="password2"
										placeholder="Repeat Password"
										required
									>
									<button
										type="button"
										class="toggle-pass"
										aria-label="Show password"
									>
										<svg
											width="18"
											height="18"
											viewBox="0 0 24 24"
											fill="none"
											stroke="currentColor"
											stroke-width="2"
										>
											<path
												d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"
											/>
											<circle cx="12" cy="12" r="3" />
										</svg>
									</button>
								</div>
							</div>
							<a class="auth-link" href="#">Forgot password?</a>
							<button type="submit" class="btn btn-primary" style="width:100%">
								Sign up
							</button>
						</form>
						<div class="auth-divider">Or Sign up with</div>
						<a class="btn btn-social" href="#">
							<svg viewBox="0 0 24 24" width="18" height="18">
								<path
									fill="#4285F4"
									d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1Z"
								/>
								<path
									fill="#34A853"
									d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.15-4.53H2.18v2.84A11 11 0 0 0 12 23Z"
								/>
								<path
									fill="#FBBC05"
									d="M5.85 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.67-2.84Z"
								/>
								<path
									fill="#EA4335"
									d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.67 2.84C6.71 7.3 9.14 5.38 12 5.38Z"
								/>
							</svg>
							Sign up with Google
						</a>
						<a class="btn btn-social" href="#">
							<svg viewBox="0 0 24 24" width="18" height="18" fill="#1877F2">
								<path
									d="M24 12a12 12 0 1 0-13.88 11.85v-8.38H7.08V12h3.04V9.36c0-3 1.79-4.67 4.53-4.67 1.31 0 2.68.24 2.68.24v2.95h-1.51c-1.49 0-1.95.92-1.95 1.87V12h3.32l-.53 3.47h-2.79v8.38A12 12 0 0 0 24 12Z"
								/>
							</svg>
							Sign up with Facebook
						</a>
					</div>
					<p class="auth-foot">
						Don't have an account? <a href="login.html">Sign Up</a>
					</p>
				</div>
			</section>
		</main>
		<script>
		document
			.getElementById("signupForm")
			.addEventListener("submit", function (e) {
				e.preventDefault();
			});
		document.querySelectorAll(".toggle-pass").forEach(function (btn) {
			btn.addEventListener("click", function () {
				var input = btn.previousElementSibling;
				input.type = input.type === "password" ? "text" : "password";
			});
		});
		</script>
		<script src="app.js"></script>
	</body>
</html>
