<!doctype html>
<html lang="en" class="light">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Sign in — Lumen</title>
		<meta name="description" content="Sign in to your Lumen account.">
		<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:opsz,wght@14..32,100..900&display=swap"
			rel="stylesheet"
		>
		<script>
		(function () {
			try {
				var s = localStorage.getItem("lumen-theme");
				var d = s
					? s === "dark"
					: matchMedia("(prefers-color-scheme: dark)").matches;
				document.documentElement.classList.toggle("dark", d);
				document.documentElement.classList.toggle("light", !d);
			} catch (e) {}
		})();
		</script>
		<link rel="stylesheet" href="assets/css/styles.css">
	</head>
	<body data-page="signin">
		<main class="auth-split">
			<section class="auth-form">
				<div class="auth-card reveal">
					<span class="auth-logo">
						<svg
							width="22"
							height="22"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<circle cx="12" cy="12" r="4" />
							<path
								d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
							/>
						</svg>
					</span>
					<h1 class="auth-title">Welcome back</h1>
					<p class="auth-sub muted">Welcome back, please enter your details.</p>

					<form onsubmit="return false">
						<div class="field">
							<label for="email">Email</label>
							<input
								class="input"
								id="email"
								type="email"
								placeholder="you@example.com"
							>
						</div>
						<div class="field">
							<label for="password">Password</label>
							<input
								class="input"
								id="password"
								type="password"
								value="password"
							>
						</div>
						<div class="auth-row">
							<label class="auth-remember"
								><input type="checkbox">
								Remember me</label
							>
							<a class="auth-link" href="#">Forgot password?</a>
						</div>
						<button class="btn btn-primary btn-block" type="submit">
							Login
						</button>
					</form>

					<div class="auth-divider">or continue with</div>

					<div class="auth-oauth">
						<button class="btn btn-secondary btn-block" type="button">
							<img src="assets/images/google-button.png" alt="">
							Login with Google
						</button>
						<button class="btn btn-secondary btn-block" type="button">
							<img src="assets/images/apple-button.png" alt="">
							Login with Apple
						</button>
					</div>

					<p class="auth-foot">
						Don't have an account?
						<a class="auth-link" href="signup.html">Sign up</a>
					</p>
				</div>
			</section>

			<aside class="auth-aurora" aria-hidden="true"></aside>
		</main>

		<script src="assets/js/app.js"></script>
	</body>
</html>
