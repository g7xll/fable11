<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Scalar</title>
<script>(function(){try{var t=localStorage.getItem("scalar-theme");if(!t)t=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";if(t==="dark")document.documentElement.classList.add("dark");}catch(e){}})();</script>
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="assets/layout/logo-icon.svg">
<style>
  .auth-wrap { max-width: 420px; margin: 0 auto; padding: 80px 20px; }
  .auth-brand { display: inline-flex; align-items: center; gap: 9px; font-weight: 600; font-size: 17px; }
  .auth-brand img { width: 22px; height: 22px; }
  .auth-title { font-size: 24px; font-weight: 600; margin: 22px 0 28px; }
  .field {
    width: 100%; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; background: var(--card); color: var(--foreground);
    font-family: inherit; font-size: 14px; transition: border-color .15s, box-shadow .15s;
  }
  .field::placeholder { color: var(--muted-foreground); }
  .field:focus { outline: none; border-color: var(--ring); box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 30%, transparent); }
  .field + .field { margin-top: 14px; }
  .auth-row { display: flex; align-items: center; justify-content: space-between; margin: 16px 0 20px; }
  .auth-check { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; color: var(--foreground); cursor: pointer; }
  .auth-check input { width: 16px; height: 16px; accent-color: var(--secondary); cursor: pointer; }
  .auth-link { color: var(--secondary); font-size: 14px; text-decoration: none; }
  .auth-link:hover { text-decoration: underline; }
  .btn-block { width: 100%; justify-content: center; }
  .auth-social { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .auth-social .btn { width: 100%; justify-content: center; gap: 9px; }
  .auth-foot { text-align: center; font-size: 14px; color: var(--muted-foreground); margin-top: 22px; }
  .g-svg { width: 16px; height: 16px; }
  @media (max-width: 480px){ .auth-social { grid-template-columns: 1fr; } }
</style>
</head>
<body data-active="" data-prefix="">
<div id="site-header"></div>

<main class="frame">
  <div class="auth-wrap reveal">
    <span class="auth-brand"><img src="assets/layout/logo-icon.svg" alt="">Scalar</span>
    <h1 class="auth-title">Log In to Scalar</h1>

    <form onsubmit="return false">
      <input class="field" type="email" placeholder="nick@site.com" autocomplete="email">
      <input class="field" type="password" placeholder="••••••••" autocomplete="current-password">

      <div class="auth-row">
        <label class="auth-check"><input type="checkbox"> Remember me</label>
        <a class="auth-link" href="#">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-block" type="submit">Log in</button>
    </form>

    <div class="auth-social">
      <a class="btn btn-outline" href="#"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.02c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z"/></svg>Continue with Github</a>
      <a class="btn btn-outline" href="#"><svg class="g-svg" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8a12 12 0 1 1 7.9-21l5.7-5.7A20 20 0 1 0 24 44a20 20 0 0 0 19.6-23.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8A12 12 0 0 1 24 12a12 12 0 0 1 7.9 3l5.7-5.7A20 20 0 0 0 6.3 14.7z"/><path fill="#4CAF50" d="M24 44a20 20 0 0 0 13.5-5.2l-6.2-5.3A12 12 0 0 1 24 36a12 12 0 0 1-11.3-7.9l-6.5 5A20 20 0 0 0 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3a12 12 0 0 1-4.1 5.5l6.2 5.3C37 41 44 36 44 24a20 20 0 0 0-.4-3.5z"/></svg>Continue with Google</a>
    </div>

    <p class="auth-foot">Don't have an account? <a class="auth-link" href="signup.html">Sign Up</a></p>
  </div>
</main>

<div id="site-cta"></div>
<div id="site-footer"></div>
<script src="shared.js"></script>
</body>
</html>
