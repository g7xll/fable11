<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Blog | Dillion Verma</title>
		<meta
			name="description"
			content="My thoughts on software development, life, and more."
		>
		<link rel="icon" href="./assets/img/me.png">
		<link rel="stylesheet" href="./styles.css">
	</head>
	<body>
		<main>
			<div class="blog-header">
				<div class="blog-title-row blur-fade">
					<h1>Blog</h1>
					<span class="badge">7 posts</span>
				</div>
				<p class="blog-sub blur-fade" data-delay="0.04">
					My thoughts on software development, life, and more.
				</p>
			</div>
			<div class="post-list" id="post-list"></div>
			<div class="pagination">
				<span id="page-label">Page 1 of 2</span>
				<div class="pg-btns">
					<button class="pg-btn" id="prev" disabled>Previous</button>
					<button class="pg-btn" id="next">Next</button>
				</div>
			</div>
		</main>

		<div id="dock-mount"></div>
		<script src="./posts.js"></script>
		<script src="./dock.js"></script>
		<script src="./blog.js"></script>
		<script src="./script.js"></script>
	</body>
</html>
