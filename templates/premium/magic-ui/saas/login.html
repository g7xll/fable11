<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Login — acme.ai</title>
		<link rel="stylesheet" href="./styles.css">
		<link rel="stylesheet" href="./auth.css">
	</head>
	<body>
		<main class="auth-main">
			<div class="auth-card">
				<div class="auth-card-header">
					<div class="auth-card-title">Login</div>
					<div class="auth-card-desc">
						Enter your email below to login to your account
					</div>
				</div>
				<div class="auth-card-body">
					<div class="auth-social">
						<button class="btn btn-outline">
							<svg viewBox="0 0 24 24" width="18" height="18">
								<path
									fill="#4285F4"
									d="M22.5 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.9a5 5 0 01-2.2 3.3v2.7h3.6c2.1-2 3.2-4.9 3.2-7.8z"
								/>
								<path
									fill="#34A853"
									d="M12 23c2.9 0 5.4-1 7.2-2.7l-3.6-2.7c-1 .7-2.3 1.1-3.6 1.1-2.8 0-5.1-1.9-6-4.4H2.3v2.8A11 11 0 0012 23z"
								/>
								<path
									fill="#FBBC05"
									d="M6 14.3a6.6 6.6 0 010-4.2V7.3H2.3a11 11 0 000 9.8L6 14.3z"
								/>
								<path
									fill="#EA4335"
									d="M12 5.4c1.6 0 3 .5 4.1 1.6l3.1-3.1A11 11 0 0012 1 11 11 0 002.3 7.3L6 10.1c.9-2.5 3.2-4.4 6-4.4z"
								/>
							</svg>
							Login with Google
						</button>
						<button class="btn btn-outline">
							<svg
								viewBox="0 0 24 24"
								width="18"
								height="18"
								fill="currentColor"
							>
								<path
									d="M12 2a10 10 0 00-3.2 19.5c.5.1.7-.2.7-.5v-1.7c-2.8.6-3.4-1.3-3.4-1.3-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.6.3-1.1.6-1.4-2.2-.2-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.4-1.3.1-2.7 0 0 .8-.3 2.7 1a9.4 9.4 0 015 0c1.9-1.3 2.7-1 2.7-1 .5 1.4.2 2.4.1 2.7.6.7 1 1.6 1 2.7 0 3.9-2.3 4.8-4.6 5 .4.3.7.9.7 1.9v2.8c0 .3.2.6.7.5A10 10 0 0012 2z"
								/>
							</svg>
							Login with GitHub
						</button>
					</div>
					<div class="auth-divider">OR CONTINUE WITH</div>
					<form onsubmit="return false">
						<div class="field">
							<label>Email</label>
							<input type="email" placeholder="m@example.com">
						</div>
						<div class="field">
							<div class="field-row">
								<label>Password</label>
								<a class="forgot" href="#">Forgot your password?</a>
							</div>
							<input type="password">
						</div>
						<button class="btn btn-primary auth-submit">Login</button>
					</form>
					<p class="auth-foot">
						Don't have an account? <a href="./signup.html">Sign up</a>
					</p>
				</div>
			</div>
		</main>

		<script src="./main.js"></script>
	</body>
</html>
