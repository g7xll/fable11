<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Sign Up — acme.ai</title>
		<link rel="stylesheet" href="./styles.css">
		<link rel="stylesheet" href="./auth.css">
	</head>
	<body>
		<main class="auth-main">
			<div class="auth-card">
				<div class="auth-card-header">
					<div class="auth-card-title sm">Sign Up</div>
					<div class="auth-card-desc">
						Enter your information to create an account
					</div>
				</div>
				<div class="auth-card-body">
					<form onsubmit="return false">
						<div class="field-2col">
							<div class="field">
								<label>First name</label>
								<input type="text" placeholder="Max">
							</div>
							<div class="field">
								<label>Last name</label>
								<input type="text" placeholder="Robinson">
							</div>
						</div>
						<div class="field">
							<label>Email</label>
							<input type="email" placeholder="m@example.com">
						</div>
						<div class="field">
							<label>Password</label>
							<input type="password">
						</div>
						<button class="btn btn-primary auth-submit">
							Create an account
						</button>
					</form>
					<div class="auth-social auth-social-bottom">
						<button class="btn btn-outline">
							<svg
								viewBox="0 0 24 24"
								width="18"
								height="18"
								fill="currentColor"
							>
								<path
									d="M12 2a10 10 0 00-3.2 19.5c.5.1.7-.2.7-.5v-1.7c-2.8.6-3.4-1.3-3.4-1.3-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.6.3-1.1.6-1.4-2.2-.2-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.4-1.3.1-2.7 0 0 .8-.3 2.7 1a9.4 9.4 0 015 0c1.9-1.3 2.7-1 2.7-1 .5 1.4.2 2.4.1 2.7.6.7 1 1.6 1 2.7 0 3.9-2.3 4.8-4.6 5 .4.3.7.9.7 1.9v2.8c0 .3.2.6.7.5A10 10 0 0012 2z"
								/>
							</svg>
							Sign up with GitHub
						</button>
					</div>
					<p class="auth-foot">
						Already have an account? <a href="./login.html">Sign in</a>
					</p>
				</div>
			</div>
		</main>

		<script src="./main.js"></script>
	</body>
</html>
