<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Agent SDK</title>
    <link rel="icon" href="assets/favicon.ico" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #fff;
      }
      .nf-wrap {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .nf-inner {
        display: flex;
        align-items: center;
      }
      .nf-code {
        display: inline-block;
        margin: 0 20px 0 0;
        padding: 0 23px 0 0;
        font-size: 24px;
        font-weight: 500;
        vertical-align: top;
        line-height: 49px;
        border-right: 1px solid rgba(0, 0, 0, 0.3);
      }
      .nf-msg {
        font-size: 14px;
        font-weight: 400;
        line-height: 49px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="nf-wrap">
      <div class="nf-inner">
        <h1 class="nf-code">404</h1>
        <div><h2 class="nf-msg">This page could not be found.</h2></div>
      </div>
    </div>
  </body>
</html>
