						<h1>Contact Me</h1>

						</p>

					<!-- Contact Form -->
					<div class="contact-form-wrap">
						<form class="contact-form" onsubmit="return false;">
							<div class="contact-form-inner">
							<div class="form-group">
								<label class="form-label" for="fullname">Full name</label>
								<input class="form-input" type="text" id="fullname" name="fullname" placeholder="Tyler Durden" autocomplete="name" style="">
							</div>
							<div class="form-group">
								<label class="form-label" for="email">Email Address</label>
								<input class="form-input" type="text" id="email" name="email" placeholder="tyler@projectmayhem.com" autocomplete="email" style="">
							</div>
							<div class="form-group">
								<label class="form-label" for="message">Message</label>
								<textarea class="form-textarea" id="message" name="message" placeholder="You're crazy good, never change." rows="5" style=""></textarea>
							</div>
							<button type="submit" class="btn-send">Send message</button>
							</div>
						</form>
					</div>

		<script>
		document
			.getElementById("themeToggle")
			.addEventListener("click", function () {
				var html = document.documentElement;
				if (html.getAttribute("data-theme") === "dark") {
					html.removeAttribute("data-theme");
					localStorage.setItem("theme", "light");
				} else {
					html.setAttribute("data-theme", "dark");
					localStorage.setItem("theme", "dark");
				}
			});
		</script>
	

</body></html>
