<!DOCTYPE html><html lang="en"><head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign up — shape.ai</title>
		<meta name="description" content="Create your shape.ai account, your favourite scheduling software.">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<div class="auth-wrapper">
			<!-- LEFT -->
			<div class="auth-left">
				<a href="index.html" class="auth-logo">
					<svg width="28" height="29" viewBox="0 0 28 29" fill="none" xmlns="http://www.w3.org/2000/svg">
						<path d="M4.53553 16.0355C2.58291 14.0829 2.58291 10.9171 4.53553 8.96447L10.1924 3.30761C12.145 1.35499 15.3108 1.35499 17.2635 3.30761L22.9203 8.96447C24.8729 10.9171 24.8729 14.0829 22.9203 16.0355L17.2635 21.6924C15.3108 23.645 12.145 23.645 10.1924 21.6924L4.53553 16.0355Z" fill="#FB4C01"></path>
					</svg>
					<span>shape.ai</span>
				</a>

				<h1 class="auth-left-heading">
					May your <span class="highlight">Network</span> From
					<span class="highlight">Email</span> and
					<span class="highlight">Calendar</span>
				</h1>
				<p class="auth-left-para">
					Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nulla
					porttitor massa vel ult varius risus scelerisque, accumsan felis vel,
					sodales erat. Donec tristi
				</p>

				<div class="auth-map">
					<div class="worldmap">
						<span class="map-pin" style="top:12%;left:8%">
							<img src="assets/images/kishore_gunnam.jpg" alt="Kishore" onerror="this.style.background='#9ca3af'">
							<span class="map-label">Kishore</span>
						</span>
						<span class="map-pin" style="top:28%;left:34%">
							<img src="assets/images/manu_arora.jpg" alt="Manu" onerror="this.style.background='#9ca3af'">
							<span class="map-label">Manu</span>
						</span>
						<span class="map-pin" style="top:40%;left:48%">
							<img src="assets/images/person3.png" alt="John" onerror="this.style.background='#9ca3af'">
							<span class="map-label">John</span>
						</span>
						<span class="map-pin" style="top:22%;left:62%">
							<span class="map-dot"></span>
							<span class="map-label">James</span>
						</span>
						<span class="map-pin" style="top:52%;left:22%">
							<span class="map-dot"></span>
							<span class="map-label">Emily</span>
						</span>
					</div>
				</div>
			</div>

			<!-- RIGHT -->
			<div class="auth-right">
				<form class="auth-form" onsubmit="return false">
					<h2 class="auth-title">Create your account</h2>

					<div class="auth-field">
						<label class="auth-label" for="name">Full Name</label>
						<div class="auth-input-wrap">
							<input class="auth-input" id="name" type="text" placeholder="Enter your full name" style="">
						</div>
					</div>

					<div class="auth-field">
						<label class="auth-label" for="email">Email</label>
						<div class="auth-input-wrap">
							<input class="auth-input" id="email" type="email" placeholder="Enter your email" style="">
						</div>
					</div>

					<div class="auth-field">
						<label class="auth-label" for="password">Password</label>
						<div class="auth-input-wrap">
							<input class="auth-input" id="password" type="password" placeholder="Create password" style="">
							<span class="auth-eye">
								<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
							</span>
						</div>
					</div>

					<div class="auth-field">
						<label class="auth-label" for="confirm">Confirm Password</label>
						<div class="auth-input-wrap">
							<input class="auth-input" id="confirm" type="password" placeholder="Confirm password" style="">
							<span class="auth-eye">
								<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
							</span>
						</div>
					</div>

					<button class="btn-orangegrad" type="submit">Create Account</button>

					<div class="auth-divider"></div>

					<button class="btn-googlegrad" type="button">
						<svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"></path><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"></path><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"></path><path fill="#EA4335" d="M12 4.75c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 1.46 14.97.5 12 .5A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 6.68 9.14 4.75 12 4.75z"></path></svg>
						Or sign up with Google
					</button>

					<p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
				</form>
			</div>
		</div>
	

</body></html>
