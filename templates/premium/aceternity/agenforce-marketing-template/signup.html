<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Sign Up — Agenforce</title>
		<meta
			name="description"
			content="Create your Agenforce account and start your journey today."
		>
		<link rel="stylesheet" href="assets/css/styles.css">
	</head>
	<body>
		<div class="auth-page">
			<!-- Minimal navbar -->
			<div class="auth-navbar">
				<a class="navbar-logo" href="index.html">
					<svg
						width="20"
						height="15"
						viewBox="0 0 20 15"
						fill="none"
						xmlns="http://www.w3.org/2000/svg"
					>
						<path
							d="M4.92285 14.8848H0V9.96191H4.92285V14.8848ZM19.6924 14.8848H9.84668V9.96191H4.92383V5.03809H9.84668V0.115234H19.6924V14.8848ZM9.84668 9.96191H14.7695V5.03906H9.84668V9.96191ZM4.92285 5.03809H0V0.115234H4.92285V5.03809Z"
							fill="currentColor"
						/>
					</svg>
					<span class="navbar-logo-text">Agenforce</span>
				</a>
			</div>

			<main class="auth-main">
				<div class="auth-card">
					<h1 class="auth-heading font-display font-bold">
						Create your account
					</h1>
					<p class="auth-subheading">Start your journey with Agenforce today</p>

					<!-- Social buttons -->
					<button class="auth-social-btn" type="button">
						<svg
							xmlns="http://www.w3.org/2000/svg"
							width="18"
							height="18"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<path
								d="M20.945 11a9 9 0 1 1 -3.284 -5.997l-2.655 2.392a5.5 5.5 0 1 0 2.119 6.605h-2.125v-3h5.945z"
							/>
						</svg>
						Continue with Google
					</button>
					<button class="auth-social-btn" type="button">
						<svg
							xmlns="http://www.w3.org/2000/svg"
							width="18"
							height="18"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<path
								d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5"
							/>
						</svg>
						Continue with GitHub
					</button>

					<div class="auth-divider">
						<div class="auth-divider-line"></div>
						<span class="auth-divider-text">Or continue with email</span>
						<div class="auth-divider-line"></div>
					</div>

					<form class="auth-form" onsubmit="return false;">
						<div class="auth-form-group">
							<label class="auth-label" for="name">Full name</label>
							<input
								class="auth-input"
								type="text"
								id="name"
								name="name"
								placeholder="Your full name"
								autocomplete="name"
							>
						</div>

						<div class="auth-form-group">
							<label class="auth-label" for="email">Email address</label>
							<input
								class="auth-input"
								type="email"
								id="email"
								name="email"
								placeholder="you@example.com"
								autocomplete="email"
							>
						</div>

						<div class="auth-form-group">
							<label class="auth-label" for="password">Password</label>
							<input
								class="auth-input"
								type="password"
								id="password"
								name="password"
								placeholder="Create a password"
								autocomplete="new-password"
							>
						</div>

						<div class="auth-form-group">
							<label class="auth-label" for="confirm-password"
								>Confirm password</label
							>
							<input
								class="auth-input"
								type="password"
								id="confirm-password"
								name="confirm-password"
								placeholder="Confirm your password"
								autocomplete="new-password"
							>
						</div>

						<button class="auth-submit font-medium" type="submit">
							Create account
						</button>
					</form>

					<p class="auth-terms">
						By signing up, you agree to our <a href="#">Terms of Service</a> and
						<a href="#">Privacy Policy</a>
					</p>

					<p class="auth-footer">
						Already have an account? <a href="login.html">Sign in</a>
					</p>
				</div>
			</main>
		</div>
	</body>
</html>
