<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Resume - John Doe</title>
		<meta name="description" content="Work history of John Doe.">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link
			rel="icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230ea5e9'><path d='M13 3l0 7l6 0l-8 11l0 -7l-6 0l8 -11'/></svg>"
		>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<div id="app">
			<span class="emoji">💼</span>
			<h1 class="cal h1">Work History</h1>
			<p class="lead">
				I'm a full-stack developer that loves
				<span class="chip-inline">building products</span>
				and web apps that can impact millions of lives
			</p>

			<div class="timeline" id="timeline"></div>
		</div>

		<script src="data.js"></script>
		<script src="main.js"></script>
		<script>
		const JOBS = [
			{
				year: "2022 - Present",
				company: "Amazon",
				role: "Senior Software Engineer",
				sub: "Building the future of e-commerce",
				bullets: [
					"Developed a new feature that improves the shopping experience",
					"Implemented a recommendation algorithm to suggest products",
					"Enhanced the checkout process making it more intuitive and user-friendly",
					"Built a feature for tracking packages in real-time",
				],
			},
			{
				year: "2021 - 2022",
				company: "Google",
				role: "Senior Software Engineer",
				sub: "Building the future of search",
				bullets: [
					"Improved the search algorithm to provide more relevant results",
					"Developed a new feature that personalizes search results",
					"Enhanced the search functionality making it more intuitive and user-friendly",
					"Implemented a feature for tracking search history",
				],
			},
			{
				year: "2020 - 2021",
				company: "Facebook",
				role: "Senior Software Engineer",
				sub: "Building the future of social networking",
				bullets: [
					"Developed a new feature that improves the user experience",
					"Implemented a recommendation algorithm to suggest friends",
					"Enhanced the news feed algorithm to show more relevant posts",
					"Built a feature for tracking user activity",
				],
			},
			{
				year: "2019 - 2020",
				company: "Apple",
				role: "Senior Software Engineer",
				sub: "Building the future of technology",
				bullets: [
					"Improved the iOS operating system to enhance user experience",
					"Developed a new feature that personalizes user interface",
					"Enhanced the app store algorithm to suggest more relevant apps",
					"Implemented a feature for tracking app usage",
				],
			},
			{
				year: "2018 - 2019",
				company: "Microsoft",
				role: "Senior Software Engineer",
				sub: "Building the future of software",
				bullets: [
					"Improved the Windows operating system to enhance user experience",
					"Developed a new feature that personalizes user interface",
					"Enhanced the office suite to improve productivity",
					"Implemented a feature for tracking software usage",
				],
			},
		];
		document.getElementById("timeline").innerHTML = JOBS.map(
			(j) => `
    <div class="tl-row">
      <div class="tl-year">${j.year}</div>
      <div>
        <h3 class="tl-company">${j.company}</h3>
        <p class="tl-role">${j.role}</p>
        <p class="tl-sub">${j.sub}</p>
        <ul class="tl-list">${j.bullets.map((b) => `<li>${b}</li>`).join("")}</ul>
      </div>
    </div>`,
		).join("");
		window.SidefolioChrome.mountChrome("", "");
		</script>
	</body>
</html>
