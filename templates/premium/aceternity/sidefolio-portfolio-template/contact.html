<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Contact - John Doe</title>
		<meta name="description" content="Contact John Doe.">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link
			rel="icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230ea5e9'><path d='M13 3l0 7l6 0l-8 11l0 -7l-6 0l8 -11'/></svg>"
		>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<div id="app">
			<span class="emoji">✉️</span>
			<h1 class="cal h1">Contact Me</h1>
			<p class="lead">
				Reach out to me over email or fill up this contact form. I will get back
				to you ASAP - I promise.
			</p>

			<form class="form" id="contactForm">
				<div class="form__row">
					<input type="text" placeholder="Your Name">
					<input type="email" placeholder="Your email address">
				</div>
				<textarea placeholder="Your Message"></textarea>
				<button type="submit">Submit</button>
			</form>
		</div>

		<script src="data.js"></script>
		<script src="main.js"></script>
		<script>
		window.SidefolioChrome.mountChrome("contact", "");
		</script>
	</body>
</html>
