<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width"/>
  <meta charset="utf-8"/>
  <title>Blog | My Notion Blog</title>
  <meta name="description" content="An example Next.js site using Notion for the blog"/>
  <meta name="og:title" content="My Notion Blog"/>
  <meta property="og:image" content="https://notion-blog.now.sh/og-image.png"/>
  <meta name="twitter:site" content="@_ijjk"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:image" content="https://notion-blog.now.sh/og-image.png"/>
  <link rel="stylesheet" href="styles.css"/>
  <script>
    // No-flash theme init
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored) {
        document.documentElement.setAttribute('data-theme', stored);
      }
    })();
  </script>
</head>
<body>
<div id="app">
  <header class="header">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a class="active" href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="https://github.com/ijjk/notion-blog" rel="noopener" target="_blank">Source Code</a></li>
    </ul>
  </header>

  <div class="layout blog-index">
    <h1>My Notion Blog</h1>
    <p class="no-posts">There are no posts yet</p>
  </div>

  <footer>
    <span class="deploy-text">Deploy your own!</span>
    <a href="https://vercel.com/new/git/external?repository-url=https://github.com/ijjk/notion-blog/tree/main&project-name=notion-blog&repository-name=notion-blog" rel="noopener" target="_blank">
      <img src="assets/images/vercel-button.svg" height="46" width="132" alt="deploy to Vercel button"/>
    </a>
    <span class="view-source">or <a href="https://github.com/ijjk/notion-blog" rel="noopener" target="_blank">view source</a></span>
  </footer>
</div><!-- /#app -->
</body>
</html>
