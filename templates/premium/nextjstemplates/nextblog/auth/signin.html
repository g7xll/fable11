<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — NextBlog</title>
  <link rel="stylesheet" href="../styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="site-header">
    <div class="container">
      <nav class="nav-wrapper">
        <div style="display:flex;width:100%;align-items:center;justify-content:space-between;">
          <a href="../index.html" class="nav-logo">
            <svg width="120" height="30" viewBox="0 0 120 30"><text x="0" y="22" font-family="Inter,sans-serif" font-weight="700" font-size="20" fill="#15171a">Next</text><text x="50" y="22" font-family="Inter,sans-serif" font-weight="700" font-size="20" fill="#625df5">Blog</text></svg>
          </a>
          <div style="display:flex;gap:0.75rem;">
            <a href="signin.html" class="btn-signin" style="background:var(--gray-2);">Sign in</a>
            <a href="signup.html" class="btn-getstarted">Get Started</a>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">
          <svg width="120" height="30" viewBox="0 0 120 30"><text x="0" y="22" font-family="Inter,sans-serif" font-weight="700" font-size="20" fill="#15171a">Next</text><text x="50" y="22" font-family="Inter,sans-serif" font-weight="700" font-size="20" fill="#625df5">Blog</text></svg>
        </div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your NextBlog account to continue</p>

        <!-- Social login -->
        <button class="social-btn">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button class="social-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Continue with Facebook
        </button>

        <div class="auth-divider"><span>or sign in with email</span></div>

        <form>
          <div class="form-group">
            <label class="form-label" for="email">Email address</label>
            <input class="form-input" type="email" id="email" name="email" placeholder="Enter your email" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="password" style="display:flex;justify-content:space-between;">
              Password
              <a href="#" style="font-size:0.875rem;color:var(--primary);font-weight:400;">Forgot password?</a>
            </label>
            <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password" required />
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">
            <input type="checkbox" id="remember" name="remember" style="width:16px;height:16px;accent-color:var(--primary);" />
            <label for="remember" style="font-size:0.875rem;color:var(--dark-4);">Remember me for 30 days</label>
          </div>
          <button type="submit" class="btn-primary">Sign in</button>
        </form>

        <p class="auth-link">Don't have an account? <a href="signup.html">Sign up for free</a></p>
      </div>
    </div>
  </main>

  <script src="../script.js"></script>
</body>
</html>
