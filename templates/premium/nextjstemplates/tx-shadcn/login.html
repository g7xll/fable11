<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Taxonomy</title>
  <script>
    (function() {
      var t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .login-page {
      min-height: 100vh;
      background: var(--background);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }
    .login-back {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.875rem;
      color: var(--muted-foreground);
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-back:hover { color: var(--foreground); }
    .auth-box {
      width: 100%;
      max-width: 22rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .auth-logo {
      width: 2.5rem;
      height: 2.5rem;
      background: var(--primary);
      color: var(--primary-foreground);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
    }
    .auth-title {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-align: center;
      color: var(--foreground);
    }
    .auth-subtitle {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      text-align: center;
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }
    .auth-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .form-input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--input);
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-family: var(--font-sans);
      background: var(--background);
      color: var(--foreground);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--primary); }
    .form-input::placeholder { color: var(--muted-foreground); }
    .separator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted-foreground);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0.25rem 0;
    }
    .separator::before, .separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .auth-terms {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      text-align: center;
      margin-top: 1rem;
      line-height: 1.6;
    }
    .auth-terms a { text-decoration: underline; text-underline-offset: 2px; color: inherit; }
    .auth-switch {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      text-align: center;
      margin-top: 1.25rem;
    }
    .auth-switch a { text-decoration: underline; text-underline-offset: 2px; color: var(--foreground); }
    .btn-full { width: 100%; justify-content: center; }
  </style>
</head>
<body>
  <div class="login-page">
    <a href="index.html" class="login-back">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back
    </a>

    <div class="auth-box">
      <div class="auth-logo">⌘</div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Enter your email to sign in to your account</p>

      <form class="auth-form" onsubmit="return false;">
        <input type="email" class="form-input" placeholder="name@example.com" autocomplete="email" />
        <button type="submit" class="btn btn-primary btn-full">Sign In with Email</button>
      </form>

      <div class="separator" style="width:100%;margin-top:1rem;">Or continue with</div>

      <button class="btn btn-outline btn-full" style="margin-top:0.5rem;width:100%;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        Continue with GitHub
      </button>

      <p class="auth-terms">
        By clicking continue, you agree to our<br>
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </p>

      <p class="auth-switch">Don't have an account? <a href="register.html">Sign Up</a></p>
    </div>
  </div>
</body>
</html>
