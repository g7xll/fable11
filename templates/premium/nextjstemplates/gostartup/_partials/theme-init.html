		<script>
			(function () {
				try {
					var saved = localStorage.getItem("gostartup-theme");
					var theme =
						saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
					document.documentElement.setAttribute("data-theme", theme);
				} catch (e) {}
			})();
		</script>
