<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In - Pocket</title>
<link rel="stylesheet" href="assets/css/tokens.css" />
<link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
<div class="auth">
  <svg class="auth__bg" viewBox="0 0 1024 1024" fill="none" aria-hidden="true" data-bgillus></svg>
  <div class="auth__inner">
    <div class="auth__logo">
      <a href="index.html" class="logo" aria-label="Home"><span class="logo__mark" data-logo></span><span class="logo__word">Pocket</span></a>
    </div>
    <div class="auth__head">
      <h1>Sign in to account</h1>
      <p class="auth__sub">Don't have an account? <a href="register.html">Sign up</a> for a free trial.</p>
    </div>
    <form class="auth__card" onsubmit="return false">
      <div class="field">
        <label for="email">Email address</label>
        <input id="email" type="email" autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn--cyan auth__submit">Sign in to account</button>
    </form>
  </div>
</div>
<script src="assets/js/auth.js"></script>
</body>
</html>
