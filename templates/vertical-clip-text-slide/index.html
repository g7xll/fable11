<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vertical Clip Text — Letter-by-Letter Slide-Down</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- film grain -->
  <svg class="grain" aria-hidden="true">
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#noise)"/>
  </svg>

  <header class="topbar">
    <span class="label">Vertical&nbsp;Clip / Text</span>
    <button class="replay" type="button">
      <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true">
        <path d="M21 12a9 9 0 1 1-2.64-6.36" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M21 3v6h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Replay
    </button>
  </header>

  <main class="wrap">
    <div class="stage" id="stage">
      <h1 class="headline">
        <span class="line">Motion</span>
        <span class="line">in every</span>
        <span class="line">letter.</span>
      </h1>
      <p class="subline">A vertical-clip slide-down, one glyph at a time.</p>
    </div>
  </main>

  <footer class="hairline">
    <span class="caption">Each glyph pours down inside its own clip column</span>
    <span class="readout"><i class="dot"></i>cubic-bezier(.22,1,.36,1) · 70ms stagger</span>
  </footer>

  <script src="main.js"></script>
</body>
</html>
