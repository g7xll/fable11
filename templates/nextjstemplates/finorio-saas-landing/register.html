<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create an account - Finorio</title>
<meta name="description" content="Create your Finorio account and start your free 30-day trial." />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="site-header">
  <a class="logo" href="index.html"><img src="assets/svg/logo.svg" alt="Finorio" /></a>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="features.html">Features</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="header-actions">
    <a href="login.html" class="btn btn-light">Log in</a>
    <a href="register.html" class="btn btn-dark">Download Now</a>
  </div>
  <button class="menu-toggle" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
  </button>
</header>

<main>
  <div class="auth-wrap">
    <form class="auth-card reveal" data-demo>
      <a class="logo" href="index.html"><img src="assets/svg/logo.svg" alt="Finorio" /></a>
      <h1>Create an account</h1>
      <p class="sub">Start your free 30-day trial.</p>

      <div class="field">
        <label>Name</label>
        <div class="input-wrap"><input type="text" placeholder="Enter your name" /></div>
      </div>
      <div class="field">
        <label>Email</label>
        <div class="input-wrap"><input type="email" placeholder="Enter your email" /></div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" placeholder="Create a password" />
          <span class="eye" role="button" aria-label="Toggle password"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></span>
        </div>
      </div>

      <button type="submit" class="btn btn-dark btn-block">Get started</button>
      <button type="button" class="btn btn-google btn-block">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.26 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 4.75c1.62 0 3.06.56 4.21 1.64l3.15-3.15A10.5 10.5 0 0 0 12 1 11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.3 9.14 4.75 12 4.75z"/></svg>
        Sign up with Google
      </button>

      <p class="auth-foot">Already have an account? <a href="login.html" class="link-strong">Log in</a></p>
    </form>
  </div>
</main>

<div id="footer-slot"></div>

<script src="partials.js"></script>
<script src="script.js"></script>
</body>
</html>
