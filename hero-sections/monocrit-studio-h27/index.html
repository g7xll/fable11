<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>MONOCRIT STUDIO — Visual / Noise</title>
		<meta
			name="description"
			content="Monocrit Studio — independent art direction. An interactive monochrome portfolio hero."
		>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<div id="app">
			<!-- Paper grain + registration marks -->
			<div class="grain" aria-hidden="true"></div>
			<div class="reg reg--tl" aria-hidden="true"></div>
			<div class="reg reg--tr" aria-hidden="true"></div>
			<div class="reg reg--bl" aria-hidden="true"></div>
			<div class="reg reg--br" aria-hidden="true"></div>

			<!-- Header -->
			<header class="bar bar--top">
				<div class="bar__cell mark">MONOCRIT<span class="mark__c">©</span></div>
				<div class="bar__cell meta-center">
					<span id="clock">00:00:00</span>
					<span class="sep">/</span>
					<span>40.71°N 74.00°W</span>
				</div>
				<div class="bar__cell status">
					<span class="dot" aria-hidden="true"></span>
					Available for Freelance
				</div>
			</header>

			<!-- Hero -->
			<main class="hero" id="hero">
				<p class="eyebrow" data-anim>Independent Art Direction — Est. 2024</p>

				<h1 class="headline" id="headline" aria-label="Visual Noise">
					<span class="line" data-word="visual">VISUAL</span>
					<span class="line line--outline" data-word="noise">NOISE</span>
				</h1>

				<div class="meta-row" data-anim>
					<p class="lede">
						A studio for art direction, motion &amp; brand systems — built to
						cut through the visual noise.
					</p>
					<div class="actions">
						<a href="#" class="btn btn--ghost" data-cursor="index"
							>View Index</a
						>
						<a href="#" class="btn btn--solid" data-cursor="say hi"
							>Get in Touch</a
						>
					</div>
				</div>
			</main>

			<!-- Floating cursor card -->
			<div class="card" id="card" aria-hidden="true">
				<div class="card__stack" id="stack">
					<img src="assets/work-1.jpg" alt="" class="is-active">
					<img src="assets/work-2.jpg" alt="">
					<img src="assets/work-3.jpg" alt="">
					<img src="assets/work-4.jpg" alt="">
					<img src="assets/work-5.jpg" alt="">
					<img src="assets/work-6.jpg" alt="">
				</div>
				<div class="card__cap">
					<span id="cap-name">FIELD STUDY</span>
					<span id="cap-num">01 / 06</span>
				</div>
			</div>

			<!-- Mini ring cursor (over interactive) -->
			<div class="ring" id="ring" aria-hidden="true">
				<span id="ring-label"></span>
			</div>

			<!-- Footer -->
			<footer class="bar bar--bottom">
				<div class="bar__cell">Selected Works — 06</div>
				<div class="dots" id="dots" aria-hidden="true"></div>
				<div class="bar__cell hint">
					Move cursor to explore <span class="arr">↗</span>
				</div>
			</footer>
		</div>

		<script src="main.js"></script>
	</body>
</html>
