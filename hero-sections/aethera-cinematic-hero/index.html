<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta
			name="description"
			content="Aethera — Beyond silence, we build the eternal. Digital havens for deep work and pure flows."
		>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
			rel="icon"
			href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='16' fill='%23000000'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='18' fill='%23ffffff' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E"
		>
		<title>Aethera® — Beyond silence, we build the eternal.</title>
		<script>
		// Apply the saved/system theme before first paint to avoid a flash.
		(() => {
			try {
				var saved = localStorage.getItem("aethera-theme");
				var dark = saved
					? saved === "dark"
					: matchMedia("(prefers-color-scheme: dark)").matches;
				if (dark) document.documentElement.classList.add("dark");
			} catch (_e) {}
		})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
