<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta
			name="description"
			content="Spektr — streamline SMB trade. An animated shadcn/ui hero with spring-rotating words, built in React + Tailwind + TypeScript."
		>
		<link
			rel="preload"
			href="/fonts/space-grotesk-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		>
		<link
			rel="icon"
			href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23061116'/%3E%3Cpath d='M16 5 L26 10.5 V21.5 L16 27 L6 21.5 V10.5 Z' fill='none' stroke='%2322d3ee' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='2.4' fill='%2322d3ee'/%3E%3C/svg%3E"
		>
		<title>Spektr® — Streamline SMB trade</title>
		<script>
		// Apply the saved/system theme before first paint to avoid a flash.
		// Defaults to dark (the primary look) when nothing is stored.
		(() => {
			try {
				var saved = localStorage.getItem("spektr-theme");
				var light = saved
					? saved === "light"
					: matchMedia("(prefers-color-scheme: light)").matches;
				if (!light) document.documentElement.classList.add("dark");
			} catch (_e) {
				document.documentElement.classList.add("dark");
			}
		})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
