<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Marlowe König — Creative Director · PRISMA NOIR</title>
		<meta
			name="description"
			content="PRISMA NOIR — Marlowe König, creative director. A spectral-darkroom hero: near-black canvas lit by drifting spectral color and a cinematic discover menu."
		>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<div id="app">
			<!-- ===================== BACKGROUND ===================== -->
			<div class="bg" aria-hidden="true">
				<div class="bg__drift" id="drift">
					<span class="blob blob--amber"></span>
					<span class="blob blob--pink"></span>
					<span class="blob blob--blue"></span>
					<span class="blob blob--orange"></span>
					<span class="blob blob--violet"></span>
				</div>
				<div class="bg__grid"></div>
				<div class="bg__settle"></div>
				<div class="bg__grain"></div>
				<div class="bg__vignette"></div>
			</div>

			<!-- ===================== HEADER ===================== -->
			<header class="bar">
				<a href="#" class="wordmark" data-rise style="--d:.05s">
					<span class="wordmark__name">Marlowe König</span>
					<span class="wordmark__dot" aria-hidden="true">
						<svg viewBox="0 0 11 11">
							<path
								d="M5.5 11A5.5 5.5 0 1 1 5.5 0a5.5 5.5 0 0 1 0 11Zm0-10a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Z"
							/>
						</svg>
					</span>
				</a>
				<button id="menu-trigger" class="discover" data-rise style="--d:.1s">
					discover
				</button>
			</header>

			<!-- ===================== HERO CONTENT ===================== -->
			<main class="hero">
				<div class="hero__left">
					<nav class="social" aria-label="Social links">
						<a href="#" class="chip" data-rise style="--d:.35s"
							><span>Dr</span></a
						>
						<a href="#" class="chip" data-rise style="--d:.42s"
							><span>Be</span></a
						>
						<a href="#" class="chip" data-rise style="--d:.49s"
							><span>Li</span></a
						>
					</nav>

					<div class="headline">
						<h1 class="line line--solid" data-rise style="--d:.15s">
							Crafting
						</h1>
						<div class="line line--row">
							<span class="line__faint" data-rise style="--d:.22s">beyond</span>
							<span
								class="loop"
								aria-label="boundaries, expectations, conventions, reality"
							>
								<span class="loop__inner" id="loop-inner">
									<span class="loop__word">Boundaries</span>
									<span class="loop__word">Expectations</span>
									<span class="loop__word">Conventions</span>
									<span class="loop__word">Reality</span>
									<span class="loop__word">Boundaries</span>
								</span>
							</span>
						</div>
						<p class="kicker" data-rise style="--d:.55s">
							Creative direction, art &amp; motion · Berlin / everywhere ·
							Booking Q3
						</p>
					</div>
				</div>

				<div
					class="hero__star"
					id="star"
					data-rise
					style="--d:.3s"
					aria-hidden="true"
				>
					<svg viewBox="0 0 116 115">
						<path
							d="M58 0l3.6 42.4L104 46l-42.4 3.6L58 92l-3.6-42.4L12 46l42.4-3.6L58 0Z"
						/>
					</svg>
				</div>
			</main>

			<!-- ===================== DISCOVER OVERLAY ===================== -->
			<div id="menu-overlay" class="overlay" aria-hidden="true">
				<button id="menu-close" class="overlay__close">
					<span>Close menu</span>
					<i class="overlay__rule"></i>
				</button>
				<div class="overlay__list" id="overlay-list"></div>
				<div class="overlay__foot">
					<span>PRISMA NOIR™</span>
					<span
						>©<span id="year"></span>
						— selected works available on request</span
					>
				</div>
			</div>
		</div>

		<script src="main.js"></script>
	</body>
</html>
