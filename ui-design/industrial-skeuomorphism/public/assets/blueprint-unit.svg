<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" role="img" aria-label="Exploded engineering schematic of the SCHEMATIC control unit">
  <defs>
    <linearGradient id="bpbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2a36"/>
      <stop offset="100%" stop-color="#16202b"/>
    </linearGradient>
    <pattern id="bpgrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#3a5a72" stroke-width="0.6" opacity="0.45"/>
    </pattern>
    <pattern id="bpgridfine" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M8 0H0V8" fill="none" stroke="#2f4a5e" stroke-width="0.4" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="640" height="480" fill="url(#bpbg)"/>
  <rect width="640" height="480" fill="url(#bpgridfine)"/>
  <rect width="640" height="480" fill="url(#bpgrid)"/>

  <!-- frame + title block -->
  <rect x="14" y="14" width="612" height="452" fill="none" stroke="#5b87a3" stroke-width="1.4"/>
  <rect x="14" y="14" width="612" height="452" fill="none" stroke="#5b87a3" stroke-width="0.5" transform="translate(5,5)" opacity="0.4"/>
  <g font-family="'JetBrains Mono', monospace" fill="#8fb8d4">
    <text x="28" y="40" font-size="13" letter-spacing="2" font-weight="700">SCHEMATIC // SX-1 CONTROL UNIT</text>
    <text x="28" y="58" font-size="9" letter-spacing="1.5" opacity="0.75">DWG 0xA417 · REV C · SCALE 1:1 · ISO-2768-mK</text>
  </g>
  <g font-family="'JetBrains Mono', monospace" fill="#8fb8d4" text-anchor="end">
    <text x="612" y="40" font-size="9" letter-spacing="1.5" opacity="0.75">SHEET 1 / 4</text>
    <text x="612" y="56" font-size="9" letter-spacing="1.5" opacity="0.75">MAT: ABS + 6061-T6</text>
  </g>

  <!-- exploded device: rear chassis -->
  <g stroke="#7fb0cc" fill="none" stroke-width="1.4">
    <rect x="120" y="150" width="320" height="200" rx="16"/>
    <rect x="136" y="166" width="288" height="168" rx="10" stroke-width="0.9" opacity="0.7"/>
    <!-- mounting bosses -->
    <circle cx="146" cy="176" r="6"/><circle cx="414" cy="176" r="6"/>
    <circle cx="146" cy="324" r="6"/><circle cx="414" cy="324" r="6"/>
    <line x1="142" y1="176" x2="150" y2="176"/><line x1="146" y1="172" x2="146" y2="180"/>
    <line x1="410" y1="176" x2="418" y2="176"/><line x1="414" y1="172" x2="414" y2="180"/>
    <line x1="142" y1="324" x2="150" y2="324"/><line x1="146" y1="320" x2="146" y2="328"/>
    <line x1="410" y1="324" x2="418" y2="324"/><line x1="414" y1="320" x2="414" y2="328"/>
  </g>

  <!-- exploded: screen module offset (the "+1" elevation), accent on the LED -->
  <g stroke="#7fb0cc" fill="none" stroke-width="1.4">
    <rect x="196" y="92" width="248" height="150" rx="12"/>
    <rect x="212" y="108" width="216" height="118" rx="6" stroke="#ff6b78" stroke-width="1.2"/>
  </g>
  <g stroke="#3a5a72" stroke-width="0.7" opacity="0.85">
    <line x1="212" y1="132" x2="428" y2="132"/>
    <line x1="212" y1="156" x2="428" y2="156"/>
    <line x1="212" y1="180" x2="428" y2="180"/>
    <line x1="212" y1="204" x2="428" y2="204"/>
  </g>
  <circle cx="416" cy="120" r="5" fill="#ff4757" stroke="none"/>
  <circle cx="416" cy="120" r="9" fill="none" stroke="#ff4757" stroke-width="0.8" opacity="0.6"/>

  <!-- explosion guide lines -->
  <g stroke="#5b87a3" stroke-width="0.8" stroke-dasharray="4 4" opacity="0.8">
    <line x1="196" y1="92" x2="120" y2="150"/>
    <line x1="444" y1="92" x2="440" y2="150"/>
    <line x1="320" y1="92" x2="320" y2="150"/>
  </g>

  <!-- dimension lines -->
  <g stroke="#8fb8d4" stroke-width="0.9" font-family="'JetBrains Mono', monospace" fill="#8fb8d4" font-size="9">
    <line x1="120" y1="372" x2="440" y2="372"/>
    <line x1="120" y1="366" x2="120" y2="378"/>
    <line x1="440" y1="366" x2="440" y2="378"/>
    <text x="280" y="388" text-anchor="middle" letter-spacing="1">182.0</text>

    <line x1="468" y1="150" x2="468" y2="350"/>
    <line x1="462" y1="150" x2="474" y2="150"/>
    <line x1="462" y1="350" x2="474" y2="350"/>
    <text x="484" y="254" letter-spacing="1">114.0</text>
  </g>

  <!-- callout balloons -->
  <g font-family="'JetBrains Mono', monospace" font-weight="700" font-size="11">
    <circle cx="520" cy="120" r="13" fill="none" stroke="#ff4757" stroke-width="1.4"/>
    <text x="520" y="124" text-anchor="middle" fill="#ff6b78">01</text>
    <line x1="507" y1="120" x2="430" y2="116" stroke="#ff4757" stroke-width="0.8" opacity="0.8"/>

    <circle cx="520" cy="232" r="13" fill="none" stroke="#7fb0cc" stroke-width="1.4"/>
    <text x="520" y="236" text-anchor="middle" fill="#8fb8d4">02</text>
    <line x1="507" y1="232" x2="428" y2="200" stroke="#5b87a3" stroke-width="0.8" opacity="0.8"/>

    <circle cx="92" cy="250" r="13" fill="none" stroke="#7fb0cc" stroke-width="1.4"/>
    <text x="92" y="254" text-anchor="middle" fill="#8fb8d4">03</text>
    <line x1="105" y1="250" x2="136" y2="250" stroke="#5b87a3" stroke-width="0.8" opacity="0.8"/>
  </g>

  <!-- bill of materials block -->
  <g font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#8fb8d4" letter-spacing="0.5">
    <rect x="28" y="398" width="584" height="54" fill="none" stroke="#5b87a3" stroke-width="0.9"/>
    <line x1="28" y1="416" x2="612" y2="416" stroke="#3a5a72" stroke-width="0.7"/>
    <line x1="120" y1="398" x2="120" y2="452" stroke="#3a5a72" stroke-width="0.7"/>
    <line x1="430" y1="398" x2="430" y2="452" stroke="#3a5a72" stroke-width="0.7"/>
    <text x="36" y="411" font-weight="700">ITEM</text>
    <text x="128" y="411" font-weight="700">DESCRIPTION</text>
    <text x="438" y="411" font-weight="700">QTY / SPEC</text>
    <text x="36" y="431">01</text><text x="128" y="431">TFT DISPLAY · CRT-EMU BEZEL</text><text x="438" y="431" fill="#ff6b78">1 · 60Hz</text>
    <text x="36" y="445">02</text><text x="128" y="445">LOGIC BOARD · QUAD-CORE MCU</text><text x="438" y="445">1 · 1.2GHz</text>
  </g>
</svg>
