<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <style>
      .trace { fill: none; stroke: #00ff88; stroke-width: 1; }
      .pad   { fill: #00ff88; }
      .via   { fill: none; stroke: #00ff88; stroke-width: 1.5; }
    </style>
  </defs>
  <g opacity="0.9">
    <!-- horizontal + vertical PCB traces with right-angle bends -->
    <path class="trace" d="M0 40 H120 V120 H200 V60 H320"/>
    <path class="trace" d="M0 120 H60 V220 H160 V300"/>
    <path class="trace" d="M40 0 V80 H160 V160 H260 V320"/>
    <path class="trace" d="M200 0 V100 H280 V200 H320"/>
    <path class="trace" d="M0 260 H100 V200 H180 V260 H320"/>
    <path class="trace" d="M120 320 V240 H40 V160"/>
    <!-- solder pads -->
    <circle class="pad" cx="120" cy="40" r="3"/>
    <circle class="pad" cx="200" cy="120" r="3"/>
    <circle class="pad" cx="60" cy="120" r="3"/>
    <circle class="pad" cx="160" cy="220" r="3"/>
    <circle class="pad" cx="40" cy="80" r="3"/>
    <circle class="pad" cx="160" cy="160" r="3"/>
    <circle class="pad" cx="260" cy="160" r="3"/>
    <circle class="pad" cx="280" cy="200" r="3"/>
    <circle class="pad" cx="100" cy="260" r="3"/>
    <circle class="pad" cx="180" cy="200" r="3"/>
    <!-- vias (rings) -->
    <circle class="via" cx="200" cy="60" r="5"/>
    <circle class="via" cx="60" cy="220" r="5"/>
    <circle class="via" cx="280" cy="100" r="5"/>
    <circle class="via" cx="40" cy="160" r="5"/>
  </g>
</svg>
