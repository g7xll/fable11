<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="ht-s" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="#111111"/>
    </pattern>
    <linearGradient id="sky-s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dededa"/>
      <stop offset="100%" stop-color="#cfcfc9"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="url(#sky-s)"/>
  <rect width="900" height="520" fill="url(#ht-s)" opacity="0.22"/>
  <!-- engraved metropolis skyline -->
  <g fill="#111111">
    <rect x="40" y="300" width="70" height="220"/>
    <rect x="120" y="240" width="58" height="280"/>
    <rect x="188" y="180" width="46" height="340"/>
    <rect x="244" y="120" width="64" height="400"/>
    <rect x="318" y="220" width="52" height="300"/>
    <rect x="380" y="90" width="58" height="430"/>
    <rect x="448" y="170" width="44" height="350"/>
    <rect x="502" y="60" width="72" height="460"/>
    <rect x="584" y="210" width="50" height="310"/>
    <rect x="644" y="150" width="60" height="370"/>
    <rect x="714" y="250" width="54" height="270"/>
    <rect x="778" y="190" width="80" height="330"/>
  </g>
  <!-- lit windows knocked out of the towers -->
  <g fill="#dededa">
    <rect x="256" y="150" width="10" height="14"/><rect x="278" y="150" width="10" height="14"/>
    <rect x="256" y="190" width="10" height="14"/><rect x="278" y="190" width="10" height="14"/>
    <rect x="394" y="130" width="10" height="14"/><rect x="416" y="130" width="10" height="14"/>
    <rect x="394" y="170" width="10" height="14"/><rect x="416" y="210" width="10" height="14"/>
    <rect x="518" y="100" width="12" height="16"/><rect x="544" y="100" width="12" height="16"/>
    <rect x="518" y="150" width="12" height="16"/><rect x="544" y="150" width="12" height="16"/>
    <rect x="518" y="200" width="12" height="16"/><rect x="544" y="250" width="12" height="16"/>
    <rect x="660" y="190" width="10" height="14"/><rect x="682" y="190" width="10" height="14"/>
    <rect x="660" y="230" width="10" height="14"/><rect x="682" y="270" width="10" height="14"/>
  </g>
  <!-- spire on the tallest building -->
  <rect x="534" y="20" width="8" height="44" fill="#111111"/>
  <line x1="0" y1="520" x2="900" y2="520" stroke="#111111" stroke-width="6"/>
</svg>
