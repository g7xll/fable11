<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 760" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="ht-m" width="7" height="7" patternUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="1.6" fill="#111111"/>
    </pattern>
    <pattern id="ht-m2" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="2.5" cy="2.5" r="1.9" fill="#111111"/>
    </pattern>
    <radialGradient id="vig-m" cx="50%" cy="38%" r="70%">
      <stop offset="55%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.28"/>
    </radialGradient>
  </defs>
  <rect width="600" height="760" fill="#e7e7e2"/>
  <rect width="600" height="760" fill="url(#ht-m)" opacity="0.32"/>
  <!-- a hulking press / engine block, the printing machine -->
  <g fill="#111111">
    <rect x="120" y="250" width="360" height="360" fill="url(#ht-m2)" opacity="0.9"/>
    <rect x="120" y="250" width="360" height="360" fill="none" stroke="#111111" stroke-width="4"/>
    <circle cx="240" cy="430" r="92" fill="#e7e7e2" stroke="#111111" stroke-width="5"/>
    <circle cx="240" cy="430" r="92" fill="url(#ht-m)" opacity="0.5"/>
    <circle cx="240" cy="430" r="34" fill="#111111"/>
    <circle cx="240" cy="430" r="12" fill="#e7e7e2"/>
    <circle cx="380" cy="362" r="56" fill="#e7e7e2" stroke="#111111" stroke-width="5"/>
    <circle cx="380" cy="362" r="20" fill="#111111"/>
    <rect x="300" y="470" width="150" height="120" fill="#e7e7e2" stroke="#111111" stroke-width="5"/>
    <rect x="318" y="488" width="114" height="14" fill="#111111"/>
    <rect x="318" y="512" width="84" height="10" fill="#111111"/>
    <rect x="318" y="532" width="100" height="10" fill="#111111"/>
    <rect x="318" y="552" width="62" height="10" fill="#111111"/>
  </g>
  <!-- belts -->
  <g stroke="#111111" stroke-width="6" fill="none">
    <line x1="240" y1="338" x2="380" y2="306"/>
    <line x1="312" y1="430" x2="332" y2="362"/>
  </g>
  <!-- paper roll feeding out top -->
  <g fill="#111111">
    <rect x="150" y="130" width="300" height="90" fill="#e7e7e2" stroke="#111111" stroke-width="4"/>
    <line x1="150" y1="158" x2="450" y2="158" stroke="#111111" stroke-width="2"/>
    <line x1="150" y1="186" x2="450" y2="186" stroke="#111111" stroke-width="2"/>
  </g>
  <rect width="600" height="760" fill="url(#vig-m)"/>
</svg>
