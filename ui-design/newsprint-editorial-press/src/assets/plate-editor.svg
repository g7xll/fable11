<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="ht-e" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="#111111"/>
    </pattern>
  </defs>
  <rect width="480" height="560" fill="#e3e3de"/>
  <rect width="480" height="560" fill="url(#ht-e)" opacity="0.3"/>
  <!-- engraved portrait of an editor at the desk -->
  <g fill="#111111">
    <!-- shoulders / coat -->
    <path d="M70 560 C90 430 150 400 240 400 C330 400 390 430 410 560 Z"/>
    <!-- neck -->
    <rect x="208" y="320" width="64" height="90" fill="#e3e3de"/>
    <!-- head -->
    <ellipse cx="240" cy="250" rx="92" ry="108" fill="#e3e3de" stroke="#111111" stroke-width="4"/>
    <!-- hair -->
    <path d="M150 230 C150 150 330 150 330 230 C330 200 300 168 240 168 C180 168 150 200 150 230 Z"/>
    <!-- spectacles -->
    <g fill="none" stroke="#111111" stroke-width="4">
      <circle cx="206" cy="252" r="24"/>
      <circle cx="282" cy="252" r="24"/>
      <line x1="230" y1="250" x2="258" y2="250"/>
    </g>
    <!-- brow + nose -->
    <line x1="186" y1="226" x2="222" y2="222" stroke="#111111" stroke-width="4"/>
    <line x1="266" y1="222" x2="302" y2="226" stroke="#111111" stroke-width="4"/>
    <path d="M242 262 L236 296 L252 296" fill="none" stroke="#111111" stroke-width="3"/>
    <!-- mouth -->
    <path d="M210 322 Q240 336 270 322" fill="none" stroke="#111111" stroke-width="4"/>
    <!-- collar + tie -->
    <path d="M208 408 L240 446 L272 408 Z" fill="#111111"/>
    <rect x="232" y="430" width="16" height="120" fill="#cc0000"/>
  </g>
  <!-- engraving hatch shadows on one side of the face -->
  <g stroke="#111111" stroke-width="2" opacity="0.5">
    <line x1="296" y1="280" x2="318" y2="300"/>
    <line x1="290" y1="300" x2="316" y2="324"/>
    <line x1="284" y1="320" x2="312" y2="346"/>
  </g>
</svg>
