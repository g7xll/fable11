<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="ht-g" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.4" fill="#111111"/>
    </pattern>
  </defs>
  <rect width="520" height="360" fill="#d8d8d3"/>
  <rect width="520" height="360" fill="url(#ht-g)" opacity="0.22"/>
  <!-- a globe wrapped in meridians -->
  <g stroke="#111111" stroke-width="3" fill="none">
    <circle cx="260" cy="180" r="135"/>
    <ellipse cx="260" cy="180" rx="135" ry="48"/>
    <ellipse cx="260" cy="180" rx="90" ry="135"/>
    <ellipse cx="260" cy="180" rx="45" ry="135"/>
    <ellipse cx="260" cy="180" rx="135" ry="100"/>
    <line x1="125" y1="180" x2="395" y2="180"/>
    <line x1="260" y1="45" x2="260" y2="315"/>
  </g>
  <!-- continents knocked out as solid landmasses -->
  <g fill="#111111" opacity="0.85">
    <path d="M180 120 q40 -20 70 0 q10 30 -20 45 q-40 5 -50 -20 z"/>
    <path d="M295 165 q45 -10 60 25 q-5 40 -45 35 q-30 -25 -15 -60 z"/>
    <path d="M210 220 q30 -5 45 25 q-10 30 -40 20 q-15 -25 -5 -45 z"/>
  </g>
  <!-- transmission arc -->
  <path d="M120 90 Q260 -10 410 90" stroke="#cc0000" stroke-width="4" fill="none"/>
  <circle cx="120" cy="90" r="6" fill="#cc0000"/>
  <circle cx="410" cy="90" r="6" fill="#cc0000"/>
</svg>
