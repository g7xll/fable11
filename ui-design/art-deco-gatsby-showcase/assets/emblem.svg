<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" role="img" aria-label="Art Deco skyscraper emblem with sunburst crown">
  <defs>
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2E8C4"/>
      <stop offset="0.45" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#8A6D1E"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8A6D1E"/>
      <stop offset="0.5" stop-color="#F2E8C4"/>
      <stop offset="1" stop-color="#8A6D1E"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="34%" r="55%">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#D4AF37" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="560" fill="#0A0A0A"/>
  <rect x="6" y="6" width="388" height="548" fill="none" stroke="#D4AF37" stroke-opacity="0.5" stroke-width="1"/>
  <rect x="14" y="14" width="372" height="532" fill="none" stroke="#D4AF37" stroke-opacity="0.85" stroke-width="2"/>

  <ellipse cx="200" cy="190" rx="190" ry="200" fill="url(#halo)"/>

  <!-- Sunburst crown -->
  <g stroke="url(#goldV)" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <line x1="200" y1="150" x2="200" y2="34"/>
    <line x1="200" y1="150" x2="158" y2="44"/>
    <line x1="200" y1="150" x2="242" y2="44"/>
    <line x1="200" y1="150" x2="120" y2="66"/>
    <line x1="200" y1="150" x2="280" y2="66"/>
    <line x1="200" y1="150" x2="88" y2="100"/>
    <line x1="200" y1="150" x2="312" y2="100"/>
  </g>

  <!-- Stepped ziggurat tower -->
  <g fill="url(#goldV)">
    <polygon points="192,150 208,150 204,120 196,120"/>
    <rect x="186" y="150" width="28" height="26"/>
    <rect x="174" y="176" width="52" height="30"/>
    <rect x="160" y="206" width="80" height="34"/>
    <rect x="146" y="240" width="108" height="40"/>
    <rect x="130" y="280" width="140" height="46"/>
    <rect x="112" y="326" width="176" height="54"/>
  </g>

  <!-- Window grille on the tower -->
  <g stroke="#0A0A0A" stroke-width="2" opacity="0.65">
    <line x1="200" y1="206" x2="200" y2="380"/>
    <line x1="178" y1="240" x2="178" y2="380"/>
    <line x1="222" y1="240" x2="222" y2="380"/>
    <line x1="156" y1="280" x2="156" y2="380"/>
    <line x1="244" y1="280" x2="244" y2="380"/>
    <line x1="134" y1="326" x2="134" y2="380"/>
    <line x1="266" y1="326" x2="266" y2="380"/>
    <line x1="160" y1="240" x2="240" y2="240"/>
    <line x1="146" y1="280" x2="254" y2="280"/>
    <line x1="130" y1="326" x2="270" y2="326"/>
  </g>

  <!-- Base plinth + fan -->
  <rect x="96" y="380" width="208" height="14" fill="url(#goldH)"/>
  <g stroke="url(#goldV)" stroke-width="2" opacity="0.85">
    <line x1="200" y1="394" x2="200" y2="470"/>
    <line x1="200" y1="394" x2="150" y2="458"/>
    <line x1="200" y1="394" x2="250" y2="458"/>
    <line x1="200" y1="394" x2="108" y2="436"/>
    <line x1="200" y1="394" x2="292" y2="436"/>
  </g>
  <path d="M108 436 Q200 480 292 436" fill="none" stroke="url(#goldH)" stroke-width="2" opacity="0.85"/>

  <!-- Diamond accents -->
  <g fill="#D4AF37">
    <rect x="44" y="446" width="14" height="14" transform="rotate(45 51 453)"/>
    <rect x="342" y="446" width="14" height="14" transform="rotate(45 349 453)"/>
  </g>

  <text x="200" y="510" text-anchor="middle" fill="#F2E8C4" font-family="Marcellus, serif" font-size="22" letter-spacing="6">MCMXXV</text>
</svg>
