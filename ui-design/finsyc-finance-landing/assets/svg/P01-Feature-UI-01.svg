<svg xmlns="http://www.w3.org/2000/svg" width="420" height="320" viewBox="0 0 420 320" fill="none" role="img" aria-label="Smart expense tracking dashboard">
  <defs>
    <filter id="s1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#042718" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="24" y="18" width="372" height="284" rx="22" fill="#ffffff" filter="url(#s1)"/>
  <text x="48" y="56" font-family="'Onest','Inter',sans-serif" font-size="16" font-weight="600" fill="#042718">Spending overview</text>
  <rect x="318" y="42" width="54" height="22" rx="11" fill="#198F38" fill-opacity="0.1"/>
  <text x="345" y="57" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" font-weight="600" fill="#198F38">Month</text>

  <!-- Donut -->
  <g transform="translate(112,150)">
    <circle r="56" fill="none" stroke="#EEF3F1" stroke-width="18"/>
    <circle r="56" fill="none" stroke="#042718" stroke-width="18" stroke-dasharray="160 352" stroke-linecap="round" transform="rotate(-90)"/>
    <circle r="56" fill="none" stroke="#198F38" stroke-width="18" stroke-dasharray="92 352" stroke-dashoffset="-160" stroke-linecap="round" transform="rotate(-90)"/>
    <circle r="56" fill="none" stroke="#86C9A4" stroke-width="18" stroke-dasharray="60 352" stroke-dashoffset="-252" stroke-linecap="round" transform="rotate(-90)"/>
    <text x="0" y="-2" text-anchor="middle" font-family="'Onest','Inter',sans-serif" font-size="22" font-weight="700" fill="#042718">$4,820</text>
    <text x="0" y="16" text-anchor="middle" font-family="'Inter',sans-serif" font-size="10" fill="#6b7d77">this month</text>
  </g>

  <!-- Legend / category rows -->
  <g font-family="'Inter',sans-serif">
    <g transform="translate(210,108)">
      <rect width="162" height="40" rx="12" fill="#F6FBF9"/>
      <circle cx="20" cy="20" r="6" fill="#042718"/>
      <text x="36" y="17" font-size="11" font-weight="600" fill="#042718">Housing</text>
      <text x="36" y="31" font-size="10" fill="#7a8a85">45%</text>
      <text x="150" y="25" text-anchor="end" font-size="12" font-weight="700" fill="#042718">$2,170</text>
    </g>
    <g transform="translate(210,156)">
      <rect width="162" height="40" rx="12" fill="#F6FBF9"/>
      <circle cx="20" cy="20" r="6" fill="#198F38"/>
      <text x="36" y="17" font-size="11" font-weight="600" fill="#042718">Groceries</text>
      <text x="36" y="31" font-size="10" fill="#7a8a85">26%</text>
      <text x="150" y="25" text-anchor="end" font-size="12" font-weight="700" fill="#042718">$1,253</text>
    </g>
    <g transform="translate(210,204)">
      <rect width="162" height="40" rx="12" fill="#F6FBF9"/>
      <circle cx="20" cy="20" r="6" fill="#86C9A4"/>
      <text x="36" y="17" font-size="11" font-weight="600" fill="#042718">Leisure</text>
      <text x="36" y="31" font-size="10" fill="#7a8a85">17%</text>
      <text x="150" y="25" text-anchor="end" font-size="12" font-weight="700" fill="#042718">$819</text>
    </g>
  </g>

  <!-- bottom AI insight pill -->
  <g transform="translate(48,256)">
    <rect width="324" height="30" rx="15" fill="#042718"/>
    <circle cx="20" cy="15" r="5" fill="#3CCB7F"/>
    <text x="34" y="19" font-family="'Inter',sans-serif" font-size="11" font-weight="500" fill="#ffffff">AI categorized 142 transactions automatically</text>
  </g>
</svg>
