<svg xmlns="http://www.w3.org/2000/svg" width="420" height="320" viewBox="0 0 420 320" fill="none" role="img" aria-label="Predictive analytics forecast">
  <defs>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#042718" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#198F38" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#198F38" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="24" y="18" width="372" height="284" rx="22" fill="#ffffff" filter="url(#s2)"/>
  <text x="48" y="54" font-family="'Onest','Inter',sans-serif" font-size="16" font-weight="600" fill="#042718">Balance forecast</text>
  <text x="48" y="78" font-family="'Onest','Inter',sans-serif" font-size="24" font-weight="700" fill="#042718">$12,940</text>
  <g transform="translate(150,62)">
    <rect width="64" height="20" rx="10" fill="#198F38" fill-opacity="0.12"/>
    <path d="M12 13l4-5 4 5" stroke="#198F38" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="34" y="14" font-family="'Inter',sans-serif" font-size="11" font-weight="700" fill="#198F38">+8.4%</text>
  </g>

  <!-- chart area -->
  <g transform="translate(48,108)">
    <line x1="0" y1="0" x2="324" y2="0" stroke="#EEF3F1"/>
    <line x1="0" y1="40" x2="324" y2="40" stroke="#EEF3F1"/>
    <line x1="0" y1="80" x2="324" y2="80" stroke="#EEF3F1"/>
    <line x1="0" y1="120" x2="324" y2="120" stroke="#EEF3F1"/>
    <!-- area + line: actual (solid) then forecast (dashed) -->
    <path d="M0 96 L54 80 L108 88 L162 54 L216 60 V120 H0 Z" fill="url(#g2)"/>
    <path d="M0 96 L54 80 L108 88 L162 54 L216 60" fill="none" stroke="#042718" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M216 60 L270 40 L324 18" fill="none" stroke="#198F38" stroke-width="3" stroke-dasharray="6 6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="162" cy="54" r="4.5" fill="#042718"/>
    <circle cx="324" cy="18" r="5" fill="#198F38"/>
    <g font-family="'Inter',sans-serif" font-size="10" fill="#8a9a94">
      <text x="0" y="138">Jan</text>
      <text x="54" y="138">Feb</text>
      <text x="108" y="138">Mar</text>
      <text x="162" y="138">Apr</text>
      <text x="216" y="138">May</text>
      <text x="300" y="138">Jun</text>
    </g>
  </g>

  <!-- forecast callout -->
  <g transform="translate(48,262)">
    <rect width="324" height="28" rx="14" fill="#F6FBF9"/>
    <circle cx="18" cy="14" r="5" fill="#198F38"/>
    <text x="32" y="18" font-family="'Inter',sans-serif" font-size="11" font-weight="500" fill="#042718">Predicted: 3 bills due next week · $640 total</text>
  </g>
</svg>
