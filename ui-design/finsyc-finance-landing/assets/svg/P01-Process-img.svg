<svg xmlns="http://www.w3.org/2000/svg" width="300" height="600" viewBox="0 0 300 600" fill="none" role="img" aria-label="Finsyc mobile app">
  <defs>
    <filter id="ps" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#042718" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="pcard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#063a23"/>
      <stop offset="1" stop-color="#042718"/>
    </linearGradient>
    <clipPath id="pscreen"><rect x="22" y="20" width="256" height="560" rx="38"/></clipPath>
  </defs>

  <!-- phone body -->
  <rect x="12" y="10" width="276" height="580" rx="48" fill="#0a1f16" filter="url(#ps)"/>
  <rect x="22" y="20" width="256" height="560" rx="38" fill="#F6FBF9"/>

  <g clip-path="url(#pscreen)">
    <!-- status bar -->
    <text x="44" y="52" font-family="'Inter',sans-serif" font-size="12" font-weight="700" fill="#042718">9:41</text>
    <circle cx="246" cy="48" r="3" fill="#042718"/><circle cx="236" cy="48" r="3" fill="#042718"/><circle cx="226" cy="48" r="3" fill="#042718" opacity="0.4"/>

    <!-- header -->
    <text x="44" y="86" font-family="'Inter',sans-serif" font-size="12" fill="#7a8a85">Good morning,</text>
    <text x="44" y="108" font-family="'Onest','Inter',sans-serif" font-size="20" font-weight="700" fill="#042718">Alex Morgan</text>
    <circle cx="246" cy="92" r="16" fill="#86C9A4"/>
    <text x="246" y="97" text-anchor="middle" font-family="'Inter',sans-serif" font-size="12" font-weight="700" fill="#042718">AM</text>

    <!-- balance card -->
    <rect x="42" y="126" width="216" height="120" rx="22" fill="url(#pcard)"/>
    <text x="62" y="156" font-family="'Inter',sans-serif" font-size="11" fill="#9fd3b6">Total balance</text>
    <text x="62" y="186" font-family="'Onest','Inter',sans-serif" font-size="30" font-weight="700" fill="#fff">$24,580.20</text>
    <rect x="62" y="206" width="78" height="26" rx="13" fill="#ffffff" fill-opacity="0.14"/>
    <path d="M74 222l4-5 4 5" stroke="#3CCB7F" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="223" font-family="'Inter',sans-serif" font-size="11" font-weight="700" fill="#3CCB7F">+12.4%</text>
    <circle cx="232" cy="146" r="22" fill="#ffffff" fill-opacity="0.06"/>

    <!-- quick actions -->
    <g font-family="'Inter',sans-serif" font-size="10" fill="#042718" text-anchor="middle">
      <g transform="translate(62,266)"><rect width="42" height="42" rx="14" fill="#fff" stroke="#E6EFEA"/><path d="M21 13v16M13 21h16" stroke="#198F38" stroke-width="2.4" stroke-linecap="round"/><text x="21" y="58">Add</text></g>
      <g transform="translate(118,266)"><rect width="42" height="42" rx="14" fill="#fff" stroke="#E6EFEA"/><path d="M14 21h14M22 15l6 6-6 6" stroke="#198F38" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="21" y="58">Send</text></g>
      <g transform="translate(174,266)"><rect width="42" height="42" rx="14" fill="#fff" stroke="#E6EFEA"/><circle cx="21" cy="21" r="8" fill="none" stroke="#198F38" stroke-width="2.4"/><path d="M21 14v7l4 3" stroke="#198F38" stroke-width="2.4" fill="none" stroke-linecap="round"/><text x="21" y="58">Plan</text></g>
    </g>

    <!-- transactions -->
    <text x="44" y="356" font-family="'Onest','Inter',sans-serif" font-size="14" font-weight="600" fill="#042718">Transactions</text>
    <text x="256" y="356" text-anchor="end" font-family="'Inter',sans-serif" font-size="11" fill="#198F38">See all</text>

    <g font-family="'Inter',sans-serif">
      <g transform="translate(42,372)">
        <rect width="216" height="50" rx="16" fill="#fff" stroke="#EEF3F1"/>
        <circle cx="28" cy="25" r="14" fill="#198F38" fill-opacity="0.12"/><path d="M22 25h12M28 19v12" stroke="#198F38" stroke-width="2" stroke-linecap="round"/>
        <text x="50" y="22" font-size="12" font-weight="600" fill="#042718">Salary</text>
        <text x="50" y="37" font-size="10" fill="#8a9a94">Today</text>
        <text x="200" y="29" text-anchor="end" font-size="13" font-weight="700" fill="#198F38">+$3,200</text>
      </g>
      <g transform="translate(42,430)">
        <rect width="216" height="50" rx="16" fill="#fff" stroke="#EEF3F1"/>
        <circle cx="28" cy="25" r="14" fill="#042718" fill-opacity="0.08"/><rect x="22" y="20" width="12" height="10" rx="2" fill="none" stroke="#042718" stroke-width="2"/>
        <text x="50" y="22" font-size="12" font-weight="600" fill="#042718">Groceries</text>
        <text x="50" y="37" font-size="10" fill="#8a9a94">Yesterday</text>
        <text x="200" y="29" text-anchor="end" font-size="13" font-weight="700" fill="#042718">-$86.40</text>
      </g>
      <g transform="translate(42,488)">
        <rect width="216" height="50" rx="16" fill="#fff" stroke="#EEF3F1"/>
        <circle cx="28" cy="25" r="14" fill="#86C9A4" fill-opacity="0.25"/><circle cx="28" cy="25" r="6" fill="none" stroke="#198F38" stroke-width="2"/>
        <text x="50" y="22" font-size="12" font-weight="600" fill="#042718">Subscription</text>
        <text x="50" y="37" font-size="10" fill="#8a9a94">2 days ago</text>
        <text x="200" y="29" text-anchor="end" font-size="13" font-weight="700" fill="#042718">-$14.99</text>
      </g>
    </g>

    <!-- tab bar -->
    <rect x="22" y="548" width="256" height="32" fill="#F6FBF9"/>
    <g fill="#cdd9d3">
      <circle cx="70" cy="563" r="5" fill="#042718"/>
      <circle cx="124" cy="563" r="5"/>
      <circle cx="178" cy="563" r="5"/>
      <circle cx="232" cy="563" r="5"/>
    </g>
  </g>

  <!-- notch -->
  <rect x="118" y="30" width="64" height="14" rx="7" fill="#0a1f16"/>
</svg>
