<svg xmlns="http://www.w3.org/2000/svg" width="420" height="320" viewBox="0 0 420 320" fill="none" role="img" aria-label="Instant transfers">
  <defs>
    <filter id="s4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#042718" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="24" y="18" width="372" height="284" rx="22" fill="#ffffff" filter="url(#s4)"/>
  <text x="48" y="54" font-family="'Onest','Inter',sans-serif" font-size="16" font-weight="600" fill="#042718">Send money</text>

  <!-- amount -->
  <text x="210" y="118" text-anchor="middle" font-family="'Onest','Inter',sans-serif" font-size="40" font-weight="700" fill="#042718">$1,250</text>
  <text x="210" y="140" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" fill="#7a8a85">to Sarah Jenkins</text>

  <!-- avatars row with arrow -->
  <g transform="translate(0,176)">
    <g transform="translate(110,0)">
      <circle r="22" cx="0" cy="0" fill="#042718"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Inter',sans-serif" font-size="14" font-weight="700" fill="#fff">You</text>
    </g>
    <g transform="translate(210,0)">
      <line x1="-58" y1="0" x2="58" y2="0" stroke="#198F38" stroke-width="2.5" stroke-dasharray="5 5"/>
      <circle r="14" fill="#198F38"/>
      <path d="M-5 -5 L5 0 L-5 5" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(310,0)">
      <circle r="22" cx="0" cy="0" fill="#86C9A4"/>
      <text x="0" y="5" text-anchor="middle" font-family="'Inter',sans-serif" font-size="14" font-weight="700" fill="#042718">SJ</text>
    </g>
  </g>

  <!-- send button + fee line -->
  <g transform="translate(48,228)">
    <rect width="324" height="40" rx="20" fill="#042718"/>
    <text x="162" y="25" text-anchor="middle" font-family="'Onest','Inter',sans-serif" font-size="14" font-weight="600" fill="#ffffff">Send instantly</text>
  </g>
  <g transform="translate(48,278)">
    <circle cx="8" cy="6" r="5" fill="#198F38" fill-opacity="0.15"/>
    <path d="M5.5 6l2 2 3.5-4" stroke="#198F38" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="22" y="10" font-family="'Inter',sans-serif" font-size="11" font-weight="500" fill="#7a8a85">Arrives in seconds · $0 hidden fees</text>
  </g>
</svg>
