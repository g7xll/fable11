<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot password - Finorio</title>
<meta name="description" content="Reset your Finorio account password." />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="site-header">
  <a class="logo" href="index.html"><img src="assets/svg/logo.svg" alt="Finorio" /></a>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="features.html">Features</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="header-actions">
    <a href="login.html" class="btn btn-light">Log in</a>
    <a href="register.html" class="btn btn-dark">Download Now</a>
  </div>
  <button class="menu-toggle" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
  </button>
</header>

<main>
  <div class="auth-wrap">
    <form class="auth-card reveal" data-demo>
      <a class="logo" href="index.html"><img src="assets/svg/logo.svg" alt="Finorio" /></a>
      <h1>Forgot password?</h1>
      <p class="sub">No worries, we'll send you reset instructions.</p>

      <div class="field">
        <label>Email</label>
        <div class="input-wrap"><input type="email" placeholder="Enter your email" /></div>
      </div>

      <button type="submit" class="btn btn-dark btn-block">Reset password</button>
      <a href="login.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Back to log in
      </a>
    </form>
  </div>
</main>

<div id="footer-slot"></div>

<script src="partials.js"></script>
<script src="script.js"></script>
</body>
</html>
