<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta
			name="description"
			content="Background Paths — an animated shadcn/ui hero with flowing SVG paths, a per-letter spring headline, and a glassy CTA. Built with React, TypeScript, Tailwind and Framer Motion."
		>
		<meta name="theme-color" content="#0a0a0a">
		<title>Background Paths — animated shadcn/ui hero</title>

		<!-- Preload the heading + body weights actually used above the fold. -->
		<link
			rel="preload"
			as="font"
			type="font/woff2"
			href="/fonts/Geist-Bold.woff2"
			crossorigin
		>
		<link
			rel="preload"
			as="font"
			type="font/woff2"
			href="/fonts/Geist-Regular.woff2"
			crossorigin
		>

		<link
			rel="icon"
			href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a0a'/%3E%3Cg fill='none' stroke='white' stroke-width='1.4' opacity='0.9'%3E%3Cpath d='M3 22C9 6 17 26 29 8'/%3E%3Cpath d='M3 26C9 10 17 30 29 12' opacity='0.6'/%3E%3Cpath d='M3 18C9 2 17 22 29 4' opacity='0.45'/%3E%3C/g%3E%3C/svg%3E"
		>

		<!-- Apply the persisted theme before first paint to avoid a flash.
		     Defaults to dark when nothing is stored; this MUST match
		     getInitialTheme() in src/App.tsx so React never disagrees with the
		     class already on <html>. -->
		<script>
		(() => {
			try {
				var stored = localStorage.getItem("bg-paths-theme");
				document.documentElement.classList.toggle("dark", stored !== "light");
			} catch (_e) {
				document.documentElement.classList.add("dark");
			}
		})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
